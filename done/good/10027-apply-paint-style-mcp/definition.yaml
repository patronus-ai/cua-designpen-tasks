id: 10027-apply-paint-style-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 200x120 rectangle named Card, create a solid paint style named Brand from #FF0000
  with create_paint_style, then call apply_paint_style to put the Brand style onto Card. When you are done, call viewport_zoom_to_fit,
  then verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- apply_paint_style
- create_paint_style
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- apply_paint_style
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
