id: 10065-get-current-page-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a page named Reports and switch to it, call get_current_page, then create a frame named
  exactly the page name it returns. When you are done, call viewport_zoom_to_fit, then verify the result with the available
  MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- get_current_page
- create_page
- switch_page
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- get_current_page
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
