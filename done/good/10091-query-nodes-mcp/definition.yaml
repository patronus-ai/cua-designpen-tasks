id: 10091-query-nodes-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create three 100x100 rectangles, naming one of them ''target''; call query_nodes with an XPath
  selector matching the rectangle named ''target'', then move that node to (500,500) with node_move. When you are done, call
  viewport_zoom_to_fit, then verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- query_nodes
- create_shape
- node_move
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- query_nodes
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
