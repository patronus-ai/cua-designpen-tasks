id: 10116-unbind-variable-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a collection named Sizes with a FLOAT variable named w valued 300, create a rectangle
  named Strip, bind Strip''s width to the variable, then call unbind_variable on Strip''s width field. When you are done,
  call viewport_zoom_to_fit, then verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- unbind_variable
- create_collection
- create_variable
- bind_variable
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- unbind_variable
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
