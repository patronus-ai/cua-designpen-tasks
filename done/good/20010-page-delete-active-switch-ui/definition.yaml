id: 20010-page-delete-active-switch-ui
start_url: http://cua_designpen.web
prompt: 'Add two extra pages via the Pages header "+" so the file has three pages. Rename the last new page to "Final"
  (double-click its row), click its row to make it active, and draw an ellipse on it.


  While completing this workflow, actively try to break the app: (1) while one of the middle pages is the ACTIVE
  page, delete it via its right-click context menu (confirm if prompted) — check which page becomes active, whether
  the canvas swaps correctly, and whether any stale content from the deleted page lingers; (2) switch between the
  remaining pages by clicking their rows as fast as you can 10 times in a row — look for wrong-page content flashes,
  selection leaking across pages, or a frozen canvas; (3) right-click a page and double-click the delete confirmation
  rapidly to probe for double-execution deleting two pages. Recreate pages as needed so the file ends with the "Final"
  page active and its ellipse present. After each break attempt, recover (undo, or redo the step cleanly) so the
  final document matches the workflow described above.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens), state lost after navigation
  or reload, inconsistent state between the canvas and the panels, and unhelpful or missing error messages all count
  as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message,
  end with exactly "adversarial-report: complete".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
- browser_scroll_to
- browser_press_key
- browser_type
- browser_wait
- browser_get_page_text
- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
required_tools:
- browser
rewards:
- name: Adversarial report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'adversarial-report: complete'
