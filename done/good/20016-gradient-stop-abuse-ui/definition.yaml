id: 20016-gradient-stop-abuse-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, click its fill swatch to open the paint panel, and switch the paint to Gradient using
  the Gradient tab. Then switch the paint back to the Solid tab and set the color to pure blue 0000FF.


  While completing this workflow, actively try to break the app: (1) while in gradient mode, add stops rapidly —
  click the gradient bar and/or the "+" button about 10 times fast — and check the stop list, bar markers, and canvas
  stay consistent; (2) then remove stops one by one down to a single stop and try to remove the last one — what
  happens at zero?; (3) drag two stops to exactly the same position (both at 0% or both at 100%) and check the render
  and whether the stops can still be individually selected; (4) hammer the gradient reverse button 6 times fast
  and verify the stop order ends where it should. Then complete the workflow by switching to Solid 0000FF. After
  each break attempt, recover (undo, or redo the step cleanly) so the final document matches the workflow described
  above.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens), state lost after navigation
  or reload, inconsistent state between the canvas and the panels, and unhelpful or missing error messages all count
  as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message,
  end with exactly "adversarial-report: complete".'
