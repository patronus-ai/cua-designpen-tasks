id: 20021-component-master-delete-ui
start_url: http://cua_designpen.web
prompt: 'Draw a 200x80 rectangle as a mock button and rename its layer to "Btn" (double-click its row in the layers panel). Turn it into a component with Cmd+Alt+K (or Main menu > Object > Create Component). With the component selected, right-click it and choose Create instance; repeat once more so two instances exist on the page. Change the master component''s fill to pure green (#00FF00) via the hex input in the Fill section and confirm both instances follow. Final state: the master component and at least one instance exist on the page.


  While completing this workflow, actively try to break the app: (1) select the master component and press Delete while its instances still exist — observe what happens to the instances and whether any error or warning appears, then undo; (2) hammer undo/redo (Cmd+Z / Cmd+Shift+Z, at least 8 rapid presses) across the create-component and create-instance steps and check the layers panel never desyncs from the canvas; (3) press Cmd+D on an instance 5 times as fast as possible and check names, offsets, and that every duplicate still tracks the master; (4) change the master fill while an instance is the selected layer and verify the Fill panel shown for the instance matches what renders on canvas. After every break attempt, recover the document (undo, redo, or redo the step by hand) so the workflow above still ends in exactly its described final state.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens),

  state lost after navigation or reload, inconsistent state between the canvas and the panels,

  and unhelpful or missing error messages all count as defects. If you found no defects, state

  exactly "NO DEFECTS FOUND". At the very end of your final message, end with exactly

  "adversarial-report: complete".'
