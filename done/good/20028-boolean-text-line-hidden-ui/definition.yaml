id: 20028-boolean-text-line-hidden-ui
start_url: http://cua_designpen.web
prompt: 'Draw two overlapping rectangles, select both, and combine them via Main menu > Object > Subtract selection so a boolean layer exists. Separately, create a text layer reading "Boolean bait" (Text tool, T) overlapping a third rectangle, and draw a straight line with the Line tool (L) crossing that same rectangle. Final state: the subtract boolean result from the first pair still exists on the page.


  While completing this workflow, actively try to break the app: (1) select the text layer plus a rectangle and invoke Main menu > Object > Union selection — record whether text is accepted, rejected with a clear message, or silently mangled; (2) select the line plus a rectangle and invoke Subtract selection and check the result renders sanely (a zero-area participant is a classic breaker); (3) hide one rectangle of a pair with Cmd+Shift+H, select both via the layers panel, and run Union — check whether the hidden layer participates and whether canvas and layers panel agree afterwards; (4) lock a rectangle with Cmd+Shift+L and try to boolean it with another shape. Undo each experiment afterwards. After every break attempt, recover the document (undo, redo, or redo the step by hand) so the workflow above still ends in exactly its described final state.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens),

  state lost after navigation or reload, inconsistent state between the canvas and the panels,

  and unhelpful or missing error messages all count as defects. If you found no defects, state

  exactly "NO DEFECTS FOUND". At the very end of your final message, end with exactly

  "adversarial-report: complete".'
