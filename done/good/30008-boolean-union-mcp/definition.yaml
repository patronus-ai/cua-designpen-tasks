id: 30008-boolean-union-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: use create_shape to make two overlapping 120x120 ellipses named E1 (at 0,0) and E2 (at 60,60),
  then use boolean_union to combine them and rename_node the result to Union Result. When you are done, call viewport_zoom_to_fit,
  then verify the result with the available MCP tools and report what you found.

  While completing this workflow, actively try to break the app through the tools: call boolean_union with an empty ids array
  []; call boolean_union with a single id; call boolean_union with nonexistent ids ["ghost1","ghost2"]; call boolean_subtract
  with ids in reversed/duplicated order. Confirm each invalid call returns a structured status/code/message error rather than
  silently producing nothing or a malformed node. Recover from any errors and finish the workflow described above.

  Log every defect you find using exactly this format, one block per defect:

  DEFECT #<n> Steps: <exact MCP tool calls with their arguments to reproduce> Observed: <what actually happened> Expected:
  <what should have happened> Severity: <critical | major | minor | cosmetic>

  Broken rendering, crashes, freezes, silent failures (invalid input accepted but nothing happens or a success response is
  returned), partial application of a batch that was supposed to be atomic, state lost after navigation or reload, inconsistent
  state between the canvas and the tool responses, and free-form or unstructured error messages (any error that is not a structured
  status/code/message payload) all count as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very
  end of your final message, end with exactly "adversarial-report: complete".'
available_tools:
- boolean_union
- boolean_subtract
- create_shape
- rename_node
- get_node
- find_nodes
- get_selection
- viewport_zoom_to_fit
required_tools:
- boolean_union
rewards:
- name: Adversarial report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'adversarial-report: complete'
