id: 10012-reparent-node-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 300x300 frame named Tray at (0,0), give it vertical auto-layout with padding 24 and
  spacing 0 via set_layout, create a 50x50 ellipse named Ball at (600,600), then call reparent_node to move Ball into Tray
  as its first child. When you are done, call viewport_zoom_to_fit, then verify the result with the available MCP tools and
  report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- reparent_node
- create_shape
- set_layout
- get_node
- viewport_zoom_to_fit
required_tools:
- reparent_node
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
