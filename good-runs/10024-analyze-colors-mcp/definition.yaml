id: 10024-analyze-colors-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create three filled shapes — two with fill #FF0000 and one with fill #0000FF; call analyze_colors
  on the page, then create a frame named ''palette-N'' where N is the number of distinct fill colors it reports. When you
  are done, call viewport_zoom_to_fit, then verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- analyze_colors
- create_vector
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- analyze_colors
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
