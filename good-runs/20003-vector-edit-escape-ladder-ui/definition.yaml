id: 20003-vector-edit-escape-ladder-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle (R + drag), keep it selected, and press Enter to drop into vector edit mode. With the
  Move subtool (V), drag one corner point inward so the shape becomes an irregular quadrilateral, then leave the
  edit session with Enter or Escape.


  While completing this workflow, actively try to break the app: (1) abuse the Escape ladder: inside the edit session
  activate the Pen subtool (P), click once to start a chain, then hammer Escape 5+ times in a row and note exactly
  what each press does — chain cancel, subtool reset, session exit, deselect — and whether any press is swallowed
  or double-fires; (2) double-click the shape to enter edit mode and double-click empty canvas to leave, repeated
  rapidly 5 times, checking for stuck overlays, orphaned vertex handles, or a dead canvas; (3) while dragging a
  corner vertex, press Escape mid-drag and verify the vertex snaps back instead of committing a half-moved position.
  After each break attempt, recover (undo, or redo the step cleanly) so the final document matches the workflow
  described above.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens), state lost after navigation
  or reload, inconsistent state between the canvas and the panels, and unhelpful or missing error messages all count
  as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message,
  end with exactly "adversarial-report: complete".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
