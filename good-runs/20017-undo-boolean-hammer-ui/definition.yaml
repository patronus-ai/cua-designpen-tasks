id: 20017-undo-boolean-hammer-ui
start_url: http://cua_designpen.web
prompt: 'Draw two overlapping circles with the Ellipse tool (O), select both (Shift-click or marquee), and weld
  them into one shape via Main menu > Object > Union selection.


  While completing this workflow, actively try to break the app: (1) immediately after the union, hammer Cmd+Z about
  15 times in fast succession — this runs past the union, past both circles, and past document open; check for errors,
  phantom layers, or a corrupted empty state at the bottom of the history; (2) then hammer Cmd+Shift+Z about 15
  times — redoing past the top of the history must be a clean no-op; (3) alternate Cmd+Z and Cmd+Shift+Z as fast
  as you can 10 times across the boolean op and verify the layers panel, canvas, and selection agree after every
  burst — the union must reappear/disappear atomically, never as loose circles plus a boolean layer. Finish redone
  so the union exists. After each break attempt, recover (undo, or redo the step cleanly) so the final document
  matches the workflow described above.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens), state lost after navigation
  or reload, inconsistent state between the canvas and the panels, and unhelpful or missing error messages all count
  as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message,
  end with exactly "adversarial-report: complete".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
