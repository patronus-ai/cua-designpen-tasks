id: 20027-boolean-undo-hammer-ui
start_url: http://cua_designpen.web
prompt: 'Draw two overlapping circles (Ellipse tool, O), select both (click one, Shift-click the other), and weld them via Main menu > Object > Union selection. Then draw a large rectangle about 300x200 and a small rectangle about 100x100 partly overlapping it, select both, and carve via Main menu > Object > Subtract selection. Final state: both boolean results (the union and the subtract) exist on the page.


  While completing this workflow, actively try to break the app: (1) immediately after the union, hammer Cmd+Z / Cmd+Shift+Z at least 10 times as fast as possible and verify the document always lands in a coherent state (no orphaned children, no ghost outlines, layers panel matches canvas); (2) with the union result still selected, invoke Union selection again from the menu twice in quick succession and observe whether it double-wraps, errors, or no-ops silently; (3) select only a single circle and invoke Subtract selection — check whether the menu item is disabled, errors helpfully, or silently does nothing; (4) after the subtract, drag one child out of the boolean group in the layers panel and check the shape re-renders correctly, then undo. After every break attempt, recover the document (undo, redo, or redo the step by hand) so the workflow above still ends in exactly its described final state.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens),

  state lost after navigation or reload, inconsistent state between the canvas and the panels,

  and unhelpful or missing error messages all count as defects. If you found no defects, state

  exactly "NO DEFECTS FOUND". At the very end of your final message, end with exactly

  "adversarial-report: complete".'
