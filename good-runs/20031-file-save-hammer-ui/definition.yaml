id: 20031-file-save-hammer-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and rename its layer to "SaveMe". Save the document to disk as "adversarial-save.fig" via Main menu > File > Save As… (Cmd+Shift+S), completing the save dialog. Then immediately save again with Main menu > File > Save (Cmd+S). Final state: the document still open in the editor and still containing the "SaveMe" rectangle.


  While completing this workflow, actively try to break the app: (1) press Cmd+S twice as fast as possible and check for double dialogs, errors, or a wedged save; (2) open Save As…, then cancel/Escape the dialog mid-save and verify no half-state remains (no phantom tab, no dirty-flag confusion, document still editable); (3) open Save As… and try a very long file name (several hundred characters) — record whether the save succeeds, fails with a clear message, or breaks the dialog; (4) right after triggering a save, immediately draw another shape and verify the document and the saved state never corrupt each other, then delete that extra shape. After every break attempt, recover the document (undo, redo, or redo the step by hand) so the workflow above still ends in exactly its described final state.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens),

  state lost after navigation or reload, inconsistent state between the canvas and the panels,

  and unhelpful or missing error messages all count as defects. If you found no defects, state

  exactly "NO DEFECTS FOUND". At the very end of your final message, end with exactly

  "adversarial-report: complete".'
