id: 30012-apply-paint-style-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: use create_shape to make a 100x100 rectangle named Swatch at (0,0), use create_paint_style to make a style named Brand from the solid color "#E63946", then use apply_paint_style to apply Brand to Swatch. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually verified.

While completing this workflow, actively try to break the app through the tools: call apply_paint_style with a nonexistent style_id "ghost-style"; call create_paint_style with a malformed color "notacolor"; call apply_paint_style targeting a nonexistent node id "ghost-node"; call detach_paint_style on a node that has no paint style attached. Confirm each returns a structured status/code/message error rather than silently succeeding. Recover from any errors and finish the workflow described above.

Log every defect you find using exactly this format, one block per defect:

DEFECT #<n>
Steps: <exact MCP tool calls with their arguments to reproduce>
Observed: <what actually happened>
Expected: <what should have happened>
Severity: <critical | major | minor | cosmetic>

Broken rendering, crashes, freezes, silent failures (invalid input accepted but nothing happens or a success response is returned), partial application of a batch that was supposed to be atomic, state lost after navigation or reload, inconsistent state between the canvas and the tool responses, and free-form or unstructured error messages (any error that is not a structured status/code/message payload) all count as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message, end with exactly "adversarial-report: complete".'
