id: 40001-shape-crud-chain-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools (the browser is allowed only for screenshots and visual verification): Run a full
  CRUD chain on one shape: (1) create_shape a RECTANGLE named "CRUD Card", 120x80 at (40,40); (2) find_nodes with
  name "CRUD Card" — expect exactly one hit and keep its id; (3) get_node on that id — name, type, x, y, width and
  height must round-trip exactly as created; (4) update_node setting width=200, opacity=0.5 and corner_radius=8;
  (5) get_node again — the three changed fields must read back exactly, and the untouched fields (x, y, height,
  name) must be unchanged; (6) rename_node to "CRUD Card v2", then find_nodes for the old and the new name — the
  old name must return no results and the new exactly one; (7) delete_node, then find_nodes "CRUD Card v2" — expect
  an empty result; (8) get_node on the deleted id — expect a structured not-found error that is clearly distinguishable
  from an empty result.


  Harness discipline: before EVERY tool call, state the output you expect; after the call, compare actual vs expected
  and flag any mismatch. Pay special attention to data-modeling issues: fields that do not round-trip, list vs detail
  disagreements, IDs that change format between tools, broken references between nodes, stale reads after writes,
  and silently truncated results. When you are done, zoom the canvas to fit (press Shift+1 in the browser) and take
  a browser screenshot so the final state can be visually verified.


  Log every mismatch or defect you find using exactly this format, one block per finding:


  MISMATCH #<n>

  Step: <the exact tool call with its arguments>

  Expected: <what you expected and why>

  Actual: <what the tool returned / what the app did>

  Severity: <critical | major | minor | cosmetic>


  Fields that do not round-trip, list vs detail disagreements, broken references, stale reads after writes, silent
  truncation, free-form or unstructured error payloads, misleading success responses, and any single response over
  ~50K characters all count as findings. If you found no mismatches, state exactly "NO MISMATCHES FOUND". At the
  very end of your final message, end with exactly "mcp-harness-report: complete".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
- browser_scroll_to
- browser_press_key
- browser_type
- browser_wait
- browser_get_page_text
- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
- create_shape
- find_nodes
- get_node
- update_node
- rename_node
- delete_node
required_tools:
- create_shape
- find_nodes
- get_node
- update_node
- rename_node
- delete_node
rewards:
- name: MCP harness report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'mcp-harness-report: complete'
