- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
- create_vector
- path_get
- path_set
- path_move
- path_scale
- path_flip
- node_bounds
- set_stroke
- set_stroke_width_profile
- get_node
required_tools:
- create_vector
- path_get
- path_set
- path_move
- path_scale
- path_flip
- node_bounds
- set_stroke
- set_stroke_width_profile
