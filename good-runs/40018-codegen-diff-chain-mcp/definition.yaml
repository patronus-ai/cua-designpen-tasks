- browser_get_page_text
- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
- create_shape
- set_text
- get_jsx
- render
- node_replace_with
- diff_jsx
- diff_create
- diff_show
- design_to_component_map
- get_codegen_prompt
- done_with_changes
- find_nodes
- node_tree
- get_node
required_tools:
- create_shape
- set_text
- get_jsx
- render
- node_replace_with
- diff_jsx
- diff_create
- diff_show
- design_to_component_map
