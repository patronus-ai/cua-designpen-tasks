id: 20007-frame-deep-nesting-ui
start_url: http://cua_designpen.web
prompt: 'Activate the Frame tool (toolbar Frame button or press F) and drag out a frame roughly 600 by 400 on the
  canvas. Then draw a rectangle (R + drag) inside the frame so it becomes a child of the frame.


  While completing this workflow, actively try to break the app: (1) nest frames deep: with F, drag a smaller frame
  inside the previous one, repeating until you are at least 6 levels deep — watch the layers panel tree, canvas
  titles, and responsiveness, then delete the extra nested frames; (2) drag the child rectangle out of the frame
  and press Escape mid-drag — verify it snaps back to its original parent and position with no half-reparented state;
  (3) select the outer frame and set its W field in the Design panel to 0, then to -100 — check what the panel accepts,
  what the canvas renders, and whether the children survive; restore the frame to about 600 wide afterwards. After
  each break attempt, recover (undo, or redo the step cleanly) so the final document matches the workflow described
  above.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens), state lost after navigation
  or reload, inconsistent state between the canvas and the panels, and unhelpful or missing error messages all count
  as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message,
  end with exactly "adversarial-report: complete".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
- browser_scroll_to
- browser_press_key
- browser_type
- browser_wait
- browser_get_page_text
- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
required_tools:
- browser
rewards:
- name: Adversarial report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'adversarial-report: complete'
