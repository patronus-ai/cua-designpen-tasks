id: 20013-panel-input-fuzzing-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle (R + drag), then use the Design panel to set its X position to exactly 333, its width
  to exactly 240, and its height to exactly 140.


  While completing this workflow, actively try to break the app: (1) before the final values, type "-0" into the
  X field and commit — check what the panel displays and where the node lands; (2) type "1e99" into the W field
  — does it clamp, error, or blow up the canvas/viewport?; (3) type "abc" and then "NaN" into the H field — the
  value should be rejected with the previous height retained, panel and canvas staying in sync; (4) clear a field
  entirely and press Enter, then press Tab — compare the behaviors. After each probe verify the canvas, the panel,
  and the layers panel agree, then commit the final values X 333, W 240, H 140. After each break attempt, recover
  (undo, or redo the step cleanly) so the final document matches the workflow described above.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens), state lost after navigation
  or reload, inconsistent state between the canvas and the panels, and unhelpful or missing error messages all count
  as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message,
  end with exactly "adversarial-report: complete".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
- browser_scroll_to
- browser_press_key
- browser_type
- browser_wait
- browser_get_page_text
- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
required_tools:
- browser
rewards:
- name: Adversarial report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'adversarial-report: complete'
