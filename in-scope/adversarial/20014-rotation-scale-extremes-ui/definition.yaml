id: 20014-rotation-scale-extremes-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and set it to exactly 200 by 100 via the Design panel W/H fields. Tilt it by entering
  45 in the rotation field of the Position section, look at the result, then set the rotation back to exactly 0.


  While completing this workflow, actively try to break the app: (1) enter extreme rotation values — 99999, then
  -0, then 720 — and for each check what the panel normalizes to and whether the canvas matches; (2) type "abc"
  into the rotation field and verify it is rejected cleanly with the previous value retained; (3) activate the Scale
  tool (K) and drag a corner handle through and past the opposite corner to force a negative/inverted scale — check
  for flipped, collapsed, or NaN geometry, then undo; (4) with the Scale tool active try entering 0 as the scale/width
  value in the panel Scale section. Finish with rotation 0 and size exactly 200x100. After each break attempt, recover
  (undo, or redo the step cleanly) so the final document matches the workflow described above.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens), state lost after navigation
  or reload, inconsistent state between the canvas and the panels, and unhelpful or missing error messages all count
  as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message,
  end with exactly "adversarial-report: complete".'
