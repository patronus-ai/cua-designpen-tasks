id: 20039-group-ungroup-hammer-ui
start_url: http://cua_designpen.web
prompt: 'Draw two circles side by side with the Ellipse tool (O), select both (click one, Shift-click the other), and group them with Cmd+G (or Main menu > Object > Group Selection). Ungroup with Cmd+Shift+G, then group them again. Then draw a third circle, select it together with the existing group, and group those two into a nested group. Final state: at least one group exists containing the circles.


  While completing this workflow, actively try to break the app: (1) alternate Cmd+G and Cmd+Shift+G at least 10 times as fast as possible and verify the layers panel and canvas never desync and no empty ghost groups remain; (2) select a single circle and press Cmd+G — record whether single-node grouping is allowed, blocked, or produces a degenerate group; (3) start renaming the group in the layers panel and, mid-edit, press Cmd+Shift+G — check for a stuck rename editor or a crash; (4) hammer undo/redo across the nesting step and verify children never get orphaned or duplicated. After every break attempt, recover the document (undo, redo, or redo the step by hand) so the workflow above still ends in exactly its described final state.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens),

  state lost after navigation or reload, inconsistent state between the canvas and the panels,

  and unhelpful or missing error messages all count as defects. If you found no defects, state

  exactly "NO DEFECTS FOUND". At the very end of your final message, end with exactly

  "adversarial-report: complete".'
