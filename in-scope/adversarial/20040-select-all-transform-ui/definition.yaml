id: 20040-select-all-transform-ui
start_url: http://cua_designpen.web
prompt: 'Draw three spaced-out shapes: a rectangle renamed to "SA box", a circle (Ellipse tool, O), and a star (shape flyout > Star). Press Cmd+A (or Main menu > Edit > Select all) to select everything, then drag the whole selection roughly 100px to the right in one drag. Then click just the star and press Delete. Then click the rectangle, Shift-click the circle, and nudge the pair a few pixels with the arrow keys. Final state: "SA box" and the circle remain on the page; the star is gone.


  While completing this workflow, actively try to break the app: (1) immediately after deleting the star, Shift-click the empty spot where it used to be — check for a stale-selection crash or a ghost entry in the selection; (2) press Cmd+A, press Delete, then hammer undo/redo several times and verify all three shapes reappear and disappear consistently between canvas and layers panel; (3) with everything selected, drag a corner handle to squash the whole selection to a near-zero size, observe the behavior at the extreme, then undo; (4) press Cmd+A twice in quick succession and while shapes are selected press Escape mid-drag of the group and verify no half-moved state remains. After every break attempt, recover the document (undo, redo, or redo the step by hand) so the workflow above still ends in exactly its described final state.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens),

  state lost after navigation or reload, inconsistent state between the canvas and the panels,

  and unhelpful or missing error messages all count as defects. If you found no defects, state

  exactly "NO DEFECTS FOUND". At the very end of your final message, end with exactly

  "adversarial-report: complete".'
