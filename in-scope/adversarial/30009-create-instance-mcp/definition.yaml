id: 30009-create-instance-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: use create_shape to make a FRAME 120x48 named Btn at (0,0), use create_component to convert Btn into a component, then use create_instance to place one instance at (0,100). When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually verified.

While completing this workflow, actively try to break the app through the tools: call create_instance with a nonexistent component_id "ghost-comp"; then create a throwaway FRAME named Temp, turn it into a component, delete_node that throwaway component, and call create_instance on the deleted component_id (instance op after master deletion); also call create_instance with x set to the string "left". Confirm each returns a structured status/code/message error and leaves the Btn component and its valid instance intact. Recover from any errors and finish the workflow described above.

Log every defect you find using exactly this format, one block per defect:

DEFECT #<n>
Steps: <exact MCP tool calls with their arguments to reproduce>
Observed: <what actually happened>
Expected: <what should have happened>
Severity: <critical | major | minor | cosmetic>

Broken rendering, crashes, freezes, silent failures (invalid input accepted but nothing happens or a success response is returned), partial application of a batch that was supposed to be atomic, state lost after navigation or reload, inconsistent state between the canvas and the tool responses, and free-form or unstructured error messages (any error that is not a structured status/code/message payload) all count as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message, end with exactly "adversarial-report: complete".'
