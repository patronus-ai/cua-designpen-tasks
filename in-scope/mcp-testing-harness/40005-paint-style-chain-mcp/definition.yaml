- browser_type
- browser_wait
- browser_get_page_text
- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
- create_shape
- set_fill
- create_paint_style
- list_paint_styles
- apply_paint_style
- update_paint_style
- detach_paint_style
- get_node
required_tools:
- create_shape
- set_fill
- create_paint_style
- list_paint_styles
- apply_paint_style
- update_paint_style
- detach_paint_style
- get_node
rewards:
- name: MCP harness report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'mcp-harness-report: complete'
