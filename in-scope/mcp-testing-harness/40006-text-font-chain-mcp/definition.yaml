- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
- create_shape
- set_text
- list_fonts
- list_available_fonts
- set_font
- set_font_range
- set_text_properties
- set_text_resize
- describe
- get_node
required_tools:
- create_shape
- set_text
- list_fonts
- list_available_fonts
- set_font
- set_font_range
- set_text_properties
- set_text_resize
