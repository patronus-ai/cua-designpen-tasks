- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
- create_shape
- node_bounds
- node_move
- node_resize
- set_rotation
- set_constraints
- set_minmax
- get_node
required_tools:
- create_shape
- node_bounds
- node_move
- node_resize
- set_rotation
- set_constraints
- set_minmax
- get_node
rewards:
