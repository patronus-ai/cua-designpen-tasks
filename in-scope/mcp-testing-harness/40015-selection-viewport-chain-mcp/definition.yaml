id: 40015-selection-viewport-chain-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools (the browser is allowed only for screenshots and visual verification): Verify selection
  and viewport round-trips: (1) create_shape three 80x80 RECTANGLEs S1, S2, S3; select_nodes S1 and S2 — get_selection
  must return exactly those two ids in the same id format find_nodes uses; (2) select_nodes [] — the selection must
  read back empty, clearly distinguishable from an error; (3) viewport_set x 100 y 200 zoom 2 — viewport_get must
  round-trip all three values exactly; (4) viewport_zoom_to_fit on S3 — viewport_get must change, and from node_bounds
  you must be able to confirm S3 is inside the visible area; (5) delete_node S1, then select_nodes [S1''s old id]
  — expect a structured error or clean rejection, and get_selection must never contain dead ids afterwards.


  Harness discipline: before EVERY tool call, state the output you expect; after the call, compare actual vs expected
  and flag any mismatch. Pay special attention to data-modeling issues: fields that do not round-trip, list vs detail
  disagreements, IDs that change format between tools, broken references between nodes, stale reads after writes,
  and silently truncated results. When you are done, zoom the canvas to fit (press Shift+1 in the browser) and take
  a browser screenshot so the final state can be visually verified.


  Log every mismatch or defect you find using exactly this format, one block per finding:


  MISMATCH #<n>

  Step: <the exact tool call with its arguments>

  Expected: <what you expected and why>

  Actual: <what the tool returned / what the app did>

  Severity: <critical | major | minor | cosmetic>


  Fields that do not round-trip, list vs detail disagreements, broken references, stale reads after writes, silent
  truncation, free-form or unstructured error payloads, misleading success responses, and any single response over
  ~50K characters all count as findings. If you found no mismatches, state exactly "NO MISMATCHES FOUND". At the
  very end of your final message, end with exactly "mcp-harness-report: complete".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
- browser_scroll_to
- browser_press_key
- browser_type
- browser_wait
- browser_get_page_text
- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
- create_shape
- select_nodes
- get_selection
- viewport_set
- viewport_get
- viewport_zoom_to_fit
- delete_node
- find_nodes
- node_bounds
required_tools:
- create_shape
- select_nodes
- get_selection
- viewport_set
- viewport_get
- viewport_zoom_to_fit
- delete_node
- find_nodes
- node_bounds
rewards:
- name: MCP harness report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'mcp-harness-report: complete'
