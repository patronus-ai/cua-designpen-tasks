id: 10015-set-layout-child-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 300x100 frame named Row at (0,0) with horizontal auto-layout, zero padding/spacing,
  containing one 50x50 rectangle named Stretch; then call set_layout_child on Stretch with sizing_horizontal FILL. When you
  are done, call viewport_zoom_to_fit, then verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- set_layout_child
- set_layout
- create_shape
- get_node
- viewport_zoom_to_fit
required_tools:
- set_layout_child
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
