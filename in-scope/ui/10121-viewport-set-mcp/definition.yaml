id: 10121-viewport-set-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: call viewport_set with x=140, y=260, zoom 2, read the viewport back with viewport_get, then
  drop a 40x40 rectangle named Marker at the reported coordinates. When you are done, call viewport_zoom_to_fit, then verify
  the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- viewport_set
- viewport_get
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- viewport_set
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
