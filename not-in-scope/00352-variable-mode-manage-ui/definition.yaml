id: 00352-variable-mode-manage-ui
start_url: http://cua_designpen.web
prompt: 'Open the Local variables dialog from the left panel Variables tab, create a collection, and add a FLOAT
  variable named "panel-width" with value 240 in the default mode. Add a second mode via the mode header "+" and
  set "panel-width" to 480 in that new column. Draw a rectangle and bind its width to "panel-width" (it should snap
  to 240). Then open the second mode''s context menu, rename it to "High contrast", and set it as the default mode
  — the bound rectangle width must jump to 480.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
