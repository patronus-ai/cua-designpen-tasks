id: 30011-bind-variable-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: use create_shape to make a 100x100 rectangle named Swatch at (0,0), use create_collection to
  make a collection named Theme, use create_variable to make a COLOR variable named Brand with value "#3366FF" in Theme, then
  use bind_variable to bind Brand to Swatchs fill. When you are done, call viewport_zoom_to_fit, then verify the result with
  the available MCP tools and report what you found.

  While completing this workflow, actively try to break the app through the tools: call create_variable with type "RAINBOW"
  (invalid type) and with a malformed COLOR value "not-a-color"; call bind_variable with field "bogusField" and with a nonexistent
  variable_id "ghost-var"; after binding Brand, call delete_variable to delete Brand while it is still bound to Swatch (bind-then-delete),
  then read Swatch to see if its fill binding is left dangling. Confirm each invalid call returns a structured status/code/message
  error. Recover from any errors and finish the workflow described above.

  Log every defect you find using exactly this format, one block per defect:

  DEFECT #<n> Steps: <exact MCP tool calls with their arguments to reproduce> Observed: <what actually happened> Expected:
  <what should have happened> Severity: <critical | major | minor | cosmetic>

  Broken rendering, crashes, freezes, silent failures (invalid input accepted but nothing happens or a success response is
  returned), partial application of a batch that was supposed to be atomic, state lost after navigation or reload, inconsistent
  state between the canvas and the tool responses, and free-form or unstructured error messages (any error that is not a structured
  status/code/message payload) all count as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very
  end of your final message, end with exactly "adversarial-report: complete".'
available_tools:
- bind_variable
- create_collection
- create_variable
- delete_variable
- create_shape
- set_fill
- get_node
- find_nodes
- node_bindings
- viewport_zoom_to_fit
required_tools:
- bind_variable
rewards:
- name: Adversarial report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'adversarial-report: complete'
