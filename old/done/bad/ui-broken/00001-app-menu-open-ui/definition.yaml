id: 00001-app-menu-open-ui
start_url: http://cua_designpen.web
prompt: 'Click the main menu button at the left end of the toolbar to open the application dropdown menu. Confirm
  it lists the expected sections — Back to files, Actions, File, Edit, View, Preferences, Open in desktop app, AI
  balance, and Help and account — then close the menu by pressing Escape or clicking elsewhere.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
