id: 10014-set-layout-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 400x80 frame named Toolbar at (0,0) with three 40x40 child rectangles Btn 1, Btn 2
  and Btn 3, then call set_layout on Toolbar with direction HORIZONTAL, spacing 16 and padding 12. When you are done, call
  viewport_zoom_to_fit, then verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- set_layout
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- set_layout
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
