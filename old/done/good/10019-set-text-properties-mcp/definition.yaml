id: 10019-set-text-properties-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 300-wide text layer named Headline reading ''Centered headline'', then call set_text_properties
  with align_horizontal CENTER. When you are done, call viewport_zoom_to_fit, then verify the result with the available MCP
  tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- set_text_properties
- create_shape
- set_text
- get_node
- viewport_zoom_to_fit
required_tools:
- set_text_properties
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
