id: 10030-bind-variable-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a collection named Tokens (create_collection) with a FLOAT variable named dim valued
  0.4 (create_variable), create a 200x100 rectangle named Panel, then call bind_variable to bind Panel''s opacity field to
  the dim variable. When you are done, call viewport_zoom_to_fit, then verify the result with the available MCP tools and
  report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- bind_variable
- create_collection
- create_variable
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- bind_variable
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
