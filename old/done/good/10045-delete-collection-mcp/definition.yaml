id: 10045-delete-collection-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a collection named Scratch with one FLOAT variable inside, then call delete_collection
  on it and confirm with list_collections; record the result by creating a frame named ''collections-gone''. When you are
  done, call viewport_zoom_to_fit, then verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- delete_collection
- create_collection
- create_variable
- list_collections
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- delete_collection
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
