id: 10101-set-image-fill-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 100x100 rectangle named Photo, then call set_image_fill with base64 data of a tiny
  1x1 PNG you encode yourself. When you are done, call viewport_zoom_to_fit, then verify the result with the available MCP
  tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- set_image_fill
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- set_image_fill
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
