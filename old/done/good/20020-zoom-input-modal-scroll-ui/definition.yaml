id: 20020-zoom-input-modal-scroll-ui
start_url: http://cua_designpen.web
prompt: 'Draw an ellipse (O + drag). Then open the zoom dropdown in the top-right corner of the editor, type 250
  into its zoom percentage input, and confirm with Enter so the zoom reads exactly 250%.


  While completing this workflow, actively try to break the app: (1) before the final value, feed the zoom input
  hostile values — "abc", "0", "999999", and "-50" — each should be rejected or clamped with the indicator, input,
  and canvas staying consistent; (2) type a value into the zoom input and press Escape mid-entry — the previous
  zoom must be retained, not a half-applied value; (3) open the Share dialog from the toolbar, and while the modal
  is open scroll the mouse wheel and press Cmd+= / Cmd+- over the dialog — check whether the canvas zooms or pans
  underneath the modal and whether the dialog itself misbehaves; close it cleanly with Escape. Finish with the zoom
  at exactly 250% and the ellipse intact. After each break attempt, recover (undo, or redo the step cleanly) so
  the final document matches the workflow described above.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens), state lost after navigation
  or reload, inconsistent state between the canvas and the panels, and unhelpful or missing error messages all count
  as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message,
  end with exactly "adversarial-report: complete".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
- browser_scroll_to
- browser_press_key
- browser_type
- browser_wait
- browser_get_page_text
- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
required_tools:
- browser
rewards:
- name: Adversarial report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'adversarial-report: complete'
