id: 30002-batch-update-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: use create_shape to make two 100x100 rectangles named Card A (at 0,0) and Card B (at 150,0),
  then use batch_update to set width=150 on both cards in a single operations JSON call. When you are done, call viewport_zoom_to_fit,
  then verify the result with the available MCP tools and report what you found.

  While completing this workflow, actively try to break the app through the tools: call batch_update with an operations string
  that is not valid JSON (e.g. "{oops"); call batch_update with a mixed batch where one operation targets Card A validly and
  another targets a nonexistent id "node-does-not-exist" and a third omits the id field entirely, then check whether the batch
  applied partially or atomically; verify any rejection is a structured status/code/message payload, not a free-form string.
  Recover from any errors and finish the workflow described above.

  Log every defect you find using exactly this format, one block per defect:

  DEFECT #<n> Steps: <exact MCP tool calls with their arguments to reproduce> Observed: <what actually happened> Expected:
  <what should have happened> Severity: <critical | major | minor | cosmetic>

  Broken rendering, crashes, freezes, silent failures (invalid input accepted but nothing happens or a success response is
  returned), partial application of a batch that was supposed to be atomic, state lost after navigation or reload, inconsistent
  state between the canvas and the tool responses, and free-form or unstructured error messages (any error that is not a structured
  status/code/message payload) all count as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very
  end of your final message, end with exactly "adversarial-report: complete".'
available_tools:
- batch_update
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- batch_update
rewards:
- name: Adversarial report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'adversarial-report: complete'
