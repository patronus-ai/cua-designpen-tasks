id: 00001-screenshot-and-describe
start_url: "http://cua_designpen.web"
prompt: |
  Navigate to http://cua_designpen.web and take a screenshot.
  Describe what you see on the page in detail.

available_tools:
  - browser_navigate
  - browser_screenshot
  - browser_click
  - browser_type
  - browser_wait

# cua_designpen has no sqlite database (state is client-side yjs),
# so no DB diff/query rewards are possible.
rewards:
  - name: "Took screenshot"
    kind: action
    tool: browser_screenshot
