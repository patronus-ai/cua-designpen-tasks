id: 00002-tool-arrow-ui
start_url: http://cua_designpen.web
prompt: 'Activate the Arrow tool (shape flyout on the toolbar > Arrow, or press Shift+L), then drag on the canvas
  from left to right for about 200px to draw a rightward-pointing arrow.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Arrow drawn on canvas
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a line layer named like an arrow exists
    path: $.data.nodes[?(@.type=='LINE'&@.name=='Arrow 1')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
