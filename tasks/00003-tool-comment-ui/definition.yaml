id: 00003-tool-comment-ui
start_url: http://cua_designpen.web
prompt: 'Activate the Comment tool (toolbar Comment button or press C), click near the middle of the canvas to drop
  a comment pin, type "needs review" in the composer, and submit the comment.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Comment thread created with expected text
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a comment thread exists
    path: $.data.comments
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: message mentions needs review
    path: $.data.comments[0].messages[0].body
    operator: STRING_CONTAINS
    expected: needs review
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
