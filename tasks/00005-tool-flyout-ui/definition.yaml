id: 00005-tool-flyout-ui
start_url: http://cua_designpen.web
prompt: 'Using the toolbar flyout menus (click the chevron next to a grouped toolbar button to expand it), draw
  two shapes that are not on the top-level toolbar: first open the shape flyout, pick Star, and drag out a star;
  then reopen the flyout, pick Polygon, and drag out a polygon.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Flyout-only shapes drawn
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a star node exists
    path: $.data.nodes[?(@.type=='STAR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: a polygon node exists
    path: $.data.nodes[?(@.type=='POLYGON')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
