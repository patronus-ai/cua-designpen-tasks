id: 00007-tool-hand-ui
start_url: http://cua_designpen.web
prompt: 'Activate the Hand tool (Move flyout on the toolbar > Hand, or press H) and drag the canvas a few hundred
  pixels in any direction to pan the viewport. Do not draw anything.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Setup-only (grade via UI observation): Viewport panned via hand tool (no canvas trace)'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: document state readable
    path: $.data.nodes
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
