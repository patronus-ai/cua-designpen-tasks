id: 00008-tool-line-ui
start_url: http://cua_designpen.web
prompt: 'Activate the Line tool (shape flyout > Line, or press L) and drag horizontally across the canvas to draw
  a straight line about 300px long.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Line drawn
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a plain line layer exists
    path: $.data.nodes[?(@.type=='LINE'&@.name=='Line 1')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
