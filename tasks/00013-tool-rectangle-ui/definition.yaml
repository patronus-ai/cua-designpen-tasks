id: 00013-tool-rectangle-ui
start_url: http://cua_designpen.web
prompt: 'Activate the Rectangle tool (press R or pick shape flyout > Rectangle), drag out a rectangle, then use
  the W and H fields in the right-hand panel to set its size to exactly 240 wide by 140 tall.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle with exact dimensions
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: rectangle 240 wide exists
    path: $.data.nodes[?(@.type=='RECTANGLE'&@.width==240)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: rectangle 140 tall exists
    path: $.data.nodes[?(@.type=='RECTANGLE'&@.height==140)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
