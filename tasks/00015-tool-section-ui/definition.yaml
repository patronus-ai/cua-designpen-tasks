id: 00015-tool-section-ui
start_url: http://cua_designpen.web
prompt: 'Activate the Section tool (Frame flyout on the toolbar > Section, or press S) and drag out a large section
  area on the canvas, roughly 800 by 600. The default name is fine.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Section created
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a section node exists
    path: $.data.nodes[?(@.type=='SECTION')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
