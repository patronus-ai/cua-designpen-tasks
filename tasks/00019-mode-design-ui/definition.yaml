id: 00019-mode-design-ui
start_url: http://cua_designpen.web
prompt: 'Using the segmented mode control in the toolbar, switch the editor to Dev mode and confirm the drawing
  tools disappear from its read-only toolbelt. Then click the Design segment to return to the regular full-editing
  Design mode and prove editing is re-enabled by picking the Rectangle tool (R) and dragging out a rectangle near
  the middle of the canvas — this is only possible once Design mode is active again.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle drawn after returning to Design mode
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a rectangle node exists
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
