id: 00021-mode-draw-ui
start_url: http://cua_designpen.web
prompt: 'Click the Draw segment of the mode control in the toolbar to switch the editor into the stripped-down Draw
  mode, then pick the Pencil from Draw mode''s prominent freehand tool group and sketch a loose wavy squiggle in
  one continuous drag on the canvas.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Freehand vector sketched in Draw mode
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a vector node exists
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
