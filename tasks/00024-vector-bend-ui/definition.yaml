id: 00024-vector-bend-ui
start_url: http://cua_designpen.web
prompt: 'Draw a straight line between two points with the Pen tool (P) and commit with Enter. Double-click the line
  to enter vector edit mode, activate the Bend subtool from the vector edit toolbar (or hold Cmd/Ctrl for temporary
  Bend), and drag the middle of the segment so the line bows outward into a smooth arc.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Curved vector path exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: path segment present
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.segments[0]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
