id: 00026-vector-box-transform-ui
start_url: http://cua_designpen.web
prompt: 'With the Pen tool (P), draw a small closed triangle (click three points and close on the first) and commit.
  Double-click it to enter vector edit mode, press Cmd+A to select all vertices, then drag a corner handle of the
  transform box that appears around them to stretch the whole outline noticeably bigger.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Closed vector shape exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: closed region present
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.regions[0]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
