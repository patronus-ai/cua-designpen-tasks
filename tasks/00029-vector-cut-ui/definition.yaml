id: 00029-vector-cut-ui
start_url: http://cua_designpen.web
prompt: 'Draw a single straight line with the Pen tool (P) and commit. Double-click it to enter vector edit mode,
  activate the Cut subtool from the vector edit toolbar (or press X), and click somewhere along the line to slice
  it apart.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Line sliced into two vector layers
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: two vector pieces exist
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
