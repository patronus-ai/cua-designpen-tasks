id: 00033-vector-edit-exit-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle (R + drag), double-click it to enter vector edit mode, and drag one of its corner points
  inward so it gets a slanted edge. Then commit and exit the edit session by clicking on empty canvas outside the
  shape (the vector edit toolbar''s X button or the Enter/Esc ladder also work).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle converted to vector by point edit
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
