id: 00034-vector-edit-mode-ui
start_url: http://cua_designpen.web
prompt: 'Draw a circle with the Ellipse tool (O). Double-click the circle (or select it and press Enter) to enter
  vector edit mode — the parametric ellipse is converted to an editable vector — then drag one of its outline points
  outward to turn it into an egg shape.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Ellipse reshaped into a vector
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
