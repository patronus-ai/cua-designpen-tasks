id: 00036-vector-handle-drag-ui
start_url: http://cua_designpen.web
prompt: 'Draw a short line with the Pen tool (P) and commit. Double-click it to enter vector edit mode, select one
  endpoint, and drag its direction handle tip out and away so the stroke leaves that point as a curve.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Line vector with editable segment exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: path segment present
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.segments[0]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
