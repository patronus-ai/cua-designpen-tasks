id: 00037-vector-handle-mirroring-ui
start_url: http://cua_designpen.web
prompt: 'Draw a curved path with the Pen tool (click-drag two or three points to create smooth vertices) and commit.
  Double-click it to enter vector edit mode, select a smooth vertex that has two handles, and in the panel''s Mirroring
  section set the handle mirroring to the fully mirrored option (angle and length).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Vertex mirroring set to ANGLE_AND_LENGTH
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: a vertex has fully mirrored handles
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.vertices[?(@.handleMirroring=='ANGLE_AND_LENGTH')]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
