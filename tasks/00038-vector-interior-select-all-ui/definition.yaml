id: 00038-vector-interior-select-all-ui
start_url: http://cua_designpen.web
prompt: 'Draw a closed triangle with the Pen tool (P) and commit. Double-click it to enter vector edit mode, click
  once inside the shape''s fill area to select every vertex at once, then drag the whole outline a bit to the right.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Closed vector shape exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: closed region present
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.regions[0]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
