id: 00039-vector-lasso-ui
start_url: http://cua_designpen.web
prompt: 'Draw a 5-point zigzag with the Pen tool (P) and commit. Double-click it to enter vector edit mode, activate
  the Lasso subtool from the vector edit toolbar (or press Q), sweep a freehand loop around two of the points to
  select just those, and nudge them upward with the arrow keys.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 5-point zigzag vector exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: network has at least 5 vertices
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.vertices[4]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
