id: 00040-vector-lasso-select-ui
start_url: http://cua_designpen.web
prompt: 'Draw a wavy line with at least 3 points using the Pen tool (P) and commit. Double-click it to enter vector
  edit mode, activate the Lasso subtool (Q), drag a freehand loop around the middle point(s), and drag the caught
  points downward together.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Multi-point vector path exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: network has at least 3 vertices
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.vertices[2]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
