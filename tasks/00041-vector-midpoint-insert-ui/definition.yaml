id: 00041-vector-midpoint-insert-ui
start_url: http://cua_designpen.web
prompt: 'Draw one straight line with the Pen tool (P) and commit. Double-click it to enter vector edit mode; hover
  the middle of the segment so its midpoint dot appears, then drag that midpoint dot upward to insert a new vertex
  there and pull it up.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Line gained a third vertex
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: midpoint insertion produced a 3rd vertex
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.vertices[2]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
