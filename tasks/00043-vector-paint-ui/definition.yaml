id: 00043-vector-paint-ui
start_url: http://cua_designpen.web
prompt: 'Draw a closed loop with the Pen tool (P) and commit. Double-click it to enter vector edit mode, activate
  the Paint subtool from the vector edit toolbar (or press Shift+B), and click inside the enclosed area to flood
  it with color.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Painted region with fill exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: closed region present
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.regions[0]
    operator: EXISTS
    expected: 'true'
  - name: fill present on vector
    path: $.data.nodes[?(@.type=='VECTOR')].fills[0]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
