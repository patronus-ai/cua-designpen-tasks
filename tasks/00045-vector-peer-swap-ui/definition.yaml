id: 00045-vector-peer-swap-ui
start_url: http://cua_designpen.web
prompt: 'Draw a straight line with the Pen tool (P), commit, and double-click it to enter vector edit mode. Use
  the Cut subtool (X) to slice it into two separate pieces. Then switch back to the Move subtool (V) and grab a
  vertex on the other piece — the one you were not just editing — and drag it somewhere new.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Two cut pieces exist
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: two vector pieces exist
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
