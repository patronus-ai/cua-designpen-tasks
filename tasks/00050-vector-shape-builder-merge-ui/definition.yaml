id: 00050-vector-shape-builder-merge-ui
start_url: http://cua_designpen.web
prompt: 'Draw a closed square with the Pen tool, add a line straight across it so it splits into two cells, and
  with the Shape builder subtool (M) click each cell so both are filled. Then drag a sweep across the divider line
  from one filled cell into the other.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Merged filled region exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: fill present on vector
    path: $.data.nodes[?(@.type=='VECTOR')].fills[0]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
