id: 00051-vector-shape-builder-remove-ui
start_url: http://cua_designpen.web
prompt: 'Draw a closed shape with the Pen tool (P), commit, double-click to enter vector edit mode, and fill its
  inside using the Shape builder subtool (M). Then hold Alt and drag a sweep back over the filled area to strip
  the fill away.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Vector shape remains after fill removal
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
