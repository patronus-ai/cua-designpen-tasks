id: 00052-vector-toggle-smooth-ui
start_url: http://cua_designpen.web
prompt: 'Draw a sharp zigzag with the Pen tool (P) and commit. Double-click it to enter vector edit mode, switch
  to the Bend subtool (or hold Cmd/Ctrl), and click once — without dragging — on one of the middle corner points.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Corner converted to smooth vertex
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: a vertex became smooth (mirrored handles)
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.vertices[?(@.handleMirroring=='ANGLE_AND_LENGTH')]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
