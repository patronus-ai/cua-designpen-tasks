id: 00053-vector-variable-width-ui
start_url: http://cua_designpen.web
prompt: 'Draw a straight stroke with the Pen tool (P) and commit. Double-click it to enter vector edit mode, activate
  the Variable width subtool (vector edit toolbar "More" menu > Variable width, or press Shift+W), and drag on the
  middle of the stroke to make it swell thicker there than at its ends, calligraphy style.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Stroke width profile exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: stroke carries a width profile point
    path: $.data.nodes[?(@.type=='VECTOR')].strokeWidthProfile.points[0]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
