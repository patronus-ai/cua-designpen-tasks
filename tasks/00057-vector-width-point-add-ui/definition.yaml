id: 00057-vector-width-point-add-ui
start_url: http://cua_designpen.web
prompt: 'Draw a line with the Pen tool (P) and commit. Double-click it to enter vector edit mode, activate the Variable
  width subtool (More menu > Variable width, or Shift+W), and click or drag on a spot along the stroke to add a
  width point that bulges wider than the rest.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Width point added to stroke
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: a variable-width point exists on the stroke
    path: $.data.nodes[?(@.type=='VECTOR')].strokeWidthProfile.points[0]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
