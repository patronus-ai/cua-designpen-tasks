id: 00058-vector-width-point-delete-ui
start_url: http://cua_designpen.web
prompt: 'Draw a line with the Pen tool (P), commit, enter vector edit mode (double-click), and with the Variable
  width subtool (Shift+W) add a bulge width point on the stroke. Then click that width point to select it and press
  Delete.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Vector line remains after bulge removal
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
