id: 00059-vector-width-point-edit-ui
start_url: http://cua_designpen.web
prompt: 'Draw a line with the Pen tool (P), commit, enter vector edit mode (double-click), and add a width point
  somewhere along the stroke with the Variable width subtool (Shift+W). Then double-click that width point and type
  20 into the numeric input to set its thickness exactly.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Width point set to 20
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: a width point has width 20
    path: $.data.nodes[?(@.type=='VECTOR')].strokeWidthProfile.points[?(@.width==20)]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
