id: 00060-vector-zero-handles-ui
start_url: http://cua_designpen.web
prompt: 'Draw a curvy path with the Pen tool (click-drag points to make smooth vertices) and commit. Double-click
  it to enter vector edit mode, select one of its smooth points, and use the handle action in the right-hand vector
  edit panel to zero out its direction handles.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Curved vector path exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: path segment present
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.segments[0]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
