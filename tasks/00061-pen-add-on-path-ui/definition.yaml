id: 00061-pen-add-on-path-ui
start_url: http://cua_designpen.web
prompt: 'Select the Pen tool (P) and draw a straight two-point line, clicking at roughly (200,300) and (500,300),
  then press Enter to commit the chain while staying in the vector edit session. With the pen still active, click
  on the middle of the segment at about (350,300) so an extra anchor point is inserted onto the path itself.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Line gained a third anchor
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: inserted anchor made it 3 vertices
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.vertices[2]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
