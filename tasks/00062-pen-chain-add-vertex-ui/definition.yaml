id: 00062-pen-chain-add-vertex-ui
start_url: http://cua_designpen.web
prompt: 'Select the Pen tool (P) and click out a zigzag point by point — 5 clicks alternating up and down (e.g.
  (100,300), (160,200), (220,300), (280,200), (340,300)) — then press Escape to commit it.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 5-point pen zigzag exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: network has at least 5 vertices
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.vertices[4]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
