id: 00063-pen-chain-from-vertex-ui
start_url: http://cua_designpen.web
prompt: 'With the Pen tool (P), draw a Y-shaped path: first click the stem from (300,500) up to (300,350) and end
  the chain (Escape once to break the chain but stay in the edit session). Then pen-click the top stem vertex at
  (300,350) to branch a new chain from it and click out the first arm to (240,250); break the chain again, pen-click
  (300,350) once more, and draw the second arm to (360,250). Commit when done.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Branched Y path exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: Y shape has 4 vertices
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.vertices[3]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
