id: 00063-pen-chain-from-vertex-ui
start_url: http://cua_designpen.web
prompt: 'With the Pen tool (P), draw a Y-shaped path: first click the stem from (300,500) up to (300,350) and end
  the chain (Escape once to break the chain but stay in the edit session). Then pen-click the top stem vertex at
  (300,350) to branch a new chain from it and click out the first arm to (240,250); break the chain again, pen-click
  (300,350) once more, and draw the second arm to (360,250). Commit when done.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
- browser_scroll_to
- browser_press_key
- browser_type
- browser_wait
- browser_get_page_text
- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
required_tools:
- browser
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
