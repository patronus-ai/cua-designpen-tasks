id: 00064-pen-close-path-ui
start_url: http://cua_designpen.web
prompt: 'Select the Pen tool (P) and click three triangle corners (e.g. (200,400), (400,400), (300,250)), then close
  the shape by clicking back exactly on the very first point you placed.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Closed pen triangle with region
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: network has at least 3 vertices
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.vertices[2]
    operator: EXISTS
    expected: 'true'
  - name: closed region present
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.regions[0]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
