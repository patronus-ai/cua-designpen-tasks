id: 00065-pen-commit-into-session-ui
start_url: http://cua_designpen.web
prompt: 'With the Pen tool (P), draw a V (three clicks: (200,250), (260,350), (320,250)) and press Enter to commit
  the live chain while remaining in the same vector edit session. Still in that session with the pen, draw one more
  separate short two-point stroke nearby (e.g. (380,250) to (440,300)) and commit it too, then exit the session
  with Escape.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Single layer holds both strokes
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: exactly one vector layer
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: == 1
  - name: layer contains both strokes (5 vertices)
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.vertices[4]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
