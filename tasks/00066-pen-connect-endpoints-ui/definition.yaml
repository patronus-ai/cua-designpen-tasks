id: 00066-pen-connect-endpoints-ui
start_url: http://cua_designpen.web
prompt: 'With the Pen tool (P), inside one vector edit session draw two separate open strokes (commit the first
  chain with Enter, then draw the second). Then pen-click a loose endpoint of one stroke and click the loose endpoint
  of the other stroke so the two are welded into a single continuous path. Exit the session.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Connected path in one layer
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: exactly one vector layer
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: == 1
  - name: network has at least 3 vertices
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.vertices[2]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
