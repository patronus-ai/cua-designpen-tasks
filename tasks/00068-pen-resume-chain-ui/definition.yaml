id: 00068-pen-resume-chain-ui
start_url: http://cua_designpen.web
prompt: 'With the Pen tool (P), draw an open 3-point path (clicks at (200,300), (280,220), (360,300)) and finish
  it by exiting the edit session. Then re-enter edit mode on that same path (double-click it), pick the Pen tool,
  click the path''s open endpoint at (360,300) to resume the chain, and add 2 more points ((440,220) and (520,300)).
  Commit and exit.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
- browser_scroll_to
- browser_press_key
- browser_type
- browser_wait
- browser_get_page_text
- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
required_tools:
- browser
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
