id: 00068-pen-resume-chain-ui
start_url: http://cua_designpen.web
prompt: 'With the Pen tool (P), draw an open 3-point path (clicks at (200,300), (280,220), (360,300)) and finish
  it by exiting the edit session. Then re-enter edit mode on that same path (double-click it), pick the Pen tool,
  click the path''s open endpoint at (360,300) to resume the chain, and add 2 more points ((440,220) and (520,300)).
  Commit and exit.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Resumed path grew to 5 points in one layer
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: exactly one vector layer
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: == 1
  - name: resumed chain reached 5 vertices
    path: $.data.nodes[?(@.type=='VECTOR')].vectorNetwork.vertices[4]
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
