id: 00069-canvas-alt-duplicate-drag-ui
start_url: http://cua_designpen.web
prompt: 'Draw a 100x100 square, then hold Alt/Option and drag it about 200px to the right so a copy peels off while
  the original stays in place.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Alt-drag produced a duplicate
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: two rectangles exist
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
