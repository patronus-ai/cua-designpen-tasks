id: 00070-canvas-alt-edge-fill-ui
start_url: http://cua_designpen.web
prompt: 'Create a frame containing two rectangles side by side and convert the frame to a horizontal auto-layout.
  Select one of the child rectangles, then hold Alt/Option and double-click its side (left or right) resize handle
  so its horizontal sizing switches to fill the available space along the row.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Child sizing set to fill
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a child with fill sizing exists
    path: $.data.nodes[?(@.layoutGrow==1)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
