id: 00071-canvas-create-text-ui
start_url: http://cua_designpen.web
prompt: 'Select the Text tool (T), click an empty spot on the canvas, type "Hello there", then click away on empty
  canvas to commit it.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Text layer with typed content
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: text layer says Hello there
    path: $.data.nodes[?(@.type=='TEXT'&@.name=='Hello there')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
