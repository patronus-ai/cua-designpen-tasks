id: 00072-canvas-dblclick-edit-text-ui
start_url: http://cua_designpen.web
prompt: 'Create a text layer that says "Draft v1". Then double-click directly on it on the canvas to enter text
  editing, select all its content, and retype it to "Final copy". Click away to commit.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Text edited in place
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: updated wording present
    path: $.data.nodes[?(@.type=='TEXT'&@.name=='Final copy')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: old wording gone
    path: $.data.nodes[?(@.type=='TEXT'&@.name=='Draft v1')]
    operator: ARRAY_LENGTH
    expected: <= 0
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
