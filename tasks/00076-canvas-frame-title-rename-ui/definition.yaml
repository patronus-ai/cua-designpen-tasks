id: 00076-canvas-frame-title-rename-ui
start_url: http://cua_designpen.web
prompt: 'Create a frame, then double-click the small title label floating just above its top-left corner, type "Hero
  Banner", and press Enter to commit the rename.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Frame renamed via title label
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: frame named Hero Banner exists
    path: $.data.nodes[?(@.type=='FRAME'&@.name=='Hero Banner')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
