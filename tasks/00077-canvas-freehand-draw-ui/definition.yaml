id: 00077-canvas-freehand-draw-ui
start_url: http://cua_designpen.web
prompt: 'Select the Pencil tool (Shift+P) and freehand-sketch two separate squiggles, each drawn in its own single
  drag. The tool stays active after each stroke, so just drag twice in different spots.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Two freehand strokes drawn
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: two vector nodes exist
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
