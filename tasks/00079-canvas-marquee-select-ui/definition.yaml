id: 00079-canvas-marquee-select-ui
start_url: http://cua_designpen.web
prompt: 'Scatter three small circles around the canvas. Starting the drag from empty space, rubber-band a marquee
  across all three in one drag so they are selected together, then press Delete to remove them all at once.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Marquee-selected nodes deleted together
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: no ellipses remain
    path: $.data.nodes[?(@.type=='ELLIPSE')]
    operator: ARRAY_LENGTH
    expected: <= 0
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
