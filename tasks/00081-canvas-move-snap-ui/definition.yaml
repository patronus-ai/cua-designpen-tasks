id: 00081-canvas-move-snap-ui
start_url: http://cua_designpen.web
prompt: 'Place two squares. Set the first one''s Y to exactly 300 by typing it into the position field in the right
  panel. Then drag the second square around near the first until the red smart guides appear and snap it level —
  tops aligned — and release. Do not type the number for the second square.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Second node snapped to same y
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: two rectangles aligned at y 300
    path: $.data.nodes[?(@.type=='RECTANGLE'&@.y==300)]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
