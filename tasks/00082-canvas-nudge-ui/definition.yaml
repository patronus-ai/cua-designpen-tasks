id: 00082-canvas-nudge-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and set its X to exactly 100 by typing it in the right panel. Then, with the rectangle
  selected and using only keyboard nudges, push it right until X reads exactly 110 — a single Shift+ArrowRight (10px
  nudge) does it.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Node nudged by keyboard
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: rectangle at x 110
    path: $.data.nodes[?(@.type=='RECTANGLE'&@.x==110)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
