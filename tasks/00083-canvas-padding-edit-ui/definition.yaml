id: 00083-canvas-padding-edit-ui
start_url: http://cua_designpen.web
prompt: 'Build an auto-layout frame with a rectangle inside. Select the frame, hover the padding band along its
  left edge, and double-click it to open the on-canvas padding editor popover, then set the left padding to exactly
  40.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Padding edited on canvas
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a node with left padding 40 exists
    path: $.data.nodes[?(@.paddingLeft==40)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
