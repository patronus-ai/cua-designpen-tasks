id: 00086-canvas-pinch-zoom-ui
start_url: http://cua_designpen.web
prompt: 'Zoom the canvas in with a pinch gesture — on most setups Ctrl+scroll acts as the trackpad pinch. Get noticeably
  closer than the default zoom level.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Setup-only (grade via UI observation): Pinch zoom performed (viewport only, no canvas trace)'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: document state readable
    path: $.data.nodes
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
