id: 00091-canvas-shift-select-ui
start_url: http://cua_designpen.web
prompt: 'Lay down three squares in a row. Click the first one, then Shift-click the third so the two outer squares
  are selected together, and press Delete to remove that pair.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Shift-selected pair deleted
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: at least one rectangle remains
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: at most one rectangle remains
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: <= 1
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
