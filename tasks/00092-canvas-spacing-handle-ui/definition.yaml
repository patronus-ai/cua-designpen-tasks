id: 00092-canvas-spacing-handle-ui
start_url: http://cua_designpen.web
prompt: 'Make two squares 100 wide each: type in x=100 for the first and x=300 for the second using the panel fields.
  Select both squares, hover the midpoint of the gap between them so the smart-selection gap handle appears, and
  drag it until the gap is exactly 50 — the second square should land at x=250.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Gap adjusted via smart-selection handle
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: second square repositioned to x 250
    path: $.data.nodes[?(@.type=='RECTANGLE'&@.x==250)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
