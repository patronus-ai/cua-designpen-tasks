id: 00093-canvas-wheel-pan-zoom-ui
start_url: http://cua_designpen.web
prompt: 'Scroll the mouse wheel / trackpad to pan the canvas around a bit, then hold Ctrl (or Cmd) while scrolling
  to zoom in — finish zoomed in noticeably tighter than you started.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Setup-only (grade via UI observation): Wheel pan and zoom performed (viewport only, no canvas trace)'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: document state readable
    path: $.data.nodes
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
