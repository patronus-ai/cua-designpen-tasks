id: 00094-enter-ladder-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, keep it selected, and press Enter to drop into editing its points (vector edit mode).
  Drag one corner point inward so the shape becomes an irregular four-sided polygon, then press Enter or Escape
  to leave the edit session.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Shape converted by point edit via Enter
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a vector node exists
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: no plain rectangle remains
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: <= 0
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
