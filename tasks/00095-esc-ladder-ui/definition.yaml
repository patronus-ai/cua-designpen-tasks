id: 00095-esc-ladder-ui
start_url: http://cua_designpen.web
prompt: 'With the Text tool, start a text layer and type "escape test". Then back all the way out using only the
  Escape key: press Escape once to exit typing (the text commits and the layer stays selected), then press Escape
  again to clear the selection entirely.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Text committed while escaping out
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: text layer says escape test
    path: $.data.nodes[?(@.type=='TEXT'&@.name=='escape test')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
