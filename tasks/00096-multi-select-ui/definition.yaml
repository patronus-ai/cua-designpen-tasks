id: 00096-multi-select-ui
start_url: http://cua_designpen.web
prompt: 'Draw two circles, then get both selected at the same time — Shift-click the second after clicking the first,
  or rubber-band across both. With both selected, group the pair (Cmd+G).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Multi-selection grouped
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a group node exists
    path: $.data.nodes[?(@.type=='GROUP')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
