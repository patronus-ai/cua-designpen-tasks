id: 00097-set-opacity-digits-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, keep it selected, and tap the 5 key on the keyboard so its opacity drops to 50%.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Opacity set via digit key
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: rectangle opacity is 0.5
    path: $.data.nodes[?(@.type=='RECTANGLE')].opacity
    operator: NUMERIC_MATCH
    expected: '0.5'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
