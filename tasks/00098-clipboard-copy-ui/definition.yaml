id: 00098-clipboard-copy-ui
start_url: http://cua_designpen.web
prompt: 'Draw a small badge-sized rectangle (about 120x80), select it, right-click it, and choose Copy from the
  context menu. (Use the context menu — the main menu Edit > Copy entry is not wired in the web build.)


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Selection copied (clipboard has no canvas trace)
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: the copied rectangle exists
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
