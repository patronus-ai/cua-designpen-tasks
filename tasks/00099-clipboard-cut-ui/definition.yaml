id: 00099-clipboard-cut-ui
start_url: http://cua_designpen.web
prompt: 'Put a rectangle and a star on the canvas. Select the star, then cut it to the clipboard via right-click
  > Cut or Main menu > Edit > Cut.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Selection cut from canvas
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: no star remains
    path: $.data.nodes[?(@.type=='STAR')]
    operator: ARRAY_LENGTH
    expected: <= 0
  - name: rectangle still present
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
