id: 00102-copy-as-png-ui
start_url: http://cua_designpen.web
prompt: 'Draw a small rectangle, select it, right-click, and choose Copy/Paste as > Copy as PNG to copy it to the
  clipboard as a raster image. (The ⌘⇧C shortcut shown on the menu label is display-only and not wired — use the
  menu item.)


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Copied as PNG (clipboard has no canvas trace)
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: source rectangle exists
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
