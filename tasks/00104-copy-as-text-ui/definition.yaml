id: 00104-copy-as-text-ui
start_url: http://cua_designpen.web
prompt: 'Create a text layer that says "clipboard check", select it, right-click, and choose Copy/Paste as > Copy
  as text to copy just its plain text content.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Copied as text (clipboard has no canvas trace)
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: source text layer exists
    path: $.data.nodes[?(@.type=='TEXT'&@.name=='clipboard check')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
