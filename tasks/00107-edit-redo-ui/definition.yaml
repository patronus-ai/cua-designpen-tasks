id: 00107-edit-redo-ui
start_url: http://cua_designpen.web
prompt: 'Draw a circle, press Cmd+Z so it disappears from the canvas, then redo with Cmd+Shift+Z (or Main menu >
  Edit > Redo) to bring it right back.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Circle restored by redo
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: exactly one ellipse present
    path: $.data.nodes[?(@.type=='ELLIPSE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: no extra ellipses
    path: $.data.nodes[?(@.type=='ELLIPSE')]
    operator: ARRAY_LENGTH
    expected: <= 1
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
