id: 00109-paste-to-replace-ui
start_url: http://cua_designpen.web
prompt: 'Draw a circle and copy it via right-click > Copy. Then draw a rectangle, select the rectangle, right-click
  it, and choose "Paste to replace" so the rectangle is swapped out for a copy of the circle.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Selection replaced by clipboard content
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: two ellipses exist
    path: $.data.nodes[?(@.type=='ELLIPSE')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
  - name: no rectangle remains
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: <= 0
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
