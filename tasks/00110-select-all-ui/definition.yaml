id: 00110-select-all-ui
start_url: http://cua_designpen.web
prompt: 'Draw a square, a circle, and a line anywhere on the canvas. Then select every layer on the page in one
  go with Cmd+A (or Main menu > Edit > Select all) and press Delete to clear them all at once.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: All layers selected and cleared
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: no rectangles remain
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: <= 0
  - name: no ellipses remain
    path: $.data.nodes[?(@.type=='ELLIPSE')]
    operator: ARRAY_LENGTH
    expected: <= 0
  - name: no lines remain
    path: $.data.nodes[?(@.type=='LINE')]
    operator: ARRAY_LENGTH
    expected: <= 0
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
