id: 00111-selection-delete-ui
start_url: http://cua_designpen.web
prompt: 'Draw two stars, click one of them to select it, and press Delete (or Backspace, or right-click > Delete)
  to remove it.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Selected node deleted
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: at least one star remains
    path: $.data.nodes[?(@.type=='STAR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: at most one star remains
    path: $.data.nodes[?(@.type=='STAR')]
    operator: ARRAY_LENGTH
    expected: <= 1
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
