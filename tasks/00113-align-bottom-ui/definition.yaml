id: 00113-align-bottom-ui
start_url: http://cua_designpen.web
prompt: 'Draw two 100x100 squares, one at x=100, y=100 and one at x=300, y=260. Select both and align their bottom
  edges using Main menu > Arrange > Align Bottom (or the alignment row at the top of the design panel). The lower
  square must not move.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Bottom edges aligned
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: both squares share the lower bottom edge
    path: $.data.nodes[?(@.type=='RECTANGLE' & @.y==260)]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
