id: 00114-align-center-h-ui
start_url: http://cua_designpen.web
prompt: 'Draw two 100x100 squares, one at (100, 100) and one at (300, 300). Select both and align them to their
  shared horizontal center using Main menu > Arrange > Align Center (or the design panel alignment row).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Horizontal centers aligned
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: both squares centered at combined midline x=200
    path: $.data.nodes[?(@.type=='RECTANGLE' & @.x==200)]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
