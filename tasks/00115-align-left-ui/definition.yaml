id: 00115-align-left-ui
start_url: http://cua_designpen.web
prompt: 'Draw two 100x100 squares, the first at x=100, y=100 and the second at x=320, y=240. Select both and align
  their left edges using Main menu > Arrange > Align Left (or the first button in the design panel alignment row).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Left edges aligned
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: both squares at x=100
    path: $.data.nodes[?(@.type=='RECTANGLE' & @.x==100)]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
