id: 00118-align-top-ui
start_url: http://cua_designpen.web
prompt: 'Draw two 100x100 squares at (140, 120) and (300, 320). Select both and align their top edges using Main
  menu > Arrange > Align Top (or the design panel alignment row). The higher square must not move.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Top edges aligned
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: both squares at y=120
    path: $.data.nodes[?(@.type=='RECTANGLE' & @.y==120)]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
