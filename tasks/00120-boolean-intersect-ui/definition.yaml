id: 00120-boolean-intersect-ui
start_url: http://cua_designpen.web
prompt: 'Draw two partially overlapping rectangles with the rectangle tool (R), select both, and combine them via
  Main menu > Object > Intersect selection.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Intersect result exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: boolean intersect node present
    path: $.data.nodes[?(@.type=='BOOLEAN_OPERATION' & @.booleanOperation=='INTERSECT')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
