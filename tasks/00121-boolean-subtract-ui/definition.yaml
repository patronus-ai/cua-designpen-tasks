id: 00121-boolean-subtract-ui
start_url: http://cua_designpen.web
prompt: 'Draw a large rectangle (about 300x200), then a smaller rectangle (about 100x100) partly overlapping it.
  Select both and carve the small one out of the big one via Main menu > Object > Subtract selection.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Subtract result exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: boolean subtract node present
    path: $.data.nodes[?(@.type=='BOOLEAN_OPERATION' & @.booleanOperation=='SUBTRACT')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
