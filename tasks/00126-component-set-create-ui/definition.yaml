id: 00126-component-set-create-ui
start_url: http://cua_designpen.web
prompt: 'Draw two rectangles. Turn each into a component (select one, press Cmd+Alt+K; repeat for the other). Then
  select both components and combine them into a component set with Cmd+Shift+K (or Main menu > Object > Create
  component set).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Component set exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: component set node present
    path: $.data.nodes[?(@.type=='COMPONENT_SET')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
