id: 00130-frame-selection-ui
start_url: http://cua_designpen.web
prompt: 'Draw two rectangles near each other, select both, and wrap them in a new frame via right-click > Frame
  selection (also available under Main menu > Object > Frame Selection).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Frame wraps the shapes
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: frame node present
    path: $.data.nodes[?(@.type=='FRAME')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: both rectangles still exist
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
