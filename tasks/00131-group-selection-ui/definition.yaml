id: 00131-group-selection-ui
start_url: http://cua_designpen.web
prompt: 'Draw two circles side by side with the ellipse tool (O), select both, and group them with Cmd+G (or Main
  menu > Object > Group Selection).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Group exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: group node present
    path: $.data.nodes[?(@.type=='GROUP')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: both circles still exist
    path: $.data.nodes[?(@.type=='ELLIPSE')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
