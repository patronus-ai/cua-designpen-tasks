id: 00133-instance-detach-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, make it a component (Cmd+Alt+K), create an instance of it (right-click the component
  > Create instance), then select the instance and detach it from the component with Cmd+Alt+B (or Main menu > Object
  > Detach instance).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Instance detached
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: component still present
    path: $.data.nodes[?(@.type=='COMPONENT')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: no linked instances remain
    path: $.data.nodes[?(@.type=='INSTANCE')]
    operator: NOT_EXISTS
    expected: ''
  - name: detached copy became a frame
    path: $.data.nodes[?(@.type=='FRAME')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
