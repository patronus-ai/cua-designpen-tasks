id: 00134-instance-go-to-main-ui
start_url: http://cua_designpen.web
prompt: 'Draw a shape, make it a component (Cmd+Alt+K), and create an instance of it (right-click the component
  > Create instance). Select the instance, then right-click it and choose Go to main component.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Component and linked copy exist
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: component node present
    path: $.data.nodes[?(@.type=='COMPONENT')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: instance node present
    path: $.data.nodes[?(@.type=='INSTANCE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
