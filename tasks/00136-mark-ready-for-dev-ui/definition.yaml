id: 00136-mark-ready-for-dev-ui
start_url: http://cua_designpen.web
prompt: 'Draw a top-level frame with the frame tool (F), then right-click it and choose Mark as ready for dev.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Frame marked ready for dev
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a node carries build status
    path: $.data.nodes[?(@.sectionStatus=='BUILD')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
