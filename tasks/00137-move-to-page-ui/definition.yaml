id: 00137-move-to-page-ui
start_url: http://cua_designpen.web
prompt: 'Add a second page using the + button in the pages panel. On the first page, draw a circle with the ellipse
  tool (O). Right-click directly on the circle and choose Move to page > Page 2.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Circle moved to second page
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: two pages exist
    path: $.data.nodes[?(@.type=='PAGE')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
  - name: the circle exists
    path: $.data.nodes[?(@.type=='ELLIPSE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
