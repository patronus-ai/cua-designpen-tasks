id: 00138-outline-stroke-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, then add a stroke via the design panel Stroke section''s + button and set its weight
  to 8. With the rectangle selected, right-click it and choose Outline stroke (also under Main menu > Object > Outline
  stroke).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Stroke outlined into vector
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: original rectangle replaced
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: NOT_EXISTS
    expected: ''
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
