id: 00139-outline-text-ui
start_url: http://cua_designpen.web
prompt: 'Create a text layer with the text tool (T) reading LOGO, select it, and convert it to vector outlines via
  Main menu > Object > Outline text (or right-click > Outline text).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Text outlined into vector
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: vector node present
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: no live text remains
    path: $.data.nodes[?(@.type=='TEXT')]
    operator: NOT_EXISTS
    expected: ''
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
