id: 00140-remove-dev-status-ui
start_url: http://cua_designpen.web
prompt: 'Draw a top-level frame with the frame tool (F), right-click it and choose Mark as ready for dev, then right-click
  it again and choose Remove dev status.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Dev status removed
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: frame exists
    path: $.data.nodes[?(@.type=='FRAME')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: no node carries build status
    path: $.data.nodes[?(@.sectionStatus=='BUILD')]
    operator: NOT_EXISTS
    expected: ''
  - name: no node carries completed status
    path: $.data.nodes[?(@.sectionStatus=='COMPLETED')]
    operator: NOT_EXISTS
    expected: ''
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
