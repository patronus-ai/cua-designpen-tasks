id: 00141-rotate-shortcut-ui
start_url: http://cua_designpen.web
prompt: 'Draw a square with the rectangle tool (R). Open Main menu > Preferences and enable "Use Cmd+Alt+Up/Down
  to rotate layers". With the square selected, press Cmd+Alt+Shift+ArrowDown once to rotate it exactly 15 degrees
  clockwise.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Square rotated 15 degrees clockwise
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a node has rotation 15
    path: $.data.nodes[?(@.rotation==15)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
