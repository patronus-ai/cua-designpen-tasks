id: 00142-send-backward-ui
start_url: http://cua_designpen.web
prompt: 'Draw three overlapping squares in this order: a 120x120 first, then a 160x160, then a 200x200 on top. Select
  the 200px square and step it exactly one layer down with Cmd+Alt+ArrowDown, so it ends up between the other two.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Big square moved down one layer
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: 160px square is now topmost
    path: $.data.nodes[-1].width
    operator: NUMERIC_MATCH
    expected: == 160
  - name: 200px square sits one below the top
    path: $.data.nodes[-2].width
    operator: NUMERIC_MATCH
    expected: == 200
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
