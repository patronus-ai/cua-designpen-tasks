id: 00143-send-to-back-ui
start_url: http://cua_designpen.web
prompt: 'Draw a 90x90 square, then a 260x260 square covering it. Select the big square and push it to the bottom
  of the stack with [ (or right-click > Send to back, also under Main menu > Object > Send to Back).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Big square at the back
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: 90px square is topmost
    path: $.data.nodes[-1].width
    operator: NUMERIC_MATCH
    expected: == 90
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
