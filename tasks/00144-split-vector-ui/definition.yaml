id: 00144-split-vector-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, add a thick stroke via the design panel Stroke section''s + button (weight 8), then right-click
  the rectangle and choose Outline stroke. With the resulting vector selected, right-click it and choose Split vector
  to break every loop into its own separate layer.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Vector split into layers
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: multiple vector layers exist
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
