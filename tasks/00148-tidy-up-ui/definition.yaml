id: 00148-tidy-up-ui
start_url: http://cua_designpen.web
prompt: 'Draw three 100x100 squares at x positions 100, 260, and 500, all at y=100. Select all three and click the
  Tidy up button in the design panel''s Position section (only shown for multi-selections) to even out the horizontal
  gaps. The two outer squares must stay in place.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Spacing evened out
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: middle square landed at x=300
    path: $.data.nodes[?(@.type=='RECTANGLE' & @.x==300)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: all three squares exist
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 3'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
