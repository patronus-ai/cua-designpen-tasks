id: 00150-toggle-visibility-ui
start_url: http://cua_designpen.web
prompt: 'Draw a circle with the ellipse tool (O), select it, and hide it with Cmd+Shift+H (or right-click > Show/Hide).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Node hidden
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a hidden node exists
    path: $.data.nodes[?(@.visible==false)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
