id: 00151-ungroup-ui
start_url: http://cua_designpen.web
prompt: 'Draw a square and a circle, select both, group them with Cmd+G, then dissolve the group with Cmd+Shift+G
  (or Main menu > Object > Ungroup).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Group dissolved
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: no group remains
    path: $.data.nodes[?(@.type=='GROUP')]
    operator: NOT_EXISTS
    expected: ''
  - name: square still exists
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: circle still exists
    path: $.data.nodes[?(@.type=='ELLIPSE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
