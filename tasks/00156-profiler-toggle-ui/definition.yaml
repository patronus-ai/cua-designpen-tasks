id: 00156-profiler-toggle-ui
start_url: http://cua_designpen.web
prompt: 'Open Main menu > View > Profiler to turn on the performance profiler overlay.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Setup-only (grade via UI observation): Editor state intact after profiler toggle'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: document state readable
    path: $.data.nodes
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
