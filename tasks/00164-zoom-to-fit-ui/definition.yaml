id: 00164-zoom-to-fit-ui
start_url: http://cua_designpen.web
prompt: 'Draw two rectangles far apart on the canvas (e.g. one near (100, 100) and one near (2500, 1800)), then
  fit everything on screen at once using Main menu > View > Zoom to Fit (shortcut Shift+1).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Content exists to fit
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: both rectangles present
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
