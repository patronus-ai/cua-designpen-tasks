id: 00166-zoom-to-selection-ui
start_url: http://cua_designpen.web
prompt: 'Draw a 50x50 square far out at x=3000, y=2000, keep it selected, and zoom the view onto it using Main menu
  > View > Zoom to Selection (shortcut Shift+2).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Far-out square exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: square at x=3000 present
    path: $.data.nodes[?(@.type=='RECTANGLE' & @.x==3000)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
