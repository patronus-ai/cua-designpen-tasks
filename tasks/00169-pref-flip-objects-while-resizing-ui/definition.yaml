id: 00169-pref-flip-objects-while-resizing-ui
start_url: http://cua_designpen.web
prompt: 'Confirm Main menu > Preferences > "Flip objects while resizing" is enabled (it is on by default). Draw
  a roughly 200x100 rectangle, then grab its right side handle and drag it all the way across and past the left
  edge so the shape flips over instead of stopping at zero width.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle drawn for flip resize
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: rectangle exists
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
