id: 00172-pref-keep-tool-selected-ui
start_url: http://cua_designpen.web
prompt: 'Open the main menu and enable Preferences > "Keep tool selected after use" (off by default). Then pick
  the Rectangle tool once and draw two rectangles back to back without re-selecting the tool in between.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Two rectangles drawn consecutively
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: two rectangles drawn
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
