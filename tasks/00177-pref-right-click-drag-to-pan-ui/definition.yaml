id: 00177-pref-right-click-drag-to-pan-ui
start_url: http://cua_designpen.web
prompt: 'Open the main menu and enable Preferences > "Right-click and drag to pan" (off by default). Then hold the
  right mouse button on the canvas and drag.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Document state reachable
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: document state present (pref leaves no canvas trace)
    path: $.data
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
