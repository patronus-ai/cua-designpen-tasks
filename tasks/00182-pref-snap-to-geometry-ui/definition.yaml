id: 00182-pref-snap-to-geometry-ui
start_url: http://cua_designpen.web
prompt: 'Confirm Main menu > Preferences > "Snap to geometry" is enabled (on by default). Draw a 100x100 square
  at x 100, y 100, then draw a second 100x100 square somewhere below it and drag the second one upward until it
  snaps exactly level with the first — both tops at the same height.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Two rectangles top-aligned by snapping
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: two rectangles share y 100
    path: $.data.nodes[?(@.type=='RECTANGLE' & @.y==100)]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
