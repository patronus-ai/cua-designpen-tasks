id: 00184-pref-snap-to-pixel-grid-ui
start_url: http://cua_designpen.web
prompt: 'Confirm Main menu > Preferences > "Snap to pixel grid" is enabled (on by default), then draw a rectangle
  by dragging it out freehand on the canvas.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle drawn with pixel snapping on
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: rectangle exists
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
