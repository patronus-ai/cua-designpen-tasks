id: 00185-pref-use-cmd-arrows-to-rotate-layers-ui
start_url: http://cua_designpen.web
prompt: 'Open the main menu and enable Preferences > "Use ⌘⌥↑/↓ to rotate layers" (off by default). Draw a rectangle,
  keep it selected, and rotate it exactly one big 15-degree step clockwise using the ⌘⌥ arrow shortcut (use whichever
  of ⌘⌥↑ / ⌘⌥↓ turns it clockwise, pressed once).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle rotated 15 degrees
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: rectangle rotated to 15
    path: $.data.nodes[?(@.type=='RECTANGLE' & @.rotation==15)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
