id: 00189-pref-use-smart-quotes-ui
start_url: http://cua_designpen.web
prompt: 'Confirm Main menu > Preferences > "Use smart quotes/symbols" is enabled (on by default). Add a text layer
  and type exactly: She said "hello" there.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Text contains curly quote
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: text contains a curly opening quote
    path: $.data.nodes[?(@.type=='TEXT')].textContent
    operator: ARRAY_ANY_STRING_CONTAINS
    expected: “
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
