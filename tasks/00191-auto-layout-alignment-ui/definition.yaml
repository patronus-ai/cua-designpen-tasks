id: 00191-auto-layout-alignment-ui
start_url: http://cua_designpen.web
prompt: 'Create a frame about 300x300 containing three 40x40 squares and enable auto layout on the frame (Design
  panel > Layout > Flow). Then, in the auto-layout alignment 3x3 grid, click the bottom-right cell so the whole
  stack tucks into the frame''s bottom-right corner.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Auto-layout aligned bottom-right
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: container aligned to max on both axes
    path: $.data.nodes[?(@.primaryAxisAlign=='MAX' & @.counterAxisAlign=='MAX')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
