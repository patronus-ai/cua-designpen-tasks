id: 00192-auto-layout-cross-gap-ui
start_url: http://cua_designpen.web
prompt: 'Create a frame about 300 wide containing five small 60x24 "chip" rectangles. Enable horizontal auto layout
  (Layout > Flow), turn on Wrap in the Flow controls, then set the cross-axis (vertical) gap field to 40.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Wrap enabled with 40px cross gap
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: wrapped layout with counter-axis spacing 40
    path: $.data.nodes[?(@.layoutWrap=='WRAP' & @.counterAxisSpacing==40)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
