id: 00194-auto-layout-gap-auto-ui
start_url: http://cua_designpen.web
prompt: 'Create a wide frame (about 600x100) with three small 60x40 rectangles and enable horizontal auto layout
  (Layout > Flow). Then open the chevron menu next to the gap field and choose Auto so the leftover space distributes
  between the items.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Gap set to auto (space between)
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: primary axis distributes space between items
    path: $.data.nodes[?(@.primaryAxisAlign=='SPACE_BETWEEN')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
