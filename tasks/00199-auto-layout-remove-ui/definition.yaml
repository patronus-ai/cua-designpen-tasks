id: 00199-auto-layout-remove-ui
start_url: http://cua_designpen.web
prompt: 'Create a frame named "Stack" containing three rectangles and enable vertical auto layout (Layout > Flow).
  Then remove the auto layout again via the Flow control (the "−" / remove-auto-layout option) so the rectangles
  can be dragged freely.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Auto layout removed from Stack
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Stack frame is back to freeform
    path: $.data.nodes[?(@.name=='Stack' & @.layoutMode=='NONE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: the three rectangles still exist
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 3'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
