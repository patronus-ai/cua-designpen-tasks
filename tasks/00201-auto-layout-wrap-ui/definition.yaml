id: 00201-auto-layout-wrap-ui
start_url: http://cua_designpen.web
prompt: 'Create a narrow frame (about 220 wide) with six small 60x24 rectangles, enable horizontal auto layout (Layout
  > Flow), and turn on Wrap in the Flow controls.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Wrap enabled on flex layout
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a layout wraps its items
    path: $.data.nodes[?(@.layoutWrap=='WRAP')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
