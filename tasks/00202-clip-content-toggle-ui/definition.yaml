id: 00202-clip-content-toggle-ui
start_url: http://cua_designpen.web
prompt: 'Draw a frame named "Peek" and place a circle so it sticks halfway out past the frame''s right edge. Select
  the frame and uncheck Design panel > Layout > Clip content.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Peek frame does not clip content
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Peek frame has clipping off
    path: $.data.nodes[?(@.name=='Peek' & @.clipsContent==false)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: the overflowing circle exists
    path: $.data.nodes[?(@.type=='ELLIPSE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
