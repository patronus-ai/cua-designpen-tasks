id: 00204-constraint-pin-diagram-ui
start_url: http://cua_designpen.web
prompt: 'Create a frame and place a small circle in its bottom-right area (a floating-action-button mock). With
  the circle selected, open the constraints controls via the Position section pin toggle and click the right and
  bottom pins in the constraint pin diagram.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Node anchored to bottom-right corner
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: pinned right and bottom
    path: $.data.nodes[?(@.horizontalConstraint=='MAX' & @.verticalConstraint=='MAX')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
