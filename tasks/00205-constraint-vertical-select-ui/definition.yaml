id: 00205-constraint-vertical-select-ui
start_url: http://cua_designpen.web
prompt: 'Create a tall frame (about 200x500) with a rectangle inside. With the rectangle selected, open the constraints
  controls via the Position section pin toggle and set the vertical constraint select to Center.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Vertical constraint set to center
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a node keeps vertical center
    path: $.data.nodes[?(@.verticalConstraint=='CENTER')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
