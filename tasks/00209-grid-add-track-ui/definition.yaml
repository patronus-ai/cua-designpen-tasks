id: 00209-grid-add-track-ui
start_url: http://cua_designpen.web
prompt: 'Create a frame, enable Grid layout via Design panel > Layout > Flow, then use the "+" button in the Grid
  controls to add column tracks until the grid has four columns.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Grid has four columns
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a grid layout exists
    path: $.data.nodes[?(@.layoutMode=='GRID')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: four column tracks total
    path: $.data.nodes[?(@.layoutMode=='GRID')].gridTemplateColumns[*]
    operator: ARRAY_LENGTH
    expected: '>= 4'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
