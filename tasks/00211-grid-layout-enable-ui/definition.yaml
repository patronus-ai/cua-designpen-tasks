id: 00211-grid-layout-enable-ui
start_url: http://cua_designpen.web
prompt: 'Create a frame containing four small squares, select the frame, and switch it to Grid layout via Design
  panel > Layout > Flow.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Grid layout enabled
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a node uses grid layout
    path: $.data.nodes[?(@.layoutMode=='GRID')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
