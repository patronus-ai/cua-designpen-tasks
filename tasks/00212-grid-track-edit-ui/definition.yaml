id: 00212-grid-track-edit-ui
start_url: http://cua_designpen.web
prompt: 'Create a frame and enable Grid layout via Layout > Flow. In the Grid controls, pick one of the column track
  rows and change its sizing mode from flexible to Fixed with a value of 120.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: A grid column is fixed at 120
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fixed 120px column track exists
    path: $.data.nodes[?(@.layoutMode=='GRID')].gridTemplateColumns[?(@.sizing=='FIXED' & @.value==120)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
