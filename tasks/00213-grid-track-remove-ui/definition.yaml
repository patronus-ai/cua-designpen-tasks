id: 00213-grid-track-remove-ui
start_url: http://cua_designpen.web
prompt: 'Create a frame and enable Grid layout via Layout > Flow (it starts with multiple column tracks). Use the
  "x" button on the column track rows in the Grid controls to remove columns until only a single column remains.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Grid reduced to one column
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a grid layout exists
    path: $.data.nodes[?(@.layoutMode=='GRID')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: exactly one column track remains
    path: $.data.nodes[?(@.layoutMode=='GRID')].gridTemplateColumns[*]
    operator: ARRAY_LENGTH
    expected: == 1
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
