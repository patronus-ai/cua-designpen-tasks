id: 00214-independent-corners-toggle-ui
start_url: http://cua_designpen.web
prompt: 'Draw a square, then click the independent-corners toggle in the Appearance section and round just the two
  top corners: set top-left and top-right to 20, keeping bottom-left and bottom-right at 0 — a browser-tab shape.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Only top corners rounded
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: per-corner editing is on
    path: $.data.nodes[?(@.independentCorners==true)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: both top corners are 20
    path: $.data.nodes[?(@.topLeftRadius==20 & @.topRightRadius==20)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
