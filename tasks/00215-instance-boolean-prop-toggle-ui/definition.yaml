id: 00215-instance-boolean-prop-toggle-ui
start_url: http://cua_designpen.web
prompt: 'Build a card component: a rectangle plus a small circle "notification dot", turned into a component. Expose
  the dot''s visibility as a BOOLEAN component property. Place an instance of the card on the canvas, select the
  instance, and switch the dot off via the property checkbox in the Design panel Properties section.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
