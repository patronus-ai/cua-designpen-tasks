id: 00216-instance-switch-variant-ui
start_url: http://cua_designpen.web
prompt: 'Create a button component set with two size variants — "Small" 120 wide and "Large" 220 wide. Place an
  instance of the Small variant on the canvas, select it, and switch it to the Large variant using the Variant section
  select in the Design panel.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Instance switched to Large variant
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a component set exists
    path: $.data.nodes[?(@.type=='COMPONENT_SET')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: the placed copy is now 220 wide
    path: $.data.nodes[?(@.type=='INSTANCE' & @.width==220)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
