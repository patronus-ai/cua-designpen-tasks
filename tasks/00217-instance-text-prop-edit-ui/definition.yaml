id: 00217-instance-text-prop-edit-ui
start_url: http://cua_designpen.web
prompt: 'Build a small button component containing a text label, and expose the label as a TEXT component property
  with default value "Click me". Place an instance, select it, and change the text property in the Design panel
  Properties section to "Buy now".


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Instance label reads 'Buy now'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: an instance exists
    path: $.data.nodes[?(@.type=='INSTANCE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: text 'Buy now' visible on canvas
    path: $.data.nodes[*]
    operator: TEXT_PRESENT
    expected: Buy now
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
