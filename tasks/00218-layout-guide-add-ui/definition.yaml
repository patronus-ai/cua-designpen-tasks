id: 00218-layout-guide-add-ui
start_url: http://cua_designpen.web
prompt: 'Draw a desktop-sized frame (about 1440x1024), select it, and add a layout guide via the "+" button in the
  Design panel Layout guide section.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Frame has a layout guide
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a frame carries at least one guide
    path: $.data.nodes[?(@.type=='FRAME')].layoutGrids[*]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
