id: 00219-layout-guide-pattern-ui
start_url: http://cua_designpen.web
prompt: 'Draw a frame, add a layout guide via the Layout guide section "+", then open the guide''s pattern select
  and switch it from Grid to Rows.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Guide pattern set to rows
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a rows guide exists
    path: $.data.nodes[*].layoutGrids[?(@.pattern=='ROWS')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
