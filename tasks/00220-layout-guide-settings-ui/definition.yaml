id: 00220-layout-guide-settings-ui
start_url: http://cua_designpen.web
prompt: 'Draw a frame, add a layout guide via the Layout guide section "+", set its pattern to Columns, then open
  the guide''s settings popover and set the column count to 6.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Six-column guide configured
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a columns guide with count 6 exists
    path: $.data.nodes[*].layoutGrids[?(@.pattern=='COLUMNS' & @.count==6)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
