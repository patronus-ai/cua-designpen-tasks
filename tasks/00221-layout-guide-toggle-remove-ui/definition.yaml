id: 00221-layout-guide-toggle-remove-ui
start_url: http://cua_designpen.web
prompt: 'Draw a frame and add a layout guide via the Layout guide section "+". Then click the visibility (eye) control
  on that guide''s row to hide it — do not delete the guide.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: A guide is hidden but kept
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: an invisible guide remains on the node
    path: $.data.nodes[*].layoutGrids[?(@.visible==false)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
