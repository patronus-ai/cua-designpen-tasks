id: 00222-lock-aspect-ratio-ui
start_url: http://cua_designpen.web
prompt: 'Draw a 200x100 rectangle and click the lock toggle between the width and height fields in the Design panel
  Dimensions controls to link the two together.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Aspect ratio locked
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a node has proportions locked
    path: $.data.nodes[?(@.lockAspectRatio==true)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
