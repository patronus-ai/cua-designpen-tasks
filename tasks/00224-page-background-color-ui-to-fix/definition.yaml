id: 00224-page-background-color-ui-to-fix
start_url: http://cua_designpen.web
prompt: 'Click an empty area so nothing is selected, then in the Design panel Page section change the page background
  color to #1E1E1E.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Page background #1E1E1E persisted on the CANVAS node backgroundColor (to-fix: currently fails — see _to-fix-report.md)'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: 'CANVAS background is #1E1E1E (COLOR_NEAR on style)'
    path: $.data.nodes[?(@.type=='CANVAS')].style
    operator: COLOR_NEAR
    expected: '#1E1E1E'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
