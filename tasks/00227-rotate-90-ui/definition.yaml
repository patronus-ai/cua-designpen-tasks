id: 00227-rotate-90-ui
start_url: http://cua_designpen.web
prompt: 'Draw a 300x100 rectangle and click the rotate 90° button in the Design panel Position section once to give
  it a clockwise quarter-turn.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Node rotated 90 clockwise
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a node is rotated 90 degrees clockwise
    path: $.data.nodes[?(@.rotation==90)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
