id: 00228-rotation-edit-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and use the rotation field in the Design panel Position section to tilt it exactly 30
  degrees counterclockwise (enter 30 in the rotation field).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Node rotated 30 counterclockwise
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a node is rotated 30 degrees counterclockwise
    path: $.data.nodes[?(@.rotation==-30)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
