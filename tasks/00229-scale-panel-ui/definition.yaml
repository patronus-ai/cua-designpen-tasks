id: 00229-scale-panel-ui
start_url: http://cua_designpen.web
prompt: 'Draw a 100x100 square, activate the Scale tool (press K), and use the Scale section in the Design panel
  to scale the whole selection by a factor of 2.5x (or set W to 250 with proportional scaling), keeping both dimensions
  together.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Square scaled to 250x250
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a 250 by 250 node exists
    path: $.data.nodes[?(@.width==250 & @.height==250)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
