id: 00230-selection-colors-edit-ui
start_url: http://cua_designpen.web
prompt: 'Draw three rectangles all filled with pure red #FF0000. Select all three together, then in the Design panel
  Selection colors section click the FF0000 row''s swatch and change it to pure green #00FF00.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: All three fills swapped to green
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: three rectangles exist
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 3'
  - name: rectangles fill is pure green
    path: $.data.nodes[?(@.type=='RECTANGLE')].style.fill
    operator: COLOR_NEAR
    expected: '#00FF00'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
