id: 00231-size-height-edit-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and set its height to exactly 180 in the Design panel Layout > Dimensions height field,
  leaving the width as is.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Node height is 180
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a node is 180 tall
    path: $.data.nodes[?(@.height==180)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
