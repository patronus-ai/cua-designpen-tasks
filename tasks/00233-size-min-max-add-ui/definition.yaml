id: 00233-size-min-max-add-ui
start_url: http://cua_designpen.web
prompt: 'Create a frame with a rectangle inside and enable auto layout (Layout > Flow). Open the width sizing chevron
  menu, choose Add min width, and set the minimum to 200.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Min width limit of 200 added
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a node has min width 200
    path: $.data.nodes[?(@.minWidth==200)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
