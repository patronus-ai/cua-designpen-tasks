id: 00240-color-area-sb-ui
start_url: http://cua_designpen.web
prompt: 'Draw an ellipse, open its fill color picker by clicking the fill swatch, and drag the picker''s saturation/brightness
  area handle all the way to the bottom to reach pure black (zero brightness).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Ellipse fill is pure black
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill is pure black
    path: $.data.nodes[?(@.type=='ELLIPSE')].style.fill
    operator: COLOR_NEAR
    expected: '#000000'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
