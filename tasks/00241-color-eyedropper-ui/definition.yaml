id: 00241-color-eyedropper-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and set its fill to pure red (FF0000). Draw an ellipse next to it, open the ellipse''s
  fill color picker, activate the eyedropper (eyedropper button in the picker, or press I while the picker is open),
  and sample the red rectangle on the canvas.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Circle fill matches the sampled red
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: ellipse fill sampled to pure red
    path: $.data.nodes[?(@.type=='ELLIPSE')].style.fill
    operator: COLOR_NEAR
    expected: '#FF0000'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
