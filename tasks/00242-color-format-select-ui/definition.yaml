id: 00242-color-format-select-ui
start_url: http://cua_designpen.web
prompt: 'Draw a square, open its fill color picker, switch the color format select from Hex to RGB, and type in
  channel values R 0, G 255, B 0.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle fill entered as rgb(0,255,0)
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill is pure green
    path: $.data.nodes[?(@.type=='RECTANGLE')].style.fill
    operator: COLOR_NEAR
    expected: '#00FF00'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
