id: 00243-color-hue-slider-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, open its fill color picker, drag the saturation/brightness handle to the fully saturated
  top-right corner, then drag the hue slider until the fill is pure blue (0000FF).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle fill is pure blue
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill is pure blue
    path: $.data.nodes[?(@.type=='RECTANGLE')].style.fill
    operator: COLOR_NEAR
    expected: '#0000FF'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
