id: 00244-color-opacity-input-ui
start_url: http://cua_designpen.web
prompt: 'Draw an ellipse, open its fill color picker, set the color to pure black (000000), then type exactly 25
  into the opacity percent field (do not drag the alpha slider).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Circle fill black at 25% opacity
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill alpha is 0.25
    path: $.data.nodes[?(@.type=='ELLIPSE')].fills[0].color.a
    operator: NUMERIC_MATCH
    expected: '0.25'
  - name: fill is pure black
    path: $.data.nodes[?(@.type=='ELLIPSE')].style.fill
    operator: COLOR_NEAR
    expected: '#000000'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
