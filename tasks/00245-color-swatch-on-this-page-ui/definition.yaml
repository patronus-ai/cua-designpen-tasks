id: 00245-color-swatch-on-this-page-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and set its fill to pure red (FF0000). Then draw a star, open the star''s fill color picker,
  and click the red swatch in the "On this page" swatch list to reuse that exact color.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Star fill reuses the page red
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: star fill is pure red
    path: $.data.nodes[?(@.type=='STAR')].style.fill
    operator: COLOR_NEAR
    expected: '#FF0000'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
