id: 00247-fill-add-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, keep it selected, and click the "+" button in the Fill section of the right panel to
  stack a second fill on top of the existing one.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle has two or more fills
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: at least two fills
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
