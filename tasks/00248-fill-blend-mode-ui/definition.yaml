id: 00248-fill-blend-mode-ui
start_url: http://cua_designpen.web
prompt: 'Draw a square, click its fill swatch to open the paint panel, and set the paint''s blend mode to Multiply
  using the blend menu in the panel.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle fill blend mode is Multiply
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: blend mode multiply
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].blendMode
    operator: STRING_EQUALS
    expected: MULTIPLY
  - name: fill exists
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
