id: 00249-fill-hex-edit-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and type FF00FF directly into the hex input in the fill row of the right panel (no need
  to open the full picker).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle fill is magenta FF00FF
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: 'fill is magenta #FF00FF'
    path: $.data.nodes[?(@.type=='RECTANGLE')].style.fill
    operator: COLOR_NEAR
    expected: '#FF00FF'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
