id: 00250-fill-open-picker-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, click the fill row''s color swatch to open the full color picker, and use the picker
  controls (saturation/brightness area and hue slider, or the hex field inside the picker) to set the fill to pure
  yellow (FFFF00).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle fill is pure yellow
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill is pure yellow
    path: $.data.nodes[?(@.type=='RECTANGLE')].style.fill
    operator: COLOR_NEAR
    expected: '#FFFF00'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
