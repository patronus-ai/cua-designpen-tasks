id: 00251-fill-remove-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, then click the "−" button on its fill row in the Fill section to remove the fill entirely.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle has no fills
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fills list empty
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0]
    operator: NOT_EXISTS
    expected: ''
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
