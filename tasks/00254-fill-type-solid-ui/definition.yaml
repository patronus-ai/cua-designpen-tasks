id: 00254-fill-type-solid-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and give it a gradient fill via the paint panel''s Gradient tab. Then reopen the paint
  panel, switch back to the Solid tab, and set the color to pure blue (0000FF).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle fill is solid pure blue
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill type is solid
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].type
    operator: STRING_EQUALS
    expected: SOLID
  - name: fill is pure blue
    path: $.data.nodes[?(@.type=='RECTANGLE')].style.fill
    operator: COLOR_NEAR
    expected: '#0000FF'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
