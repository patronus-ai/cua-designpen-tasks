id: 00255-fill-visibility-toggle-ui
start_url: http://cua_designpen.web
prompt: 'Draw an ellipse with a fill, then click the eye button on its fill row in the Fill section to hide the
  fill without deleting it.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Circle fill hidden but still present
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill still present
    path: $.data.nodes[?(@.type=='ELLIPSE')].fills
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: fill not visible
    path: $.data.nodes[?(@.type=='ELLIPSE')].fills[0].visible
    operator: STRING_EQUALS
    expected: 'false'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
