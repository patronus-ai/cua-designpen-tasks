id: 00256-gradient-reverse-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and give it a linear gradient fill running from pure red (FF0000) to pure blue (0000FF)
  by editing the two stops in the gradient editor. Then click the gradient editor''s reverse button to flip the
  stop order.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Gradient stop order is blue first, red last
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: first stop blue
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].gradientStops[0].color.b
    operator: NUMERIC_MATCH
    expected: '1'
  - name: first stop not red
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].gradientStops[0].color.r
    operator: NUMERIC_MATCH
    expected: '0'
  - name: last stop red
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].gradientStops[1].color.r
    operator: NUMERIC_MATCH
    expected: '1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
