id: 00258-gradient-stop-add-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, give it a gradient fill, then add a third color stop — click on the gradient bar between
  the existing stops or use the "+" button in the gradient editor header.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Gradient has three or more stops
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: at least three stops
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].gradientStops
    operator: ARRAY_LENGTH
    expected: '>= 3'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
