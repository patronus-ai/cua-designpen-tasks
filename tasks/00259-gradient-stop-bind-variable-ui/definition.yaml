id: 00259-gradient-stop-bind-variable-ui
start_url: http://cua_designpen.web
prompt: 'Create a color variable set to pure green (00FF00). Draw a rectangle, give it a gradient fill, select the
  gradient''s first stop, and bind that stop''s color to the green variable using the variable affordance on the
  stop row (instead of picking a raw color).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: First gradient stop resolves to the variable green
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill is a gradient
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].type
    operator: STRING_CONTAINS
    expected: GRADIENT
  - name: gradient carries variable green
    path: $.data.nodes[?(@.type=='RECTANGLE')].style
    operator: COLOR_NEAR
    expected: '#00FF00'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
