id: 00260-gradient-stop-edit-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle with a two-stop gradient fill. Select the second stop in the gradient editor and edit
  it: set its color to pure white (FFFFFF) and its position to 80%.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Second stop is white at position 0.8
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: second stop at 80%
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].gradientStops[1].position
    operator: NUMERIC_MATCH
    expected: '0.8'
  - name: gradient carries pure white stop
    path: $.data.nodes[?(@.type=='RECTANGLE')].style
    operator: COLOR_NEAR
    expected: '#FFFFFF'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
