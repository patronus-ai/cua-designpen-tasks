id: 00261-gradient-stop-remove-ui
start_url: http://cua_designpen.web
prompt: 'Draw a square with a gradient fill and build it up to three stops: pure red (FF0000), pure green (00FF00)
  in the middle, pure blue (0000FF). Then remove the middle green stop with the "−" button on its stop row.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Gradient reduced to red and blue stops
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: exactly two stops
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].gradientStops
    operator: ARRAY_LENGTH
    expected: == 2
  - name: gradient still carries red stop
    path: $.data.nodes[?(@.type=='RECTANGLE')].style
    operator: COLOR_NEAR
    expected: '#FF0000'
  - name: gradient still carries blue stop
    path: $.data.nodes[?(@.type=='RECTANGLE')].style
    operator: COLOR_NEAR
    expected: '#0000FF'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
