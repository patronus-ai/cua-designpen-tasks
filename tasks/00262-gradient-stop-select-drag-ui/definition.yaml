id: 00262-gradient-stop-select-drag-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle with a gradient fill, select the first stop''s marker on the gradient bar, and move it
  to exactly 25% along the gradient (drag it, or type 25 into the stop''s position field).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: First gradient stop sits at 0.25
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: first stop at 25%
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].gradientStops[0].position
    operator: NUMERIC_MATCH
    expected: '0.25'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
