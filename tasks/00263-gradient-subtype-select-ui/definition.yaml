id: 00263-gradient-subtype-select-ui
start_url: http://cua_designpen.web
prompt: 'Draw an ellipse, give it a gradient fill, then use the gradient editor''s subtype select to change the
  gradient from Linear to Radial so it radiates outward from the center.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Circle fill is a radial gradient
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill type radial gradient
    path: $.data.nodes[?(@.type=='ELLIPSE')].fills[0].type
    operator: STRING_EQUALS
    expected: GRADIENT_RADIAL
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
