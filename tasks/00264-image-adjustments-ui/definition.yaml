id: 00264-image-adjustments-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and give it an image fill (Image tab in the paint panel, choose any picture). Then drag
  the Saturation adjustment slider in the image fill panel all the way to maximum.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Image fill saturation maxed
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill is an image
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].type
    operator: STRING_EQUALS
    expected: IMAGE
  - name: saturation at max
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].imageFilters.saturation
    operator: NUMERIC_MATCH
    expected: '1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
