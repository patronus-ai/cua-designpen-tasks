id: 00265-image-choose-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, open its fill paint panel, switch to the Image tab, and use the image picker button to
  choose/upload any picture (png/jpg/webp) as the shape''s fill.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle carries an image fill
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill is an image
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].type
    operator: STRING_EQUALS
    expected: IMAGE
  - name: image data attached
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].imageHash
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
