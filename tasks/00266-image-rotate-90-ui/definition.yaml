id: 00266-image-rotate-90-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and give it an image fill with any picture. Then click the rotate button in the image
  fill panel once to turn the picture inside the shape by 90 degrees — the rectangle itself must not move or rotate.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Image inside the fill rotated 90 degrees
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill is an image
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].type
    operator: STRING_EQUALS
    expected: IMAGE
  - name: image rotated 90
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].imageRotation
    operator: NUMERIC_MATCH
    expected: '90'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
