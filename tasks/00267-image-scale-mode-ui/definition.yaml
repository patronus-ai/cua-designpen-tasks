id: 00267-image-scale-mode-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and give it an image fill with any picture. In the image fill panel, change the scale-mode
  select to Fit so the entire image is visible inside the shape even if that leaves empty space.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Image fill scale mode is Fit
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: scale mode fit
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].imageScaleMode
    operator: STRING_EQUALS
    expected: FIT
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
