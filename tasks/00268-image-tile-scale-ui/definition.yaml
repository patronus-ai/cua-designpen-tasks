id: 00268-image-tile-scale-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and give it an image fill with any picture. Set the scale mode to Tile, then type 50 into
  the tile scale percent field so each tile renders at half the image''s original size.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Image fill tiles at half size
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: scale mode tile
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].imageScaleMode
    operator: STRING_EQUALS
    expected: TILE
  - name: tile scale 50%
    path: $.data.nodes[?(@.type=='RECTANGLE')].fills[0].imageScalingFactor
    operator: NUMERIC_MATCH
    expected: '0.5'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
