id: 00269-pencil-stroke-defaults-ui
start_url: http://cua_designpen.web
prompt: 'With nothing selected, activate the Pencil tool and use the Pencil stroke section in the right panel to
  set the default stroke color to pure red (FF0000) and the default weight to 5. Then scribble a quick freehand
  squiggle on the canvas.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Freehand squiggle drawn with red 5px stroke
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: squiggle stroke weight 5
    path: $.data.nodes[?(@.type=='VECTOR')].strokes[0].weight
    operator: NUMERIC_MATCH
    expected: '5'
  - name: pencil stroke is pure red
    path: $.data.nodes[?(@.type=='VECTOR')].style
    operator: COLOR_NEAR
    expected: '#FF0000'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
