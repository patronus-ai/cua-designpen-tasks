id: 00272-stroke-dash-cap-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle with a border, open the stroke settings popover, set the dash style to Dashed, then set
  the dash cap to Round so every individual dash has rounded ends.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Dashed border with round dash ends
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: border is dashed
    path: $.data.nodes[?(@.type=='RECTANGLE')].strokes[0].dashPattern
    operator: ARRAY_LENGTH
    expected: '>= 2'
  - name: dash cap round
    path: $.data.nodes[?(@.type=='RECTANGLE')].strokes[0].dashCap
    operator: STRING_EQUALS
    expected: ROUND
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
