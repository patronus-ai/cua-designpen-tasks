id: 00273-stroke-dash-style-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle with a border, open the stroke settings popover (sliders button on the stroke row), and
  switch the dash select from Solid to Dashed.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle border is dashed
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: dash pattern set
    path: $.data.nodes[?(@.type=='RECTANGLE')].strokes[0].dashPattern
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
