id: 00275-stroke-dynamic-controls-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle with a border, open the stroke settings popover, switch the stroke style class from Basic
  to Dynamic, then set the Wiggle control to 60.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Dynamic border with wiggle 60
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: stroke style dynamic
    path: $.data.nodes[?(@.type=='RECTANGLE')].strokes[0].style
    operator: STRING_EQUALS
    expected: DYNAMIC
  - name: wiggle set to 60
    path: $.data.nodes[?(@.type=='RECTANGLE')].strokes[0].dynamicWiggle
    operator: NUMERIC_MATCH
    expected: '60'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
