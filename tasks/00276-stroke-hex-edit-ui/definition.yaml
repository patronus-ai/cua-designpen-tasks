id: 00276-stroke-hex-edit-ui
start_url: http://cua_designpen.web
prompt: 'Draw a square, add a border via the Stroke section "+", and type 0000FF directly into the hex input in
  the stroke row.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Border color is pure blue
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: stroke is pure blue
    path: $.data.nodes[?(@.type=='RECTANGLE')].style
    operator: COLOR_NEAR
    expected: '#0000FF'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
