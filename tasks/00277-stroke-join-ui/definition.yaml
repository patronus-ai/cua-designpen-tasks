id: 00277-stroke-join-ui
start_url: http://cua_designpen.web
prompt: 'Draw a star and give it a thick border (weight 6 or so). Open the stroke settings popover and set the join
  select to Round so the border bends smoothly at the star''s points instead of spiking.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Star border join is round
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: star has a stroke
    path: $.data.nodes[?(@.type=='STAR')].strokes
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: join is round
    path: $.data.nodes[?(@.type=='STAR')].strokes[0].join
    operator: STRING_EQUALS
    expected: ROUND
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
