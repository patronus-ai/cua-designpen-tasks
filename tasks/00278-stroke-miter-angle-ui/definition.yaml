id: 00278-stroke-miter-angle-ui
start_url: http://cua_designpen.web
prompt: 'Draw a star with a border, open the stroke settings popover, make sure the join is Miter (sharp pointed
  corners), and set the miter angle field to 60 degrees.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Star stroke miter angle set to 60 degrees
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: star has a stroke
    path: $.data.nodes[?(@.type=='STAR')].strokes
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: miter limit for 60 degrees
    path: $.data.nodes[?(@.type=='STAR')].strokeMiterLimit
    operator: NUMERIC_MATCH
    expected: '2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
