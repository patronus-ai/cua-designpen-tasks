id: 00279-stroke-open-picker-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle with a border, click the stroke row''s color swatch to open the stroke paint picker, and
  use the picker controls to set the border to pure fully saturated green (00FF00).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Border color is pure green
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: stroke is pure green
    path: $.data.nodes[?(@.type=='RECTANGLE')].style
    operator: COLOR_NEAR
    expected: '#00FF00'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
