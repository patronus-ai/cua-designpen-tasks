id: 00281-stroke-per-side-weight-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle with a border, open the stroke side menu and choose Custom, then in the per-side weight
  grid enter a different thickness for each side: top 1, right 2, bottom 3, left 4.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Per-side border weights 1/2/3/4
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: right border weight 2
    path: $.data.nodes[?(@.type=='RECTANGLE')].borderRightWeight
    operator: NUMERIC_MATCH
    expected: '2'
  - name: bottom border weight 3
    path: $.data.nodes[?(@.type=='RECTANGLE')].borderBottomWeight
    operator: NUMERIC_MATCH
    expected: '3'
  - name: left border weight 4
    path: $.data.nodes[?(@.type=='RECTANGLE')].borderLeftWeight
    operator: NUMERIC_MATCH
    expected: '4'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
