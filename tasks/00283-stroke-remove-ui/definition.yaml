id: 00283-stroke-remove-ui
start_url: http://cua_designpen.web
prompt: 'Draw an ellipse and add a border via the Stroke section "+". Then click the "−" button on the stroke row
  to remove the border completely.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Circle ends with no strokes
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: strokes list empty
    path: $.data.nodes[?(@.type=='ELLIPSE')].strokes[0]
    operator: NOT_EXISTS
    expected: ''
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
