id: 00284-stroke-settings-open-ui
start_url: http://cua_designpen.web
prompt: 'Draw a polygon with a bold border (weight 6 or so), open the stroke settings popover via the sliders button
  on the stroke row, and set the join to Bevel so the border corners are cut flat — not pointed, not rounded.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Polygon border join is bevel
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: polygon has a stroke
    path: $.data.nodes[?(@.type=='POLYGON')].strokes
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: join is bevel
    path: $.data.nodes[?(@.type=='POLYGON')].strokes[0].join
    operator: STRING_EQUALS
    expected: BEVEL
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
