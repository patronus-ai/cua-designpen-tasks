id: 00285-stroke-style-class-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle with a border, open the stroke settings popover, and switch the stroke style class from
  Basic to Dynamic to give the border a sketchy hand-drawn wobble.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Border switched to the dynamic style
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: stroke style dynamic
    path: $.data.nodes[?(@.type=='RECTANGLE')].strokes[0].style
    operator: STRING_EQUALS
    expected: DYNAMIC
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
