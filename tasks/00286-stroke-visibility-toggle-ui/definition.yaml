id: 00286-stroke-visibility-toggle-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle with a border, then click the eye button on the stroke row in the Stroke section to hide
  the border without removing it.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Border hidden but still present
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: stroke still present
    path: $.data.nodes[?(@.type=='RECTANGLE')].strokes
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: stroke not visible
    path: $.data.nodes[?(@.type=='RECTANGLE')].strokes[0].visible
    operator: STRING_EQUALS
    expected: 'false'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
