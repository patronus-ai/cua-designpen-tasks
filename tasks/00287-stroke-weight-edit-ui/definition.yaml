id: 00287-stroke-weight-edit-ui
start_url: http://cua_designpen.web
prompt: 'Draw an ellipse, add a border, and type exactly 8 into the stroke weight field in the Stroke section.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Circle border weight is 8
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: stroke weight 8
    path: $.data.nodes[?(@.type=='ELLIPSE')].strokes[0].weight
    operator: NUMERIC_MATCH
    expected: '8'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
