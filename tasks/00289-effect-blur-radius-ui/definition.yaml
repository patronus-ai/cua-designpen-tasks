id: 00289-effect-blur-radius-ui
start_url: http://cua_designpen.web
prompt: 'Draw a square, add a drop shadow via the Effects section "+", then type exactly 24 into the effect''s blur
  radius field.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Shadow blur radius is 24
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: effect present
    path: $.data.nodes[?(@.type=='RECTANGLE')].effects
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: blur radius 24
    path: $.data.nodes[?(@.type=='RECTANGLE')].effects[0].radius
    operator: NUMERIC_MATCH
    expected: '24'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
