id: 00290-effect-color-bind-variable-ui
start_url: http://cua_designpen.web
prompt: 'Create a color variable set to pure red (FF0000). Draw a rectangle, add a drop shadow via the Effects section
  "+", then bind the shadow''s color to that variable using the variable affordance on the effect color row (instead
  of picking a color directly).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Shadow color resolves to the variable red
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: effect present
    path: $.data.nodes[?(@.type=='RECTANGLE')].effects
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: shadow color is variable red
    path: $.data.nodes[?(@.type=='RECTANGLE')].style
    operator: COLOR_NEAR
    expected: '#FF0000'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
