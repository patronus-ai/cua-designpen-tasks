id: 00291-effect-color-edit-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, add a drop shadow, then open the effect color row and change the shadow color to pure
  blue (0000FF) instead of the default dark gray.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Shadow color is pure blue
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: shadow color is pure blue
    path: $.data.nodes[?(@.type=='RECTANGLE')].style
    operator: COLOR_NEAR
    expected: '#0000FF'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
