id: 00293-effect-remove-ui
start_url: http://cua_designpen.web
prompt: 'Draw an ellipse, add a drop shadow via the Effects section "+", then click the "−" button on the effect
  row to remove it again.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Circle ends with no effects
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: effects list empty
    path: $.data.nodes[?(@.type=='ELLIPSE')].effects[0]
    operator: NOT_EXISTS
    expected: ''
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
