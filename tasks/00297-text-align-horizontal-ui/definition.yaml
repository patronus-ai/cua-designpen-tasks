id: 00297-text-align-horizontal-ui
start_url: http://cua_designpen.web
prompt: 'Create a text layer with the text "Save the date", drag its box wider than the text (e.g. 400px wide),
  then with the layer selected use the alignment toggles in the Typography section of the properties panel to center
  the text horizontally.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: text-align-horizontal observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: centered text layer present
    path: $.data.nodes[?(@.type=='TEXT' & @.textAlignHorizontal=='CENTER')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
