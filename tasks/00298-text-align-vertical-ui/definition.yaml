id: 00298-text-align-vertical-ui
start_url: http://cua_designpen.web
prompt: 'Create a text layer with the text "Bottom shelf", resize its box to be much taller than the text (e.g.
  200px tall), then with the layer selected use the vertical alignment toggles in the Typography section of the
  properties panel to align the text to the bottom.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: text-align-vertical observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: bottom-aligned text layer present
    path: $.data.nodes[?(@.type=='TEXT' & @.textAlignVertical=='BOTTOM')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
