id: 00299-text-alignment-justified-ui
start_url: http://cua_designpen.web
prompt: 'Create a text layer containing a short two-line paragraph (e.g. "The quick brown fox jumps over the lazy
  dog near the river bank every morning"), sized so it wraps to at least two lines. With the layer selected, open
  the Type settings popover via the sliders button in the Typography section, and in the Basics tab set horizontal
  alignment to Justified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: text-alignment-justified observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: justified text layer present
    path: $.data.nodes[?(@.type=='TEXT' & @.textAlignHorizontal=='JUSTIFIED')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
