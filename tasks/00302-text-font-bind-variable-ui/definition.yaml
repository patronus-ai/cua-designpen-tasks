id: 00302-text-font-bind-variable-ui
start_url: http://cua_designpen.web
prompt: 'Open the Local variables dialog from the left panel Variables tab, create a collection, and add a STRING
  variable named "body-font" with value "Roboto". Then create a text layer with any text, and in the Typography
  section use the variable affordance on the font family row to bind the font family to the "body-font" variable.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: text-font-bind-variable observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: text renders in Roboto
    path: $.data.nodes[?(@.type=='TEXT' & @.fontFamily=='Roboto')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
