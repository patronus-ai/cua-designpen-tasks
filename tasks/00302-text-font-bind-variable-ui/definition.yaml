id: 00302-text-font-bind-variable-ui
start_url: http://cua_designpen.web
prompt: 'Open the Local variables dialog from the left panel Variables tab, create a collection, and add a STRING
  variable named "body-font" with value "Roboto". Then create a text layer with any text, and in the Typography
  section use the variable affordance on the font family row to bind the font family to the "body-font" variable.


