id: 00303-text-font-family-ui
start_url: http://cua_designpen.web
prompt: 'Create a text layer with the text "Welcome aboard". With the layer selected, open the FontPicker in the
  Typography section of the properties panel and change the font family to Montserrat.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: text-font-family observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Montserrat text layer present
    path: $.data.nodes[?(@.type=='TEXT' & @.fontFamily=='Montserrat')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
