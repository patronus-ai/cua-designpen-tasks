id: 00307-text-line-height-ui
start_url: http://cua_designpen.web
prompt: 'Create a text layer containing two or three lines of filler text (e.g. "Line one of copy\nLine two of copy").
  With the layer selected, set the line height to 60 in the line-height field of the Typography section of the properties
  panel.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: text-line-height observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: line height is 60
    path: $.data.nodes[?(@.type=='TEXT')].lineHeight
    operator: NUMERIC_MATCH
    expected: == 60
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
