id: 00308-text-list-spacing-ui
start_url: http://cua_designpen.web
prompt: 'Create a text layer with three grocery items on separate lines (e.g. "Milk", "Eggs", "Bread"). Open the
  Type settings popover via the sliders button in the Typography section, set the list style to Bullet in the Basics
  tab, then set the list spacing to 12 in the same tab.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: text-list-spacing observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: bulleted list present
    path: $.data.nodes[?(@.type=='TEXT')].lineTypes[0]
    operator: STRING_EQUALS
    expected: UNORDERED_LIST
  - name: list spacing is 12
    path: $.data.nodes[?(@.type=='TEXT')].listSpacing
    operator: NUMERIC_MATCH
    expected: == 12
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
