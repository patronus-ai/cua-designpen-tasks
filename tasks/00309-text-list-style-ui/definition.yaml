id: 00309-text-list-style-ui
start_url: http://cua_designpen.web
prompt: 'Create a text layer with three coffee-making steps on separate lines (e.g. "Grind beans", "Boil water",
  "Pour and brew"). Open the Type settings popover via the sliders button in the Typography section, and in the
  Basics tab set the list style to Numbered.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: text-list-style observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: numbered list present
    path: $.data.nodes[?(@.type=='TEXT')].lineTypes[0]
    operator: STRING_EQUALS
    expected: ORDERED_LIST
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
