id: 00311-text-open-type-settings-ui
start_url: http://cua_designpen.web
prompt: 'Create a text layer containing two short paragraphs separated by a line break (e.g. "First paragraph here.\nSecond
  paragraph here."). With the layer selected, open the Type settings popover via the sliders button in the Typography
  section and set the paragraph spacing to 16.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: text-open-type-settings observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: paragraph spacing is 16
    path: $.data.nodes[?(@.type=='TEXT')].paragraphSpacing
    operator: NUMERIC_MATCH
    expected: == 16
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
