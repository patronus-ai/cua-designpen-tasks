id: 00312-text-paragraph-spacing-ui
start_url: http://cua_designpen.web
prompt: 'Create a single text layer with two paragraphs of placeholder copy separated by a line break. Open the
  Type settings popover via the sliders button in the Typography section and set the paragraph spacing to 24 in
  the Basics tab.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: text-paragraph-spacing observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: paragraph spacing is 24
    path: $.data.nodes[?(@.type=='TEXT')].paragraphSpacing
    operator: NUMERIC_MATCH
    expected: == 24
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
