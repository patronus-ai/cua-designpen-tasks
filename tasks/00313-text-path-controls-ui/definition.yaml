id: 00313-text-path-controls-ui
start_url: http://cua_designpen.web
prompt: 'Draw a large curved line on the canvas (e.g. with the pen tool), attach the text "around the bend" so it
  flows along that curve, then with the text selected use the TextOnPath section of the properties panel to flip
  the text to the other side of the curve.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: text-path-controls observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: text attached to a path
    path: $.data.nodes[?(@.type=='TEXT')].textPath
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
