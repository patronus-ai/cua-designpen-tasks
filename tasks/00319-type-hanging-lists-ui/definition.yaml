id: 00319-type-hanging-lists-ui
start_url: http://cua_designpen.web
prompt: 'Create a text layer with three fruits on separate lines (e.g. "Apple", "Banana", "Cherry") and turn them
  into a bulleted list via the Type settings Basics tab. Then switch to the Details tab and enable hanging lists
  so the bullets hang outside the text box edge.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: type-hanging-lists observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: hanging lists enabled
    path: $.data.nodes[?(@.type=='TEXT' & @.hangingList==true)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
