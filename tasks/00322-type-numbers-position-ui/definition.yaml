id: 00322-type-numbers-position-ui
start_url: http://cua_designpen.web
prompt: 'Create a text layer with the text "x2". Open the Type settings popover via the sliders button in the Typography
  section, switch to the Details tab, and set the number position to superscript so the 2 sits raised.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: type-numbers-position observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: superscript feature enabled
    path: $.data.nodes[?(@.type=='TEXT')].fontFeatures[?(@.tag=='sups' & @.enabled==true)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
