id: 00325-type-paragraph-indent-ui
start_url: http://cua_designpen.web
prompt: 'Create a text layer with two paragraphs of filler copy separated by a line break. Open the Type settings
  popover via the sliders button in the Typography section, switch to the Details tab, and set the paragraph indent
  to 20.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: type-paragraph-indent observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: paragraph indent is 20
    path: $.data.nodes[?(@.type=='TEXT')].paragraphIndent
    operator: NUMERIC_MATCH
    expected: == 20
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
