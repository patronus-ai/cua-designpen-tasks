id: 00328-color-style-create-ui
start_url: http://cua_designpen.web
prompt: 'With nothing selected, open the Styles section "+" in the properties panel and create a new color style
  named "Brand/Red" with value pure red (#FF0000). Then draw a square rectangle (e.g. 100x100) and apply the "Brand/Red"
  style to its fill via the fill apply-styles popover.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: color-style-create observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill styled Brand/Red pure red
    path: $.data.nodes[?(@.type=='RECTANGLE')].style.fill
    operator: COLOR_NEAR
    expected: '#FF0000'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
