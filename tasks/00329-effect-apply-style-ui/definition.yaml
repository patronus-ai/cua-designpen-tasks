id: 00329-effect-apply-style-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle (e.g. 200x120), add a drop shadow effect to it in the Effects section, and save that effect
  as a shared effect style named "Card shadow" via the Effects apply-styles popover. Then draw a second rectangle
  and apply the "Card shadow" style to it from the same popover.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: effect-apply-style observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: drop shadow on rectangle
    path: $.data.nodes[?(@.type=='RECTANGLE')].effects[0].type
    operator: STRING_EQUALS
    expected: DROP_SHADOW
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
