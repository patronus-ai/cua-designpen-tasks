id: 00331-fill-apply-style-ui
start_url: http://cua_designpen.web
prompt: 'Create a paint style named "Brand/Green" with value pure green (#00FF00) via the Styles section "+" (nothing
  selected). Then draw a rectangle and, instead of picking a color by hand, open the fill apply-styles popover in
  the Fill section and apply "Brand/Green" to the fill.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: fill-apply-style observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill styled Brand/Green pure green
    path: $.data.nodes[?(@.type=='RECTANGLE')].style.fill
    operator: COLOR_NEAR
    expected: '#00FF00'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
