id: 00334-grid-style-create-ui
start_url: http://cua_designpen.web
prompt: 'With nothing selected, open the Styles section "+" in the properties panel and create a new layout-guide
  style containing a simple column grid (e.g. 4 columns). Then create a new frame (e.g. 800x600) and apply that
  layout-guide style to it so the columns show on the frame.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: grid-style-create observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: frame carries layout guides
    path: $.data.nodes[?(@.type=='FRAME')].layoutGrids
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
