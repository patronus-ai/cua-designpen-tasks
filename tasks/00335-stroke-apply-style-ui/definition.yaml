id: 00335-stroke-apply-style-ui
start_url: http://cua_designpen.web
prompt: 'Create a paint style named "Brand/Blue" with value pure blue (#0000FF) via the Styles section "+" (nothing
  selected). Then draw a circle with the ellipse tool, add a stroke to it, and apply "Brand/Blue" to the stroke
  color via the Stroke apply-styles popover.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: stroke-apply-style observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: ellipse has a stroke
    path: $.data.nodes[?(@.type=='ELLIPSE')].strokes
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: circle stroke is Brand/Blue pure blue
    path: $.data.nodes[?(@.type=='ELLIPSE')].style
    operator: COLOR_NEAR
    expected: '#0000FF'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
