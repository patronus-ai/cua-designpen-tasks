id: 00336-style-create-menu-ui
start_url: http://cua_designpen.web
prompt: 'Deselect everything on the canvas (press Escape or click empty canvas). In the Styles section of the properties
  panel, click the "+" to open the add-style menu and create a new shared text style named "Heading" with font size
  40. Then create a text layer with the text "Quarterly report" and apply the "Heading" style to it via the TextStylesMenu
  in the Typography section.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Heading style created and applied at 40px
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a text node exists
    path: $.data.nodes[?(@.type=='TEXT')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: heading is 40px
    path: $.data.nodes[?(@.type=='TEXT')].fontSize
    operator: NUMERIC_MATCH
    expected: == 40
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
