id: 00337-text-apply-style-ui
start_url: http://cua_designpen.web
prompt: 'Create a shared text style set to 32px Bold (via the Styles section "+" with nothing selected, or by styling
  a throwaway layer and saving it). Then add a text layer with the text "Section title" and apply that text style
  to it via the TextStylesMenu in the Typography section.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: text-apply-style observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: text is 32px
    path: $.data.nodes[?(@.type=='TEXT')].fontSize
    operator: NUMERIC_MATCH
    expected: == 32
  - name: text is bold
    path: $.data.nodes[?(@.type=='TEXT')].fontWeight
    operator: NUMERIC_MATCH
    expected: == 700
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
