id: 00338-text-detach-style-ui
start_url: http://cua_designpen.web
prompt: 'Create a shared text style and apply it to a new text layer via the TextStylesMenu. Then break the link
  using the unlink action on the style chip in the Typography section, and set just this layer''s font size to 40.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: text-detach-style observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: text resized after unlink
    path: $.data.nodes[?(@.type=='TEXT')].fontSize
    operator: NUMERIC_MATCH
    expected: == 40
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
