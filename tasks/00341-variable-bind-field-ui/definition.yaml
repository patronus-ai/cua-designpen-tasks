id: 00341-variable-bind-field-ui
start_url: http://cua_designpen.web
prompt: 'Open the Local variables dialog from the left panel Variables tab, create a collection, and add a number
  (FLOAT) variable named "card-width" with value 240. Then draw a rectangle and bind its width field to the "card-width"
  variable using the field''s variable affordance (or right-click on the width field) in the properties panel.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: variable-bind-field observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: rectangle width driven to 240
    path: $.data.nodes[?(@.type=='RECTANGLE')].width
    operator: NUMERIC_MATCH
    expected: == 240
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
