id: 00342-variable-collection-create-ui
start_url: http://cua_designpen.web
prompt: 'Open the Local variables dialog from the left panel Variables tab and create a new variable collection
  named "Theme" using the folder-plus button or the empty-state action. Inside that collection, use the Add menu
  to create a COLOR variable named "brand" with value pure magenta (#FF00FF). Then draw a rectangle and bind its
  fill to the "brand" token via the fill picker''s variable tab.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Theme collection color token bound to rectangle fill
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill bound to brand token magenta
    path: $.data.nodes[?(@.type=='RECTANGLE')].style.fill
    operator: COLOR_NEAR
    expected: '#FF00FF'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
