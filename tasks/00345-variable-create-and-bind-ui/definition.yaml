id: 00345-variable-create-and-bind-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle with a solid fill. Open its fill color picker, use the "+" > Variable tab (apply-variable
  popover) to create a new color variable set to pure blue (#0000FF) and bind the fill to it in one step.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: variable-create-and-bind observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill bound to new variable pure blue
    path: $.data.nodes[?(@.type=='RECTANGLE')].style.fill
    operator: COLOR_NEAR
    expected: '#0000FF'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
