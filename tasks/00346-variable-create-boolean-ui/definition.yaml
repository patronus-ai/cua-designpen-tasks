id: 00346-variable-create-boolean-ui
start_url: http://cua_designpen.web
prompt: 'Open the Local variables dialog from the left panel Variables tab, create a collection, and use the Add
  menu to create a BOOLEAN variable named "show-badge" with value false. Then draw a small circle with the ellipse
  tool and bind its visibility to the "show-badge" variable via the visibility field''s variable affordance.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: variable-create-boolean observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: node hidden by boolean token
    path: $.data.nodes[?(@.type=='ELLIPSE' & @.visible==false)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
