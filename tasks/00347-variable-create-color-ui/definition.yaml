id: 00347-variable-create-color-ui
start_url: http://cua_designpen.web
prompt: 'Open the Local variables dialog from the left panel Variables tab, create a collection, and use the Add
  menu to create a COLOR variable named "accent" with value pure yellow (#FFFF00). Then draw a square rectangle
  and bind its fill to the "accent" token via the fill picker''s variable tab.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: variable-create-color observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill bound to accent token pure yellow
    path: $.data.nodes[?(@.type=='RECTANGLE')].style.fill
    operator: COLOR_NEAR
    expected: '#FFFF00'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
