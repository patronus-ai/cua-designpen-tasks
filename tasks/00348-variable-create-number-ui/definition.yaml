id: 00348-variable-create-number-ui
start_url: http://cua_designpen.web
prompt: 'Open the Local variables dialog from the left panel Variables tab, create a collection, and use the Add
  menu to create a FLOAT (number) variable named "radius-lg" with value 24. Then draw a rectangle and bind its corner
  radius field to the "radius-lg" token via the field''s variable affordance.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: variable-create-number observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: corner radius driven to 24
    path: $.data.nodes[?(@.type=='RECTANGLE')].cornerRadius
    operator: NUMERIC_MATCH
    expected: == 24
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
