id: 00349-variable-create-string-ui
start_url: http://cua_designpen.web
prompt: 'Open the Local variables dialog from the left panel Variables tab, create a collection, and use the Add
  menu to create a STRING variable named "cta-label" with value "Get started". Then add a text layer and bind its
  text content to the "cta-label" token.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: variable-create-string observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: text 'Get started' visible on canvas
    path: $.data.nodes[*]
    operator: TEXT_PRESENT
    expected: Get started
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
