id: 00354-variable-unbind-field-ui
start_url: http://cua_designpen.web
prompt: 'Create a number (FLOAT) variable in the Local variables dialog (any value) and bind a new rectangle''s
  width to it via the width field''s variable affordance. Then detach the token from the width using the bound chip,
  and type 300 into the width field by hand.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: variable-unbind-field observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: width set manually after detach
    path: $.data.nodes[?(@.type=='RECTANGLE')].width
    operator: NUMERIC_MATCH
    expected: == 300
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
