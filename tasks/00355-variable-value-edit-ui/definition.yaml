id: 00355-variable-value-edit-ui
start_url: http://cua_designpen.web
prompt: 'Create a COLOR variable named "surface" (any starting color) in the Local variables dialog and bind a new
  rectangle''s fill to it. Then reopen the variables dialog and edit the "surface" value in its mode table cell
  to pure red (#FF0000).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: variable-value-edit observable effect
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: fill follows edited surface value to pure red
    path: $.data.nodes[?(@.type=='RECTANGLE')].style.fill
    operator: COLOR_NEAR
    expected: '#FF0000'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
