id: 00357-layer-context-menu-ui
start_url: http://cua_designpen.web
prompt: 'Draw a 150 by 90 rectangle, then right-click its row in the layers panel and choose Duplicate from the
  context menu to make an exact copy.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Rectangle duplicated
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: two 150x90 nodes exist
    path: $.data.nodes[?(@.width==150 & @.height==90)]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
