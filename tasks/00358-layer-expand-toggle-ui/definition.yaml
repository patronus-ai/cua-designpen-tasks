id: 00358-layer-expand-toggle-ui
start_url: http://cua_designpen.web
prompt: 'Create a frame named "Kit" containing two shapes (e.g. a rectangle and an ellipse), then click the chevron
  on Kit''s row in the layers panel to collapse it so its children are hidden from the tree.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Kit frame collapsed in layer tree
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Kit is collapsed
    path: $.data.nodes[?(@.name=='Kit' & @.expanded==false)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
