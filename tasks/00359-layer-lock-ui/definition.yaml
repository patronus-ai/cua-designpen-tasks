id: 00359-layer-lock-ui
start_url: http://cua_designpen.web
prompt: 'Draw a large 800 by 600 rectangle as a background, then hover its row in the layers panel and click the
  lock icon to lock it.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: A layer is locked
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a locked node exists
    path: $.data.nodes[?(@.locked==true)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
