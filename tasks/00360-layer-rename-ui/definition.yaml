id: 00360-layer-rename-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, then double-click its row in the layers panel and rename the layer to "Hero Banner".


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Layer named 'Hero Banner'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a node named 'Hero Banner' exists
    path: $.data.nodes[?(@.name=='Hero Banner')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
