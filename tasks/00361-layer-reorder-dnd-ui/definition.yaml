id: 00361-layer-reorder-dnd-ui
start_url: http://cua_designpen.web
prompt: 'Create an empty frame named "Bucket" and draw a star shape outside it on the canvas. In the layers panel,
  drag the star''s row onto Bucket''s row so the star becomes a child of Bucket.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Star moved inside Bucket
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Bucket has a child now
    path: $.data.nodes[?(@.name=='Bucket')].childIds[*]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: the star still exists
    path: $.data.nodes[?(@.type=='STAR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
