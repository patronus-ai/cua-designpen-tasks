id: 00362-layer-select-ui
start_url: http://cua_designpen.web
prompt: 'Draw three 100 by 100 circles with different fills (red, green, blue) and stack them at exactly the same
  position. Using the layers panel, click the row of the bottom-most circle to select it (bottom of the stack =
  lowest row in that group), then delete it without touching the two above.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Bottom circle removed from stack
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: exactly two circles remain
    path: $.data.nodes[?(@.type=='ELLIPSE')]
    operator: ARRAY_LENGTH
    expected: == 2
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
