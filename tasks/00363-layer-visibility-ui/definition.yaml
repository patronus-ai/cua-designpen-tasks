id: 00363-layer-visibility-ui
start_url: http://cua_designpen.web
prompt: 'Create a frame containing two rectangles, then hover the frame''s row in the layers panel and click the
  eye icon to hide the whole frame. Do not delete anything.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Frame hidden
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a hidden frame exists
    path: $.data.nodes[?(@.type=='FRAME' & @.visible==false)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
