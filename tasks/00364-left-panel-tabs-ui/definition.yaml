id: 00364-left-panel-tabs-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rounded rectangle and turn it into a component. Then switch the left panel to the Assets tab using
  the tab strip at the top of the panel, find the component there, and place two copies of it onto the canvas from
  the Assets panel.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Two instances placed from assets
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a component exists
    path: $.data.nodes[?(@.type=='COMPONENT')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: two instances placed
    path: $.data.nodes[?(@.type=='INSTANCE')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
