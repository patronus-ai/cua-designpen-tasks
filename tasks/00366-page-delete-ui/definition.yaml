id: 00366-page-delete-ui
start_url: http://cua_designpen.web
prompt: 'Add two extra pages via the Pages header "+" so the file has three pages, then right-click one of the new
  pages and delete it via its context menu, confirming if prompted.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Exactly two pages remain
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: exactly two pages exist
    path: $.data.nodes[?(@.type=='CANVAS')]
    operator: ARRAY_LENGTH
    expected: == 2
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
