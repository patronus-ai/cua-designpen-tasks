id: 00367-page-rename-ui
start_url: http://cua_designpen.web
prompt: 'Double-click the current page''s row in the pages list and rename it to "Wireframes".


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: A page named 'Wireframes' exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: page named 'Wireframes'
    path: $.data.nodes[?(@.type=='CANVAS' & @.name=='Wireframes')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: active page renamed to Wireframes
    path: $.data.page
    operator: STRING_EQUALS
    expected: Wireframes
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
