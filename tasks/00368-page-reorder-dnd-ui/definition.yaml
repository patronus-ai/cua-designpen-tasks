id: 00368-page-reorder-dnd-ui
start_url: http://cua_designpen.web
prompt: 'Add a second page and rename it to "Archive", then drag its row in the pages list so it sits above the
  original page.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Archive page exists among pages
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: two pages exist
    path: $.data.nodes[?(@.type=='CANVAS')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
  - name: a page named 'Archive' exists
    path: $.data.nodes[?(@.type=='CANVAS' & @.name=='Archive')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
