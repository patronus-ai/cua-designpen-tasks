id: 00369-page-switch-ui
start_url: http://cua_designpen.web
prompt: 'Add a second page via the Pages header "+", click its row to switch to it, and draw a rectangle on that
  page.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Second page created and drawn on
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: two pages exist
    path: $.data.nodes[?(@.type=='CANVAS')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
  - name: a rectangle was drawn
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
