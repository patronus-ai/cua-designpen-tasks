id: 00370-asset-insert-instance-ui
start_url: http://cua_designpen.web
prompt: 'Draw a circle and turn it into a component. Open the Assets tab in the left panel, locate the component,
  and insert one instance onto the canvas using its insert button (or by double-clicking the asset).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Instance inserted from library
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a component exists
    path: $.data.nodes[?(@.type=='COMPONENT')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: an instance exists
    path: $.data.nodes[?(@.type=='INSTANCE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
