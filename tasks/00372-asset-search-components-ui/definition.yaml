id: 00372-asset-search-components-ui
start_url: http://cua_designpen.web
prompt: 'Create two components named "Alpha" and "Beta" from two different shapes. Open the Assets tab, open the
  file''s component library, type "Beta" into the in-library search field, and insert the Beta result onto the canvas.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Instance of 'Beta' placed
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: two components exist
    path: $.data.nodes[?(@.type=='COMPONENT')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
  - name: an instance named 'Beta' exists
    path: $.data.nodes[?(@.type=='INSTANCE' & @.name=='Beta')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
