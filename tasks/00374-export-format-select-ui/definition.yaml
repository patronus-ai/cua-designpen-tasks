id: 00374-export-format-select-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, select it, add an export setting via the "+" in the Export section of the right panel,
  then change the format dropdown of that export row from the default to SVG.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: SVG export setting on a node
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: svg export setting present
    path: $.data.nodes[*].exportSettings[?(@.format=='svg')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
