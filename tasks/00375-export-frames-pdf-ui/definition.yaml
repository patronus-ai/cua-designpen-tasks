id: 00375-export-frames-pdf-ui
start_url: http://cua_designpen.web
prompt: 'Create two frames on the page (e.g. a 400x300 "Cover" frame and a 400x300 "Slide 2" frame), then export
  the whole page as one PDF via Main menu > File > Export frames to PDF….


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Two frames exist for the PDF export
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: at least two frames on the page
    path: $.data.nodes[?(@.type=='FRAME')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
