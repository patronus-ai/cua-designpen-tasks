id: 00376-export-preview-toggle-ui
start_url: http://cua_designpen.web
prompt: 'Draw a circle, select it, add a PNG export setting via the Export section "+", then toggle on the export
  preview control to see what the exported image will look like.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Export setting exists on the circle
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: an ellipse exists
    path: $.data.nodes[?(@.type=='ELLIPSE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: export setting present
    path: $.data.nodes[*].exportSettings[*]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
