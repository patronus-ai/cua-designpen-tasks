id: 00377-export-run-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle with a blue fill, select it, add a PNG export setting in the Export section, and click
  the Export button to download the image.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: PNG export setting on a node
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: png export setting present
    path: $.data.nodes[*].exportSettings[?(@.format=='png')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
