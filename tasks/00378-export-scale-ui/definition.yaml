id: 00378-export-scale-ui
start_url: http://cua_designpen.web
prompt: 'Draw a small 32 by 32 square as an icon placeholder, select it, add an export setting, and set the export
  scale to 2x using the scale input''s preset.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 2x export setting on a node
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: 2x export setting present
    path: $.data.nodes[*].exportSettings[?(@.scale==2)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
