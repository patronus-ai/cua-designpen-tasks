id: 00379-export-selection-menu-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and a circle next to each other, select only the circle, then use Main menu > File > Export
  Selection (or Cmd+Shift+E) to export just the circle as a PNG.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Both shapes exist for the selection export
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a rectangle exists
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: an ellipse exists
    path: $.data.nodes[?(@.type=='ELLIPSE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
