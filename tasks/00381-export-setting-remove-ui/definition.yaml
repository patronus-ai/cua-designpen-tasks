id: 00381-export-setting-remove-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, select it, and add two export settings: one at 1x and one at 2x. Then remove the 2x row
  using its "−" button, keeping only the 1x.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Only the 1x export setting remains
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: 1x export setting present
    path: $.data.nodes[*].exportSettings[?(@.scale==1)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: no 2x export setting remains
    path: $.data.nodes[*].exportSettings[?(@.scale==2)]
    operator: NOT_EXISTS
    expected: ''
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
