id: 00382-export-settings-popover-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, select it, add a PNG export setting at 2x, then open that row''s export settings popover
  and set the file-name suffix to "@2x".


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Export setting with @2x suffix
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: export setting with @2x suffix present
    path: $.data.nodes[*].exportSettings[?(@.suffix=='@2x')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
