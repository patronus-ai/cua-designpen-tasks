id: 00383-collab-doc-persistence-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and name it "Keeper" in the layers panel, then reload the browser tab and check the canvas
  after the app loads again.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Named rectangle survives
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: rectangle named Keeper exists
    path: $.data.nodes[?(@.name=='Keeper')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
