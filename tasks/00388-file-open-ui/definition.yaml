id: 00388-file-open-ui
start_url: http://cua_designpen.web
prompt: 'Open an existing .fig design file from disk via Main menu > File > Open… (Cmd+O) and pick a .fig file in
  the picker.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Setup-only (grade via UI observation): Document state present'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: document state present
    path: $.data.nodes
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
