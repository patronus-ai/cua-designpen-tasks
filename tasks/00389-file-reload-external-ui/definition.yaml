id: 00389-file-reload-external-ui
start_url: http://cua_designpen.web
prompt: 'Save the document to disk as a .fig via Main menu > File > Save, then modify that file on disk outside
  the app (e.g. overwrite it with a differently-contented .fig) and watch the editor without re-opening anything.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Setup-only (grade via UI observation): Document state present'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: document state present
    path: $.data.nodes
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
