id: 00392-tab-close-ui
start_url: http://cua_designpen.web
prompt: 'Open an extra file tab via Main menu > File > New, then close it by clicking the ✕ button on its tab (the
  physical Cmd+W shortcut is browser-reserved — use the ✕ button).


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Setup-only (grade via UI observation): Document state present'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: document state present
    path: $.data.nodes
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
