id: 00407-collab-ask-to-edit-ui
start_url: http://cua_designpen.web
prompt: 'Set the file''s link permission to "Can view" in the Share settings, then open the share link in a second
  browser tab so that session joins as a viewer. In the viewer session, click the "Ask to edit" button in the view-only
  banner/toolbar.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Setup-only (grade via UI observation): Document reachable (weak: edit request is session-only, needs viewer
    role)'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: document state reachable
    path: $.data.nodes
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
