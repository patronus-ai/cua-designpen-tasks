id: 00415-collab-retry-cancel-join-ui
start_url: http://cua_designpen.web
prompt: 'With the audience set to "Only invited people", open the file''s share link in a second browser tab and,
  in the owner tab, deny the join request. In the joining tab''s resulting error dialog, click the retry / request-again
  option instead of cancelling.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Setup-only (grade via UI observation): Document reachable (weak: retry flow is session UI only, needs a
    failed join)'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: document state reachable
    path: $.data.nodes
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
