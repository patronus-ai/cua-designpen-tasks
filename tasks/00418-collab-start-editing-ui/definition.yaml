id: 00418-collab-start-editing-ui
start_url: http://cua_designpen.web
prompt: 'Set the link permission to "Can view", open the share link in a second browser tab, and in that viewer
  session click "Ask to edit". In the owner tab, approve the request. Back in the viewer tab, click the "Start editing"
  button that appears.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Setup-only (grade via UI observation): Document reachable (weak: role switch is session-only, needs a granted
    request)'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: document state reachable
    path: $.data.nodes
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
