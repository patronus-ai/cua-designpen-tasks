id: 00425-spotlight-respond-ask-ui
start_url: http://cua_designpen.web
prompt: 'Open the file''s share link in a second browser tab; from that tab, open the avatar popover, and use your
  row''s "…" menu to "Ask to spotlight" the first tab''s user. In the first tab, accept the incoming ask by clicking
  "Spotlight me" on the bell notification.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Setup-only (grade via UI observation): Document reachable (weak: responding to an ask is session-only,
    needs an incoming ask)'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: document state reachable
    path: $.data.nodes
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
