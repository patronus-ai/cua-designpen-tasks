id: 00429-viewport-following-ui
start_url: http://cua_designpen.web
prompt: 'Open the file''s share link in a second browser tab and start presenting there via the Spotlight toggle.
  In the first tab click Follow on the invite pill, then pan and zoom the canvas in the presenting tab.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Setup-only (grade via UI observation): Document reachable (weak: viewport mirroring is ephemeral, needs
    a broadcasting presenter)'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: document state reachable
    path: $.data.nodes
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
