id: 00434-comment-edit-message-ui
start_url: http://cua_designpen.web
prompt: 'With the Comment tool, place a comment on the canvas saying "the buton color is off" and submit it. Then
  click the pin to open the thread, open the message''s "…" menu, choose Edit, correct the text to "the button color
  is off", and save the edit.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Comment message carries the corrected text
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: message text was corrected
    path: $.data.comments[0].messages[0].body
    operator: STRING_CONTAINS
    expected: button color is off
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
