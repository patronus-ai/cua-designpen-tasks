id: 00435-comment-emoji-react-ui
start_url: http://cua_designpen.web
prompt: 'With the Comment tool, place a comment on the canvas saying "ready for handoff" and submit it. Click the
  pin to open the thread, then use the add-reaction button on the message to add a thumbs-up (👍) emoji reaction.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Reaction present on the comment message
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: the comment exists
    path: $.data.comments
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: message has at least one reaction
    path: $.data.comments[0].messages[0].reactions
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
