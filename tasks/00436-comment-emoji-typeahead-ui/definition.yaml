id: 00436-comment-emoji-typeahead-ui
start_url: http://cua_designpen.web
prompt: 'Activate the Comment tool and click the canvas to open the composer. Type "shipped " and then ":" to trigger
  the emoji typeahead; type "tada" (or "party") and pick the 🎉 emoji from the typeahead suggestions instead of pasting
  it. Submit the comment.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Comment contains the emoji (weak: cannot distinguish typeahead from paste)'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: message contains the party emoji
    path: $.data.comments[0].messages[0].body
    operator: STRING_CONTAINS
    expected: 🎉
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
