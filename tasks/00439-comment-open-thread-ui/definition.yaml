id: 00439-comment-open-thread-ui
start_url: http://cua_designpen.web
prompt: 'With the Comment tool, place a comment on the canvas saying "open me later" and submit it. Click an empty
  area of the canvas to close the thread popover, then click the comment''s pin again to reopen the conversation.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Comment thread exists (weak: opening the popover leaves no document trace)'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: the comment exists
    path: $.data.comments
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: message matches
    path: $.data.comments[0].messages[0].body
    operator: STRING_CONTAINS
    expected: open me later
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
