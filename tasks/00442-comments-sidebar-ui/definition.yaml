id: 00442-comments-sidebar-ui
start_url: http://cua_designpen.web
prompt: 'With the Comment tool, place a comment on the canvas saying "sidebar check" and submit it. Then open the
  Comments tab in the right-hand Properties panel (it also auto-opens while the Comment tool is active) to view
  the list of all comments in the file.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Comment thread exists (weak: sidebar visibility leaves no document trace)'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: the comment exists
    path: $.data.comments
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: message matches
    path: $.data.comments[0].messages[0].body
    operator: STRING_CONTAINS
    expected: sidebar check
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
