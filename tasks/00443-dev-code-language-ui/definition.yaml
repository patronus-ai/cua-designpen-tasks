id: 00443-dev-code-language-ui
start_url: http://cua_designpen.web
prompt: 'Draw a small button-shaped rectangle (about 120x40). Switch to Dev Mode via the toolbar toggle, select
  the rectangle, open the code tab in the right panel, and change the code language dropdown from CSS to SwiftUI.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Button rectangle exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a rectangle exists
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
