id: 00444-dev-code-panel-ui
start_url: http://cua_designpen.web
prompt: 'Draw a 200x80 rectangle. Switch to Dev Mode via the toolbar toggle, select the rectangle, and open the
  code tab in the right panel to view the auto-generated code snippet for it.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: The inspected rectangle exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: 200x80 rectangle exists
    path: $.data.nodes[?(@.type=='RECTANGLE' & @.width==200)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
