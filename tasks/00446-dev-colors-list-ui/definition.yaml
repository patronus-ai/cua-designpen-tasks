id: 00446-dev-colors-list-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and set its fill to pure red #FF0000 in the properties panel. Switch to Dev Mode via the
  toolbar toggle, select the rectangle, open the code tab in the right panel, and check the Colors section of the
  panel.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: The red rectangle exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a rectangle exists
    path: $.data.nodes[?(@.type=='RECTANGLE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
