id: 00450-dev-copy-layer-name-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and rename its layer to "HeroBanner" in the layers panel. Switch to Dev Mode via the toolbar
  toggle, select the rectangle, and in the code panel header use the copy-layer-name control to copy the name to
  the clipboard.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: The named layer exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: layer named HeroBanner exists
    path: $.data.nodes[?(@.name=='HeroBanner')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
