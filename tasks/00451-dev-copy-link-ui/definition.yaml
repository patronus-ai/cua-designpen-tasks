id: 00451-dev-copy-link-ui
start_url: http://cua_designpen.web
prompt: 'Draw a frame. Switch to Dev Mode via the toolbar toggle, select the frame, and in the code panel header
  click the copy-link control to copy a shareable deep link to the selection.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: The linked frame exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a frame exists
    path: $.data.nodes[?(@.type=='FRAME')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
