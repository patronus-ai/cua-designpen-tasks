id: 00452-dev-export-assets-ui
start_url: http://cua_designpen.web
prompt: 'Draw a small icon-sized square (about 24x24). Switch to Dev Mode via the toolbar toggle, select the square,
  scroll to the Export section at the bottom of the code panel, and add an export setting (e.g. 1x PNG) so the asset
  can be downloaded.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Export setting added from inspect view
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: export setting present on a node
    path: $.data.nodes[*].exportSettings[*]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
