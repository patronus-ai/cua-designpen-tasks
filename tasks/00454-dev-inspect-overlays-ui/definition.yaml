id: 00454-dev-inspect-overlays-ui
start_url: http://cua_designpen.web
prompt: 'Draw two frames side by side with a visible gap between them (e.g. two 150x150 frames with a 40px gap).
  Switch to Dev Mode via the toolbar toggle, select one frame, then hover the pointer over the other frame.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Both frames exist
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: at least two frames exist
    path: $.data.nodes[?(@.type=='FRAME')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
