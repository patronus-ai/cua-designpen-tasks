id: 00456-ai-acp-agent-ui
start_url: http://cua_designpen.web
prompt: 'Open the AI chat panel (right panel AI tab, or Cmd+J). In the provider selector, choose an acp: provider
  to connect the assistant to a locally running coding agent, and when the permission dialog appears, approve the
  agent''s access so it can work on the file.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
- browser_scroll_to
- browser_press_key
- browser_type
- browser_wait
- browser_get_page_text
- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
required_tools:
- browser
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
