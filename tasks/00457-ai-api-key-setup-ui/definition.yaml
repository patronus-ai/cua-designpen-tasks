id: 00457-ai-api-key-setup-ui
start_url: http://cua_designpen.web
prompt: 'Open the AI chat panel (right panel AI tab, or Cmd+J) and open the provider settings. Configure an API
  key for the selected provider so the assistant can respond. Then verify the setup by sending the prompt: "Add
  a text layer that says Configured".


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Assistant produced the text layer
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a text node exists
    path: $.data.nodes[?(@.type=='TEXT')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: text 'Configured' visible on canvas
    path: $.data.nodes[*]
    operator: TEXT_PRESENT
    expected: Configured
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
