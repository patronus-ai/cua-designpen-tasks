id: 00458-ai-clear-chat-ui
start_url: http://cua_designpen.web
prompt: 'Open the AI chat panel (right panel AI tab, or Cmd+J) and ask the assistant to draw a purple circle. Once
  it finishes, use the Clear button in the chat toolbar to wipe the conversation.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: Assistant-drawn circle exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: an ellipse exists
    path: $.data.nodes[?(@.type=='ELLIPSE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
