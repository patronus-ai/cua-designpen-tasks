id: 00463-ai-stop-generation-ui
start_url: http://cua_designpen.web
prompt: 'Open the AI chat panel (right panel AI tab, or Cmd+J) and give the assistant a large job, e.g. "Create
  a fifty-frame wireframe set for a mobile app". While it is streaming and creating frames, click the stop button
  in the chat panel to cut the generation off early.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_type
- browser_wait
required_tools:
- browser
rewards:
- name: 'Setup-only (grade via UI observation): Document state present'
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: document state present
    path: $.data.nodes
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
