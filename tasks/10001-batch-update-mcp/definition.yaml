id: 10001-batch-update-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: use create_shape to make two 100x100 rectangles named Card A (at 0,0) and Card B (at 150,0),
  then call batch_update with a single operations JSON that sets width=150 and opacity=0.5 on both rectangles in one call.
  When you are done, call viewport_zoom_to_fit, then verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- batch_update
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- batch_update
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
