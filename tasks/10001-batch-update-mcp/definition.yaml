id: 10001-batch-update-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: use create_shape to make two 100x100 rectangles named Card A (at 0,0) and Card B
  (at 150,0), then call batch_update with a single operations JSON that sets width=150 and opacity=0.5 on both rectangles
  in one call. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot
  of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- batch_update
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- batch_update
rewards:
- name: 'Tool under test invoked: batch_update'
  kind: action
  tool: batch_update
- name: Both cards updated to width 150 and opacity 0.5
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Card A resized and faded
    path: $.data.nodes[?(@.name=='Card A' & @.width==150)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: Card B resized
    path: $.data.nodes[?(@.name=='Card B' & @.width==150)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: Card B faded
    path: $.data.nodes[?(@.name=='Card B' & @.opacity==0.5)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
