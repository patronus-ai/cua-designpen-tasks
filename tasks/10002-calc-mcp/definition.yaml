id: 10002-calc-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: call calc with the expression "37 * 12 + 41", then use create_shape to make a rectangle
  named Result whose width equals the returned value and whose height is 100, and set its fill to black (#000000)
  with set_fill. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot
  of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- calc
- create_shape
- set_fill
- get_node
- browser_press_key
- browser_screenshot
required_tools:
- calc
rewards:
- name: 'Tool under test invoked: calc'
  kind: action
  tool: calc
- name: Result rectangle has the computed width
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Result rectangle is 485 wide
    path: $.data.nodes[?(@.name=='Result' & @.width==485)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
