id: 10004-describe-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create one rectangle and one ellipse with default names, then call describe on the
  document and rename each shape (rename_node or update_node) to exactly the shape kind describe reported: ''Rectangle''
  and ''Ellipse''. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser
  screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- describe
- create_shape
- update_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- describe
rewards:
- name: 'Tool under test invoked: describe'
  kind: action
  tool: describe
- name: Shapes renamed per the description
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: rectangle renamed
    path: $.data.nodes[?(@.type=='RECTANGLE' & @.name=='Rectangle')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: ellipse renamed
    path: $.data.nodes[?(@.type=='ELLIPSE' & @.name=='Ellipse')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
