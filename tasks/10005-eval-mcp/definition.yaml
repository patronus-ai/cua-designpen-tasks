id: 10005-eval-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools (requires OPENPENCIL_MCP_EVAL=1): call eval with JavaScript that creates five 60x60 rectangles
  named Box 1 through Box 5 at y=0 with x positions 0, 80, 160, 240 and 320. When you are done, call viewport_zoom_to_fit,
  then verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- eval
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- eval
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
