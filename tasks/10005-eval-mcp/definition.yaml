id: 10005-eval-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools (requires OPENPENCIL_MCP_EVAL=1): call eval with JavaScript that creates five 60x60
  rectangles named Box 1 through Box 5 at y=0 with x positions 0, 80, 160, 240 and 320. When you are done, zoom
  the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result can
  be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- eval
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- eval
rewards:
- name: 'Tool under test invoked: eval'
  kind: action
  tool: eval
- name: Five scripted boxes exist in a row
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: first box placed
    path: $.data.nodes[?(@.name=='Box 1' & @.x==0)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: middle box placed
    path: $.data.nodes[?(@.name=='Box 3' & @.x==160)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: last box placed
    path: $.data.nodes[?(@.name=='Box 5' & @.x==320)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
