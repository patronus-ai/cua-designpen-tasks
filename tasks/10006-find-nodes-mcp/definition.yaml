id: 10006-find-nodes-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create four ellipses named Temp 1, Temp 2, Keep 1 and Keep 2, then call find_nodes
  with name pattern ''Temp'' and delete every match with delete_node. When you are done, zoom the canvas to fit
  (press Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- find_nodes
- create_shape
- delete_node
- browser_press_key
- browser_screenshot
required_tools:
- find_nodes
rewards:
- name: 'Tool under test invoked: find_nodes'
  kind: action
  tool: find_nodes
- name: Temp layers deleted, Keep layers remain
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Temp 1 gone
    path: $.data.nodes[?(@.name=='Temp 1')]
    operator: NOT_EXISTS
    expected: ''
  - name: Temp 2 gone
    path: $.data.nodes[?(@.name=='Temp 2')]
    operator: NOT_EXISTS
    expected: ''
  - name: Keep 1 remains
    path: $.data.nodes[?(@.name=='Keep 1')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
