id: 10006-find-nodes-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create four ellipses named Temp 1, Temp 2, Keep 1 and Keep 2, then call find_nodes with name
  pattern ''Temp'' and delete every match with delete_node. When you are done, call viewport_zoom_to_fit, then verify the
  result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- find_nodes
- create_shape
- delete_node
- viewport_zoom_to_fit
required_tools:
- find_nodes
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
