id: 10008-get-node-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a rectangle named Source at (24,31) sized 137x89, call get_node on it to read back width/height,
  then create a rectangle named Copy at x=300 using exactly those values. When you are done, call viewport_zoom_to_fit, then
  verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- get_node
- create_shape
- find_nodes
- viewport_zoom_to_fit
required_tools:
- get_node
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
