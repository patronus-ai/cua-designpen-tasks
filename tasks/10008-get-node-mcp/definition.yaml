id: 10008-get-node-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a rectangle named Source at (24,31) sized 137x89, call get_node on it to read
  back width/height, then create a rectangle named Copy at x=300 using exactly those values. When you are done,
  zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result
  can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- get_node
- create_shape
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- get_node
rewards:
- name: 'Tool under test invoked: get_node'
  kind: action
  tool: get_node
- name: Copy matches Source dimensions
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Copy has Source width
    path: $.data.nodes[?(@.name=='Copy' & @.width==137)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: Copy has Source height
    path: $.data.nodes[?(@.name=='Copy' & @.height==89)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
