id: 10009-get-selection-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a star named Target, select it with select_nodes, call get_selection to read
  the selected node''s id, then rename that node to ''Chosen''. When you are done, zoom the canvas to fit (press
  Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- get_selection
- select_nodes
- create_shape
- update_node
- browser_press_key
- browser_screenshot
required_tools:
- get_selection
rewards:
- name: 'Tool under test invoked: get_selection'
  kind: action
  tool: get_selection
- name: Selected star renamed to Chosen
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Chosen star exists
    path: $.data.nodes[?(@.name=='Chosen' & @.type=='STAR')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: old name gone
    path: $.data.nodes[?(@.name=='Target')]
    operator: NOT_EXISTS
    expected: ''
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
