id: 10010-node-resize-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 100x100 rectangle named Banner, then call node_resize to set it to exactly 320 wide
  by 90 tall. When you are done, call viewport_zoom_to_fit, then verify the result with the available MCP tools and report
  what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- node_resize
- create_shape
- get_node
- viewport_zoom_to_fit
required_tools:
- node_resize
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
