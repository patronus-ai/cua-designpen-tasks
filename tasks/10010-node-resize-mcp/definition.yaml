id: 10010-node-resize-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 100x100 rectangle named Banner, then call node_resize to set it to exactly
  320 wide by 90 tall. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser
  screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- node_resize
- create_shape
- get_node
- browser_press_key
- browser_screenshot
required_tools:
- node_resize
rewards:
- name: 'Tool under test invoked: node_resize'
  kind: action
  tool: node_resize
- name: Banner resized to 320x90
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Banner width is 320
    path: $.data.nodes[?(@.name=='Banner' & @.width==320)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: Banner height is 90
    path: $.data.nodes[?(@.name=='Banner' & @.height==90)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
