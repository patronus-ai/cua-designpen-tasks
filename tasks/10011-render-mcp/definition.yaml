id: 10011-render-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: call render with JSX that builds a frame named Hero containing a text layer reading
  exactly ''Welcome''. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser
  screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- render
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- render
rewards:
- name: 'Tool under test invoked: render'
  kind: action
  tool: render
- name: Hero frame with Welcome text exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Hero frame exists
    path: $.data.nodes[?(@.name=='Hero' & @.type=='FRAME')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: Welcome text exists
    path: $.data.nodes[?(@.type=='TEXT' & @.textContent=='Welcome')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
