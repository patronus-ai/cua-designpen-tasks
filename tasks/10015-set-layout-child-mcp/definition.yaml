id: 10015-set-layout-child-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 300x100 frame named Row at (0,0) with horizontal auto-layout, zero padding/spacing,
  containing one 50x50 rectangle named Stretch; then call set_layout_child on Stretch with sizing_horizontal FILL.
  When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the
  app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- set_layout_child
- set_layout
- create_shape
- get_node
- browser_press_key
- browser_screenshot
required_tools:
- set_layout_child
rewards:
- name: 'Tool under test invoked: set_layout_child'
  kind: action
  tool: set_layout_child
- name: Stretch fills the row width
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Stretch grew to row width
    path: $.data.nodes[?(@.name=='Stretch' & @.width==300)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
