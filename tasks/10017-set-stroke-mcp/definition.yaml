id: 10017-set-stroke-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 150x150 ellipse named Ring, then call set_stroke with color #000000 and
  weight 4. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot
  of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- set_stroke
- create_shape
- get_node
- browser_press_key
- browser_screenshot
required_tools:
- set_stroke
rewards:
- name: 'Tool under test invoked: set_stroke'
  kind: action
  tool: set_stroke
- name: Ring has a stroke applied
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Ring exists
    path: $.data.nodes[?(@.name=='Ring' & @.type=='ELLIPSE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: Ring has at least one stroke
    path: $.data.nodes[?(@.name=='Ring')].strokes
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
