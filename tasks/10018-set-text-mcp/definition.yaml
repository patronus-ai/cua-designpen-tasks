id: 10018-set-text-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a text layer named Greeting, then call set_text to set its content to exactly
  ''Hello, OpenPencil!''. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a
  browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- set_text
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- set_text
rewards:
- name: 'Tool under test invoked: set_text'
  kind: action
  tool: set_text
- name: Greeting text content set
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Greeting holds the message
    path: $.data.nodes[?(@.name=='Greeting' & @.textContent=='Hello, OpenPencil!')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
