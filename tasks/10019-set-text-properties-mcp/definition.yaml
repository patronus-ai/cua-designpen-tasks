id: 10019-set-text-properties-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 300-wide text layer named Headline reading ''Centered headline'', then call
  set_text_properties with align_horizontal CENTER. When you are done, zoom the canvas to fit (press Shift+1 in
  the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- set_text_properties
- create_shape
- set_text
- get_node
- browser_press_key
- browser_screenshot
required_tools:
- set_text_properties
rewards:
- name: 'Tool under test invoked: set_text_properties'
  kind: action
  tool: set_text_properties
- name: Headline centered
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Headline text layer exists
    path: $.data.nodes[?(@.name=='Headline' & @.type=='TEXT')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: alignment is centered
    path: $.data.nodes[?(@.name=='Headline' & @.textAlignHorizontal=='CENTER')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
