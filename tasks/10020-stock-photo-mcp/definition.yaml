id: 10020-stock-photo-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 400x300 rectangle named Photo, then call stock_photo to search for a photo
  of mountains and apply it to Photo as an image fill. When you are done, zoom the canvas to fit (press Shift+1
  in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- stock_photo
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- stock_photo
rewards:
- name: 'Tool under test invoked: stock_photo'
  kind: action
  tool: stock_photo
- name: Photo rectangle has an image fill
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Photo has a fill
    path: $.data.nodes[?(@.name=='Photo')].fills
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: fill is an image
    path: $.data.nodes[?(@.name=='Photo')].fills[0].type
    operator: STRING_EQUALS
    expected: IMAGE
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
