id: 10021-update-node-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 100x100 rectangle named Ghost at (0,0), then call update_node once to move it to (250,40)
  and set opacity 0.3. When you are done, call viewport_zoom_to_fit, then verify the result with the available MCP tools and
  report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- update_node
- create_shape
- get_node
- viewport_zoom_to_fit
required_tools:
- update_node
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
