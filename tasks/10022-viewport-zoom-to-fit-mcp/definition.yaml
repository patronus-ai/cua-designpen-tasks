id: 10022-viewport-zoom-to-fit-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 200x200 rectangle named Far at (5000,5000), then call viewport_zoom_to_fit
  with Far''s id. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser
  screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- viewport_zoom_to_fit
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- viewport_zoom_to_fit
rewards:
- name: 'Tool under test invoked: viewport_zoom_to_fit'
  kind: action
  tool: viewport_zoom_to_fit
- name: Far rectangle exists off-origin
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Far placed at 5000,5000
    path: $.data.nodes[?(@.name=='Far' & @.x==5000)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
