id: 10023-analyze-clusters-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create three identical 100x100 rectangles named Tile 1, Tile 2 and Tile 3 at scattered positions
  plus one 220x60 rectangle named Banner; call analyze_clusters on the page, then create a frame named ''repeats-N'' where
  N is the size of the largest repeat group it reports. When you are done, call viewport_zoom_to_fit, then verify the result
  with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- analyze_clusters
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- analyze_clusters
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
