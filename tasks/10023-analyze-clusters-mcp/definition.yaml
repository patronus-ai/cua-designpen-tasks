id: 10023-analyze-clusters-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create three identical 100x100 rectangles named Tile 1, Tile 2 and Tile 3 at scattered
  positions plus one 220x60 rectangle named Banner; call analyze_clusters on the page, then create a frame named
  ''repeats-N'' where N is the size of the largest repeat group it reports. When you are done, zoom the canvas to
  fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- analyze_clusters
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- analyze_clusters
rewards:
- name: 'Tool under test invoked: analyze_clusters'
  kind: action
  tool: analyze_clusters
- name: Cluster analysis recorded on canvas
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: repeats-3 marker frame exists
    path: $.data.nodes[?(@.name=='repeats-3')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: pattern tiles were created
    path: $.data.nodes[?(@.name=='Tile 2' & @.width==100)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
