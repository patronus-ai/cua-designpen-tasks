id: 10024-analyze-colors-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create three filled shapes — two with fill #FF0000 and one with fill #0000FF; call
  analyze_colors on the page, then create a frame named ''palette-N'' where N is the number of distinct fill colors
  it reports. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot
  of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- analyze_colors
- create_vector
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- analyze_colors
rewards:
- name: 'Tool under test invoked: analyze_colors'
  kind: action
  tool: analyze_colors
- name: Palette analysis recorded on canvas
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: palette-2 marker frame exists
    path: $.data.nodes[?(@.name=='palette-2')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: three filled vectors exist
    path: $.data.nodes[?(@.type=='VECTOR')]
    operator: ARRAY_LENGTH
    expected: '>= 3'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
