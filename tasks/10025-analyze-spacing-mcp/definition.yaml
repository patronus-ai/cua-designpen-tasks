id: 10025-analyze-spacing-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create three 100x100 rectangles named Col 1, Col 2 and Col 3 at y=0 with x positions
  0, 150 and 300; call analyze_spacing, then create a frame named ''gap-N'' where N is the uniform gap it detects.
  When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the
  app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- analyze_spacing
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- analyze_spacing
rewards:
- name: 'Tool under test invoked: analyze_spacing'
  kind: action
  tool: analyze_spacing
- name: Spacing analysis recorded on canvas
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: gap-50 marker frame exists
    path: $.data.nodes[?(@.name=='gap-50')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: columns placed as specified
    path: $.data.nodes[?(@.name=='Col 3' & @.x==300)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
