id: 10026-analyze-typography-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create two text layers and set both to the Georgia font family with set_font; call analyze_typography
  grouped by family, then create a frame named ''<family>-<count>'' from the top result. When you are done, call viewport_zoom_to_fit,
  then verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- analyze_typography
- create_shape
- set_font
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- analyze_typography
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
