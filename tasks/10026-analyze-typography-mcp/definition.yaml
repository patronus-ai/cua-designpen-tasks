id: 10026-analyze-typography-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create two text layers and set both to the Georgia font family with set_font; call
  analyze_typography grouped by family, then create a frame named ''<family>-<count>'' from the top result. When
  you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app
  so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- analyze_typography
- create_shape
- set_font
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- analyze_typography
rewards:
- name: 'Tool under test invoked: analyze_typography'
  kind: action
  tool: analyze_typography
- name: Typography analysis recorded on canvas
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Georgia-2 marker frame exists
    path: $.data.nodes[?(@.name=='Georgia-2')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: two Georgia text layers
    path: $.data.nodes[?(@.type=='TEXT' & @.fontFamily=='Georgia')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
