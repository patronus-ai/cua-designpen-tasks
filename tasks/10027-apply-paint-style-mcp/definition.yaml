id: 10027-apply-paint-style-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 200x120 rectangle named Card, create a solid paint style named Brand from
  #FF0000 with create_paint_style, then call apply_paint_style to put the Brand style onto Card. When you are done,
  zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result
  can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- apply_paint_style
- create_paint_style
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- apply_paint_style
rewards:
- name: 'Tool under test invoked: apply_paint_style'
  kind: action
  tool: apply_paint_style
- name: Card carries the red style paints
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Card fill is Brand pure red
    path: $.data.nodes[?(@.name=='Card')].style.fill
    operator: COLOR_NEAR
    expected: '#FF0000'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
