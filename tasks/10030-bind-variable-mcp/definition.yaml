id: 10030-bind-variable-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a collection named Tokens (create_collection) with a FLOAT variable named
  dim valued 0.4 (create_variable), create a 200x100 rectangle named Panel, then call bind_variable to bind Panel''s
  opacity field to the dim variable. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then
  take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- bind_variable
- create_collection
- create_variable
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- bind_variable
rewards:
- name: 'Tool under test invoked: bind_variable'
  kind: action
  tool: bind_variable
- name: Opacity bound to variable
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Panel opacity is 0.4
    path: $.data.nodes[?(@.name=='Panel' & @.opacity==0.4)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: opacity binding recorded
    path: $.data.nodes[?(@.name=='Panel')].boundVariables.opacity
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
