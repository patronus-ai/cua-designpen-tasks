id: 10035-clone-node-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 120x40 rectangle named Badge at (10,10), then call clone_node on it. When
  you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app
  so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- clone_node
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- clone_node
rewards:
- name: 'Tool under test invoked: clone_node'
  kind: action
  tool: clone_node
- name: Two identical badges exist
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: two 120x40 nodes present
    path: $.data.nodes[?(@.width==120 & @.height==40)]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
