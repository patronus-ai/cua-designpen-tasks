id: 10036-create-collection-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: call create_collection with name Theme, add a FLOAT variable named fade valued 0.25
  to it, create a 100x100 rectangle named Chip, and bind Chip''s opacity to the variable. When you are done, zoom
  the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result can
  be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- create_collection
- create_variable
- bind_variable
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- create_collection
rewards:
- name: 'Tool under test invoked: create_collection'
  kind: action
  tool: create_collection
- name: Collection variable resolved into node
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Chip opacity is 0.25
    path: $.data.nodes[?(@.name=='Chip' & @.opacity==0.25)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
