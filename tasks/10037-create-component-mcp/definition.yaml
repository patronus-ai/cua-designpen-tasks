id: 10037-create-component-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 120x48 frame named Button, then call create_component on it. When you are
  done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the
  result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- create_component
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- create_component
rewards:
- name: 'Tool under test invoked: create_component'
  kind: action
  tool: create_component
- name: Component exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a COMPONENT node exists
    path: $.data.nodes[?(@.type=='COMPONENT')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
