id: 10038-create-instance-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 120x48 frame named Pill, promote it with create_component, then call create_instance
  with the component id at x=400, y=0. When you are done, zoom the canvas to fit (press Shift+1 in the browser),
  then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- create_instance
- create_shape
- create_component
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- create_instance
rewards:
- name: 'Tool under test invoked: create_instance'
  kind: action
  tool: create_instance
- name: Instance placed at 400
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: INSTANCE at x=400
    path: $.data.nodes[?(@.type=='INSTANCE' & @.x==400)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
