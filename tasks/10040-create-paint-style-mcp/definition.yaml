id: 10040-create-paint-style-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: call create_paint_style with name Mint and color #00FF00, create a 100x100 rectangle
  named Swatch, then apply the Mint style to Swatch. When you are done, zoom the canvas to fit (press Shift+1 in
  the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- create_paint_style
- apply_paint_style
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- create_paint_style
rewards:
- name: 'Tool under test invoked: create_paint_style'
  kind: action
  tool: create_paint_style
- name: Swatch shows the Mint style color
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Swatch fill is Mint pure green
    path: $.data.nodes[?(@.name=='Swatch')].style.fill
    operator: COLOR_NEAR
    expected: '#00FF00'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
