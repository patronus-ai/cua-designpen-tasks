id: 10042-create-slice-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: call create_slice with name ''Hero cut'' covering (0,0) to 300x200. When you are
  done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the
  result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- create_slice
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- create_slice
rewards:
- name: 'Tool under test invoked: create_slice'
  kind: action
  tool: create_slice
- name: Export region created
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: '''Hero cut'' is 300x200'
    path: $.data.nodes[?(@.name=='Hero cut' & @.width==300 & @.height==200)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
