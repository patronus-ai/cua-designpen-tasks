id: 10043-create-variable-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a collection named Look, call create_variable to add a FLOAT variable named
  dim with value 0.6, create a rectangle named Sheet, and bind Sheet''s opacity to the variable. When you are done,
  zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result
  can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- create_variable
- create_collection
- bind_variable
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- create_variable
rewards:
- name: 'Tool under test invoked: create_variable'
  kind: action
  tool: create_variable
- name: Variable value resolved into Sheet
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Sheet opacity is 0.6
    path: $.data.nodes[?(@.name=='Sheet' & @.opacity==0.6)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
