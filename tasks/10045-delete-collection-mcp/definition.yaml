id: 10045-delete-collection-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a collection named Scratch with one FLOAT variable inside, then call delete_collection
  on it and confirm with list_collections; record the result by creating a frame named ''collections-gone''. When
  you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app
  so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- delete_collection
- create_collection
- create_variable
- list_collections
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- delete_collection
rewards:
- name: 'Tool under test invoked: delete_collection'
  kind: action
  tool: delete_collection
- name: Collection removal confirmed and recorded
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: '''collections-gone'' marker frame exists'
    path: $.data.nodes[?(@.name=='collections-gone')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
