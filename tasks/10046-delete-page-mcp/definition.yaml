id: 10046-delete-page-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a page named Temp with create_page, then call delete_page on it. When you
  are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so
  the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- delete_page
- create_page
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- delete_page
rewards:
- name: 'Tool under test invoked: delete_page'
  kind: action
  tool: delete_page
- name: Temp page removed
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: no page named Temp remains
    path: $.data.nodes[?(@.type=='CANVAS' & @.name=='Temp')]
    operator: NOT_EXISTS
    expected: ''
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
