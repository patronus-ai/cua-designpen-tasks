id: 10047-delete-variable-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a collection named Junk with a FLOAT variable named obsolete valued 1, call
  delete_variable on that variable, confirm with list_variables, and record it by creating a frame named ''variables-empty''.
  When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the
  app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- delete_variable
- create_collection
- create_variable
- list_variables
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- delete_variable
rewards:
- name: 'Tool under test invoked: delete_variable'
  kind: action
  tool: delete_variable
- name: Deletion confirmed and recorded
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: '''variables-empty'' marker frame exists'
    path: $.data.nodes[?(@.name=='variables-empty')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
