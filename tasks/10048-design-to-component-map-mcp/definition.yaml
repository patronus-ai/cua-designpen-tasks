id: 10048-design-to-component-map-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: build a 200x100 frame named Card containing one rectangle, convert it with create_component,
  place two instances beside it, then call design_to_component_map and create a frame named ''map-N-component'' where N is
  the component count it reports. When you are done, call viewport_zoom_to_fit, then verify the result with the available
  MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- design_to_component_map
- create_shape
- create_component
- create_instance
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- design_to_component_map
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
