id: 10048-design-to-component-map-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: build a 200x100 frame named Card containing one rectangle, convert it with create_component,
  place two instances beside it, then call design_to_component_map and create a frame named ''map-N-component''
  where N is the component count it reports. When you are done, zoom the canvas to fit (press Shift+1 in the browser),
  then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- design_to_component_map
- create_shape
- create_component
- create_instance
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- design_to_component_map
rewards:
- name: 'Tool under test invoked: design_to_component_map'
  kind: action
  tool: design_to_component_map
- name: Decomposition recorded on canvas
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: '''map-1-component'' marker exists'
    path: $.data.nodes[?(@.name=='map-1-component')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: two instances exist
    path: $.data.nodes[?(@.type=='INSTANCE')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
