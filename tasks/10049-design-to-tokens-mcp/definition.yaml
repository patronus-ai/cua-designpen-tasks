id: 10049-design-to-tokens-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a collection named Colors holding a COLOR variable named brand valued #FF0000,
  call design_to_tokens with format css, then create a frame named ''tokens-N'' where N is the number of tokens
  emitted. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot
  of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- design_to_tokens
- create_collection
- create_variable
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- design_to_tokens
rewards:
- name: 'Tool under test invoked: design_to_tokens'
  kind: action
  tool: design_to_tokens
- name: Token extraction recorded on canvas
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: '''tokens-1'' marker frame exists'
    path: $.data.nodes[?(@.name=='tokens-1')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
