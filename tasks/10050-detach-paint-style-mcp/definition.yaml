id: 10050-detach-paint-style-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 150x150 rectangle named Chip, create a paint style Accent from #FF0000,
  apply it to Chip, then call detach_paint_style on Chip. When you are done, zoom the canvas to fit (press Shift+1
  in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- detach_paint_style
- create_paint_style
- apply_paint_style
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- detach_paint_style
rewards:
- name: 'Tool under test invoked: detach_paint_style'
  kind: action
  tool: detach_paint_style
- name: Chip keeps its red fill after detaching
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Chip fill stays Accent pure red after detach
    path: $.data.nodes[?(@.name=='Chip')].style.fill
    operator: COLOR_NEAR
    expected: '#FF0000'
  - name: Chip exists
    path: $.data.nodes[?(@.name=='Chip')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
