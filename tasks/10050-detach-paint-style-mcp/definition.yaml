id: 10050-detach-paint-style-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 150x150 rectangle named Chip, create a paint style Accent from #FF0000, apply it to
  Chip, then call detach_paint_style on Chip. When you are done, call viewport_zoom_to_fit, then verify the result with the
  available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- detach_paint_style
- create_paint_style
- apply_paint_style
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- detach_paint_style
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
