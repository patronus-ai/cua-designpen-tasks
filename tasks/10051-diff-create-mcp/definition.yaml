id: 10051-diff-create-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create two frames — Before at 100x100 and After at 250x100 — call diff_create from
  Before to After, then apply the width difference it reports by resizing Before to 250. When you are done, zoom
  the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result can
  be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- diff_create
- create_shape
- node_resize
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- diff_create
rewards:
- name: 'Tool under test invoked: diff_create'
  kind: action
  tool: diff_create
- name: Diff applied to Before
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Before resized to 250
    path: $.data.nodes[?(@.name=='Before' & @.width==250)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
