id: 10051-diff-create-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create two frames — Before at 100x100 and After at 250x100 — call diff_create from Before to
  After, then apply the width difference it reports by resizing Before to 250. When you are done, call viewport_zoom_to_fit,
  then verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- diff_create
- create_shape
- node_resize
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- diff_create
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
