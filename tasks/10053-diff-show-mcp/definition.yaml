id: 10053-diff-show-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 100x100 rectangle named Target, call diff_show previewing props width=300,
  then apply the previewed change with node_resize. When you are done, zoom the canvas to fit (press Shift+1 in
  the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- diff_show
- create_shape
- node_resize
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- diff_show
rewards:
- name: 'Tool under test invoked: diff_show'
  kind: action
  tool: diff_show
- name: Previewed change applied
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Target is 300 wide
    path: $.data.nodes[?(@.name=='Target' & @.width==300)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
