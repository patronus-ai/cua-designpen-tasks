id: 10054-distribute-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create three 100x100 rectangles Dot A, Dot B and Dot C at (0,0), (150,0) and (380,0),
  then call distribute with axis horizontal and gap 20. When you are done, zoom the canvas to fit (press Shift+1
  in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- distribute
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- distribute
rewards:
- name: 'Tool under test invoked: distribute'
  kind: action
  tool: distribute
- name: Equal 20px horizontal spacing
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Dot A to Dot B gap is 20
    path: $.data.nodes[?(@.name=='Dot A')]
    path_b: $.data.nodes[?(@.name=='Dot B')]
    operator: GAP_X
    expected: == 20
  - name: Dot B to Dot C gap is 20
    path: $.data.nodes[?(@.name=='Dot B')]
    path_b: $.data.nodes[?(@.name=='Dot C')]
    operator: GAP_X
    expected: == 20
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
