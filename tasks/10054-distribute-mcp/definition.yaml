id: 10054-distribute-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create three 100x100 rectangles Dot A, Dot B and Dot C at (0,0), (150,0) and (380,0), then
  call distribute with axis horizontal and gap 20. When you are done, call viewport_zoom_to_fit, then verify the result with
  the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- distribute
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- distribute
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
