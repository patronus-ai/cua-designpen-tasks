id: 10055-done-with-changes-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a top-level 300x200 frame named Hero, mark it ready-for-dev with set_section_status
  status BUILD, then call done_with_changes on Hero with reason ''reviewed after copy tweak''. When you are done,
  zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result
  can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- done_with_changes
- create_shape
- set_section_status
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- done_with_changes
rewards:
- name: 'Tool under test invoked: done_with_changes'
  kind: action
  tool: done_with_changes
- name: Changed badge resolved with reason
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Hero keeps BUILD
    path: $.data.nodes[?(@.name=='Hero' & @.sectionStatus=='BUILD')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: reason recorded
    path: $.data.nodes[?(@.name=='Hero')].sectionStatusInfo.description
    operator: STRING_EQUALS
    expected: reviewed after copy tweak
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
