id: 10057-export-image-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 100x100 rectangle named Source, call export_image on it with format PNG,
  then create a second 100x100 rectangle named Photo and set the exported PNG data as Photo''s image fill via set_image_fill.
  When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the
  app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- export_image
- create_shape
- set_image_fill
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- export_image
rewards:
- name: 'Tool under test invoked: export_image'
  kind: action
  tool: export_image
- name: Exported PNG used as image fill
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Photo has an IMAGE fill
    path: $.data.nodes[?(@.name=='Photo')].fills[0].type
    operator: STRING_EQUALS
    expected: IMAGE
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
