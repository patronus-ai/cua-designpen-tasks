id: 10058-export-pdf-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create two 200x100 frames named Sheet 1 and Sheet 2, then call export_pdf with both
  ids. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot
  of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- export_pdf
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- export_pdf
rewards:
- name: 'Tool under test invoked: export_pdf'
  kind: action
  tool: export_pdf
- name: Frames prepared and exported
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Sheet 1 exists
    path: $.data.nodes[?(@.name=='Sheet 1')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: Sheet 2 exists
    path: $.data.nodes[?(@.name=='Sheet 2')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
