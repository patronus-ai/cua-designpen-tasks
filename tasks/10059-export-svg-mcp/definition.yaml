id: 10059-export-svg-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 100x100 red-filled vector named Logo from a closed triangle network, call export_svg
  on it, then feed the returned markup to import_svg as a layer named ''Logo copy''. When you are done, call viewport_zoom_to_fit,
  then verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- export_svg
- create_vector
- import_svg
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- export_svg
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
