id: 10060-fetch-icons-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: call fetch_icons with names [''mdi:home''] and size 48 to warm the cache, then insert
  the same icon at 48px with insert_icon. When you are done, zoom the canvas to fit (press Shift+1 in the browser),
  then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- fetch_icons
- insert_icon
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- fetch_icons
rewards:
- name: 'Tool under test invoked: fetch_icons'
  kind: action
  tool: fetch_icons
- name: Prefetched icon inserted
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: 48x48 icon frame exists
    path: $.data.nodes[?(@.type=='FRAME' & @.width==48 & @.height==48)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
