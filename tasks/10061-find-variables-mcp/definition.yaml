id: 10061-find-variables-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a collection named Space with a FLOAT variable named ''spacing/large'' valued
  64, call find_variables with query ''spacing'', then create a frame named Gap whose width equals the found variable''s
  value. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot
  of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- find_variables
- create_collection
- create_variable
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- find_variables
rewards:
- name: 'Tool under test invoked: find_variables'
  kind: action
  tool: find_variables
- name: Found variable value drove frame width
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Gap is 64 wide
    path: $.data.nodes[?(@.name=='Gap' & @.width==64)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
