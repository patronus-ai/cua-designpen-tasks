id: 10063-get-collection-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a collection named Motion with a FLOAT variable speed valued 0.3 bound to
  the opacity of a rectangle named Runner; call get_collection by id to read the collection''s mode id, then use
  set_variable with that mode id to change speed to 0.9. When you are done, zoom the canvas to fit (press Shift+1
  in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- get_collection
- create_collection
- create_variable
- bind_variable
- set_variable
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- get_collection
rewards:
- name: 'Tool under test invoked: get_collection'
  kind: action
  tool: get_collection
- name: Mode id from collection used for update
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Runner opacity is 0.9
    path: $.data.nodes[?(@.name=='Runner' & @.opacity==0.9)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
