id: 10064-get-components-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 120x48 frame named Chip and convert it with create_component, then call get_components
  to fetch the component id and place an instance at (500,50) with create_instance using that id. When you are done, call
  viewport_zoom_to_fit, then verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- get_components
- create_shape
- create_component
- create_instance
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- get_components
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
