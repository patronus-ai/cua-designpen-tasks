id: 10064-get-components-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 120x48 frame named Chip and convert it with create_component, then call
  get_components to fetch the component id and place an instance at (500,50) with create_instance using that id.
  When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the
  app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- get_components
- create_shape
- create_component
- create_instance
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- get_components
rewards:
- name: 'Tool under test invoked: get_components'
  kind: action
  tool: get_components
- name: Instance created from listed component
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: instance at x=500
    path: $.data.nodes[?(@.type=='INSTANCE' & @.x==500)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
