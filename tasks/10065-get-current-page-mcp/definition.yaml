id: 10065-get-current-page-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a page named Reports and switch to it, call get_current_page, then create
  a frame named exactly the page name it returns. When you are done, zoom the canvas to fit (press Shift+1 in the
  browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- get_current_page
- create_page
- switch_page
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- get_current_page
rewards:
- name: 'Tool under test invoked: get_current_page'
  kind: action
  tool: get_current_page
- name: Current page name echoed as frame
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: frame named 'Reports' exists
    path: $.data.nodes[?(@.type=='FRAME' & @.name=='Reports')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: active page is Reports
    path: $.data.page
    operator: STRING_EQUALS
    expected: Reports
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
