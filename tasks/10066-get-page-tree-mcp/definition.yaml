id: 10066-get-page-tree-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a frame named Root with two child rectangles, call get_page_tree, then rename
  Root''s first child (as listed in the tree) to ''tree-child-1''. When you are done, zoom the canvas to fit (press
  Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- get_page_tree
- create_shape
- rename_node
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- get_page_tree
rewards:
- name: 'Tool under test invoked: get_page_tree'
  kind: action
  tool: get_page_tree
- name: First tree child renamed
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: '''tree-child-1'' exists'
    path: $.data.nodes[?(@.name=='tree-child-1')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
