id: 10067-get-variable-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a collection named Grid with a FLOAT variable named scale valued 12, call
  get_variable by id, then create a frame named Scaled whose width is the returned value times 10. When you are
  done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the
  result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- get_variable
- create_collection
- create_variable
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- get_variable
rewards:
- name: 'Tool under test invoked: get_variable'
  kind: action
  tool: get_variable
- name: Variable value drove frame width
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Scaled is 120 wide
    path: $.data.nodes[?(@.name=='Scaled' & @.width==120)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
