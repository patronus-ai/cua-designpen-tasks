id: 10068-group-nodes-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create two 80x80 rectangles side by side, then call group_nodes with both ids. When
  you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app
  so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- group_nodes
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- group_nodes
rewards:
- name: 'Tool under test invoked: group_nodes'
  kind: action
  tool: group_nodes
- name: Group node exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: a GROUP node exists
    path: $.data.nodes[?(@.type=='GROUP')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
