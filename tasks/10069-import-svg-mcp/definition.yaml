id: 10069-import-svg-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: call import_svg with name ''Star badge'' and this markup: <svg xmlns="http://www.w3.org/2000/svg"
  width="40" height="40"><rect width="40" height="40" fill="#FF0000"/><circle cx="20" cy="20" r="10" fill="#FFFFFF"/></svg>
  When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the
  app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- import_svg
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- import_svg
rewards:
- name: 'Tool under test invoked: import_svg'
  kind: action
  tool: import_svg
- name: SVG imported under given name
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: '''Star badge'' node exists'
    path: $.data.nodes[?(@.name=='Star badge')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
