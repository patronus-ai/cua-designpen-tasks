id: 10070-insert-icon-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: call insert_icon with name ''mdi:home'' and size 48. When you are done, zoom the
  canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually
  verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- insert_icon
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- insert_icon
rewards:
- name: 'Tool under test invoked: insert_icon'
  kind: action
  tool: insert_icon
- name: Icon frame inserted at 48px
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: 48x48 icon frame exists
    path: $.data.nodes[?(@.type=='FRAME' & @.width==48 & @.height==48)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
