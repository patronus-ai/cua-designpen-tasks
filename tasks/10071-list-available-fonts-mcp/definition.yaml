id: 10071-list-available-fonts-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a text layer named Sample, call list_available_fonts, then set Sample''s font
  to the first family from the list at size 33 with set_font. When you are done, zoom the canvas to fit (press Shift+1
  in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- list_available_fonts
- create_shape
- set_font
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- list_available_fonts
rewards:
- name: 'Tool under test invoked: list_available_fonts'
  kind: action
  tool: list_available_fonts
- name: Font applied from availability list
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: text resized to 33 after listing
    path: $.data.nodes[?(@.type=='TEXT' & @.fontSize==33)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
