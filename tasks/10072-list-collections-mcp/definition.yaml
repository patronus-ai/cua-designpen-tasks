id: 10072-list-collections-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create two variable collections named Alpha and Beta, call list_collections, then
  create a frame named ''collections-N'' where N is the count it returns. When you are done, zoom the canvas to
  fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- list_collections
- create_collection
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- list_collections
rewards:
- name: 'Tool under test invoked: list_collections'
  kind: action
  tool: list_collections
- name: Collection count recorded on canvas
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: '''collections-2'' marker frame exists'
    path: $.data.nodes[?(@.name=='collections-2')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
