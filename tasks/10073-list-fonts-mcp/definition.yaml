id: 10073-list-fonts-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a text layer and set its font family to Georgia with set_font, call list_fonts, then
  create a frame named exactly the family the listing returns. When you are done, call viewport_zoom_to_fit, then verify the
  result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- list_fonts
- create_shape
- set_font
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- list_fonts
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
