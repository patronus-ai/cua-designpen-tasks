id: 10074-list-pages-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a second page named Second with create_page, call list_pages, then create
  a frame named ''pages-N'' where N is the total page count returned. When you are done, zoom the canvas to fit
  (press Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- list_pages
- create_page
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- list_pages
rewards:
- name: 'Tool under test invoked: list_pages'
  kind: action
  tool: list_pages
- name: Page count recorded on canvas
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: '''pages-2'' marker frame exists'
    path: $.data.nodes[?(@.name=='pages-2')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
