id: 10076-list-variables-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a collection named Cards with a FLOAT variable named ''card/width'' valued 210, call
  list_variables, then create a frame named FromVar sized to the width the listing reports for that variable. When you are
  done, call viewport_zoom_to_fit, then verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- list_variables
- create_collection
- create_variable
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- list_variables
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
