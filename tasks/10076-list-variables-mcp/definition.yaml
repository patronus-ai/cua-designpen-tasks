id: 10076-list-variables-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a collection named Cards with a FLOAT variable named ''card/width'' valued
  210, call list_variables, then create a frame named FromVar sized to the width the listing reports for that variable.
  When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the
  app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- list_variables
- create_collection
- create_variable
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- list_variables
rewards:
- name: 'Tool under test invoked: list_variables'
  kind: action
  tool: list_variables
- name: Listed value drove frame width
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: FromVar is 210 wide
    path: $.data.nodes[?(@.name=='FromVar' & @.width==210)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
