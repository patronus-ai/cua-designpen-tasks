id: 10077-node-ancestors-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: build frame Outer containing frame Inner containing a rectangle named Leaf, call
  node_ancestors on Leaf, then rename the topmost ancestor it returns to ''RootMost''. When you are done, zoom the
  canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually
  verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- node_ancestors
- create_shape
- rename_node
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- node_ancestors
rewards:
- name: 'Tool under test invoked: node_ancestors'
  kind: action
  tool: node_ancestors
- name: Topmost ancestor renamed via chain lookup
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: '''RootMost'' frame exists'
    path: $.data.nodes[?(@.name=='RootMost')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
