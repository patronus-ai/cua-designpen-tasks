id: 10078-node-bindings-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a collection Theme with FLOAT variable dim valued 0.5, create a rectangle
  named Panel and bind its opacity to dim, then call node_bindings on Panel and create a frame named exactly the
  bound field name it reports. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take
  a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- node_bindings
- create_collection
- create_variable
- bind_variable
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- node_bindings
rewards:
- name: 'Tool under test invoked: node_bindings'
  kind: action
  tool: node_bindings
- name: Bound field name recorded on canvas
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: frame named 'opacity' exists
    path: $.data.nodes[?(@.type=='FRAME' & @.name=='opacity')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: Panel opacity resolved to 0.5
    path: $.data.nodes[?(@.name=='Panel' & @.opacity==0.5)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
