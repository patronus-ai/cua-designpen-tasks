id: 10079-node-bounds-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 100x50 rectangle named Base at (30,40), call node_bounds on it, then place a 20x20
  rectangle named Corner at exactly the bottom-right corner coordinates from the reading. When you are done, call viewport_zoom_to_fit,
  then verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- node_bounds
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- node_bounds
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
