id: 10079-node-bounds-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 100x50 rectangle named Base at (30,40), call node_bounds on it, then place
  a 20x20 rectangle named Corner at exactly the bottom-right corner coordinates from the reading. When you are done,
  zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result
  can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- node_bounds
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- node_bounds
rewards:
- name: 'Tool under test invoked: node_bounds'
  kind: action
  tool: node_bounds
- name: Corner placed from bounds reading
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Corner at (130,90)
    path: $.data.nodes[?(@.name=='Corner' & @.x==130 & @.y==90)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
