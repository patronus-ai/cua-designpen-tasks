id: 10080-node-children-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a frame named Bin with three child rectangles, call node_children on Bin, then rename
  the second child in the returned order to ''middle-child''. When you are done, call viewport_zoom_to_fit, then verify the
  result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- node_children
- create_shape
- rename_node
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- node_children
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
