id: 10080-node-children-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a frame named Bin with three child rectangles, call node_children on Bin,
  then rename the second child in the returned order to ''middle-child''. When you are done, zoom the canvas to
  fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- node_children
- create_shape
- rename_node
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- node_children
rewards:
- name: 'Tool under test invoked: node_children'
  kind: action
  tool: node_children
- name: Second child renamed from listing
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: '''middle-child'' exists'
    path: $.data.nodes[?(@.name=='middle-child')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
