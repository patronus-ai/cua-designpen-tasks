id: 10081-node-move-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 100x100 rectangle named Mover at (0,0), then call node_move with x=321,
  y=87. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot
  of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- node_move
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- node_move
rewards:
- name: 'Tool under test invoked: node_move'
  kind: action
  tool: node_move
- name: Mover repositioned
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Mover at (321,87)
    path: $.data.nodes[?(@.name=='Mover' & @.x==321 & @.y==87)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
