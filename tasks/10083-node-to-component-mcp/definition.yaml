id: 10083-node-to-component-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create two 120x48 frames named Card A and Card B, then call node_to_component once with both
  ids. When you are done, call viewport_zoom_to_fit, then verify the result with the available MCP tools and report what you
  found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- node_to_component
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- node_to_component
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
