id: 10083-node-to-component-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create two 120x48 frames named Card A and Card B, then call node_to_component once
  with both ids. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot
  of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- node_to_component
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- node_to_component
rewards:
- name: 'Tool under test invoked: node_to_component'
  kind: action
  tool: node_to_component
- name: Both frames became components
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: two COMPONENT nodes exist
    path: $.data.nodes[?(@.type=='COMPONENT')]
    operator: ARRAY_LENGTH
    expected: '>= 2'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
