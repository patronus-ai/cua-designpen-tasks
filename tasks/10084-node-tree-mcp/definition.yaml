id: 10084-node-tree-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a frame named App containing a frame named Body with a rectangle named Deep
  inside, call node_tree on App, then rename the deepest node of the returned tree to ''leaf-node''. When you are
  done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the
  result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- node_tree
- create_shape
- rename_node
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- node_tree
rewards:
- name: 'Tool under test invoked: node_tree'
  kind: action
  tool: node_tree
- name: Deepest tree node renamed
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: '''leaf-node'' exists'
    path: $.data.nodes[?(@.name=='leaf-node')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
