id: 10085-page-bounds-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: place two 100x100 rectangles at (0,0) and (300,200), call page_bounds, then create
  a frame named Extent positioned and sized to exactly match the returned box. When you are done, zoom the canvas
  to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually
  verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- page_bounds
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- page_bounds
rewards:
- name: 'Tool under test invoked: page_bounds'
  kind: action
  tool: page_bounds
- name: Extent frame mirrors page bounds
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Extent is 400x300
    path: $.data.nodes[?(@.name=='Extent' & @.width==400 & @.height==300)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
