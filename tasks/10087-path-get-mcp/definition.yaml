id: 10087-path-get-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a vector named Origin from a closed triangle network with vertices (0,0),
  (100,0), (50,80) and an empty vector named Mirror at (200,0); call path_get on Origin, then write the returned
  network onto Mirror with path_set. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then
  take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- path_get
- create_vector
- path_set
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- path_get
rewards:
- name: 'Tool under test invoked: path_get'
  kind: action
  tool: path_get
- name: Read network copied onto Mirror
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Mirror carries the 3-vertex network
    path: $.data.nodes[?(@.name=='Mirror')].vectorNetwork.vertices[*]
    operator: ARRAY_LENGTH
    expected: '>= 3'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
