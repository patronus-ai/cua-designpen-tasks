id: 10088-path-move-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a vector named Drift from an open two-vertex network (0,0)->(100,0) with a
  2px black stroke, then call path_move with dx=50, dy=25. When you are done, zoom the canvas to fit (press Shift+1
  in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- path_move
- create_vector
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- path_move
rewards:
- name: 'Tool under test invoked: path_move'
  kind: action
  tool: path_move
- name: Path points shifted
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: first vertex x is 50
    path: $.data.nodes[?(@.name=='Drift')].vectorNetwork.vertices[0].x
    operator: NUMERIC_MATCH
    expected: '50'
  - name: first vertex y is 25
    path: $.data.nodes[?(@.name=='Drift')].vectorNetwork.vertices[0].y
    operator: NUMERIC_MATCH
    expected: '25'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
