id: 10089-path-scale-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a vector named Grow from an open two-vertex network (0,0)->(100,0) with a
  2px black stroke, then call path_scale with factor 2. When you are done, zoom the canvas to fit (press Shift+1
  in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- path_scale
- create_vector
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- path_scale
rewards:
- name: 'Tool under test invoked: path_scale'
  kind: action
  tool: path_scale
- name: Path scaled from center
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: second vertex x is 150
    path: $.data.nodes[?(@.name=='Grow')].vectorNetwork.vertices[1].x
    operator: NUMERIC_MATCH
    expected: '150'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
