id: 10090-path-set-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create an empty vector named Blank at (0,0) with create_vector, then call path_set
  writing a closed triangle network with vertices (0,0), (100,0), (50,80). When you are done, zoom the canvas to
  fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- path_set
- create_vector
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- path_set
rewards:
- name: 'Tool under test invoked: path_set'
  kind: action
  tool: path_set
- name: Network written onto Blank
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Blank has at least 3 vertices
    path: $.data.nodes[?(@.name=='Blank')].vectorNetwork.vertices[*]
    operator: ARRAY_LENGTH
    expected: '>= 3'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
