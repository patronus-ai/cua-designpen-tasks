id: 10090-path-set-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create an empty vector named Blank at (0,0) with create_vector, then call path_set writing
  a closed triangle network with vertices (0,0), (100,0), (50,80). When you are done, call viewport_zoom_to_fit, then verify
  the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- path_set
- create_vector
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- path_set
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
