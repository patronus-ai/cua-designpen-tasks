id: 10091-query-nodes-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create three 100x100 rectangles, naming one of them ''target''; call query_nodes
  with an XPath selector matching the rectangle named ''target'', then move that node to (500,500) with node_move.
  When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the
  app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- query_nodes
- create_shape
- node_move
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- query_nodes
rewards:
- name: 'Tool under test invoked: query_nodes'
  kind: action
  tool: query_nodes
- name: Queried node was moved
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: '''target'' at (500,500)'
    path: $.data.nodes[?(@.name=='target' & @.x==500 & @.y==500)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
