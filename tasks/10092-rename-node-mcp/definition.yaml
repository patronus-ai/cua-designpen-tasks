id: 10092-rename-node-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a rectangle named ''Untitled thing'', then call rename_node giving it the
  name ''Final name''. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser
  screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- rename_node
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- rename_node
rewards:
- name: 'Tool under test invoked: rename_node'
  kind: action
  tool: rename_node
- name: Layer renamed
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: node named 'Final name' exists
    path: $.data.nodes[?(@.name=='Final name')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
