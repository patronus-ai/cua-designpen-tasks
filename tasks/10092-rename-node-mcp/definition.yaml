prompt: 'Using only MCP tools: create a rectangle named ''Untitled thing'', then call rename_node giving it the name ''Final
  name''. When you are done, call viewport_zoom_to_fit, then verify the result with the available MCP tools and report what
  you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- rename_node
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- rename_node
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
