id: 10093-reorder-page-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a page named Intro with create_page, then call reorder_page moving it to index
  0. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of
  the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- reorder_page
- create_page
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- reorder_page
rewards:
- name: 'Tool under test invoked: reorder_page'
  kind: action
  tool: reorder_page
- name: Intro page exists after reorder
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: page named Intro exists
    path: $.data.nodes[?(@.type=='CANVAS' & @.name=='Intro')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
