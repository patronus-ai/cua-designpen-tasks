id: 10094-search-icons-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: call search_icons with query ''home'', then insert the top result onto the canvas
  at 64px with insert_icon. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take
  a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- search_icons
- insert_icon
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- search_icons
rewards:
- name: 'Tool under test invoked: search_icons'
  kind: action
  tool: search_icons
- name: Search hit inserted at 64px
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: 64x64 icon frame exists
    path: $.data.nodes[?(@.type=='FRAME' & @.width==64 & @.height==64)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
