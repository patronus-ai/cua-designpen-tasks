id: 10095-select-nodes-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create two 100x100 rectangles P1 at (0,0) and P2 at (150,0), call select_nodes with
  both ids, then run distribute with axis horizontal and gap 30 WITHOUT passing ids so it operates on the selection.
  When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the
  app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- select_nodes
- create_shape
- distribute
- get_node
- find_nodes
- get_selection
- browser_press_key
- browser_screenshot
required_tools:
- select_nodes
rewards:
- name: 'Tool under test invoked: select_nodes'
  kind: action
  tool: select_nodes
- name: Selection drove the distribute
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: P2 at x=130 via selection
    path: $.data.nodes[?(@.name=='P2' & @.x==130)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
