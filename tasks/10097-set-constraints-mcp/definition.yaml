id: 10097-set-constraints-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 400x400 frame named Shell with a 50x50 child rectangle named Pin, then call
  set_constraints on Pin with horizontal MAX and vertical CENTER. When you are done, zoom the canvas to fit (press
  Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- set_constraints
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- set_constraints
rewards:
- name: 'Tool under test invoked: set_constraints'
  kind: action
  tool: set_constraints
- name: Constraints applied to Pin
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Pin constraints MAX/CENTER
    path: $.data.nodes[?(@.name=='Pin' & @.horizontalConstraint=='MAX' & @.verticalConstraint=='CENTER')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
