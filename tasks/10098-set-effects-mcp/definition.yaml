id: 10098-set-effects-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 200x120 rectangle named Card, then call set_effects with type DROP_SHADOW
  and radius 12. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot
  of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- set_effects
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- set_effects
rewards:
- name: 'Tool under test invoked: set_effects'
  kind: action
  tool: set_effects
- name: Drop shadow present
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: first effect is DROP_SHADOW
    path: $.data.nodes[?(@.name=='Card')].effects[0].type
    operator: STRING_EQUALS
    expected: DROP_SHADOW
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
