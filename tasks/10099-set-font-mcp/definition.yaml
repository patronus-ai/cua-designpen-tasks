id: 10099-set-font-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a text layer named Headline, then call set_font with family Georgia and size
  24. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of
  the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- set_font
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- set_font
rewards:
- name: 'Tool under test invoked: set_font'
  kind: action
  tool: set_font
- name: Font family and size set
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Headline is Georgia 24
    path: $.data.nodes[?(@.name=='Headline' & @.fontFamily=='Georgia' & @.fontSize==24)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
