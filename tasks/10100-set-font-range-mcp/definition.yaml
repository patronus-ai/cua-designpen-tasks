id: 10100-set-font-range-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a text layer named Greeting, set its content to ''Hello world'' with set_text,
  then call set_font_range on characters 0-5 with size 30. When you are done, zoom the canvas to fit (press Shift+1
  in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- set_font_range
- create_shape
- set_text
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- set_font_range
rewards:
- name: 'Tool under test invoked: set_font_range'
  kind: action
  tool: set_font_range
- name: Style run created for range
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Greeting carries a style run
    path: $.data.nodes[?(@.name=='Greeting')].styleRuns[*]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
