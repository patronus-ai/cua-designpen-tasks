id: 10101-set-image-fill-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 100x100 rectangle named Photo, then call set_image_fill with base64 data
  of a tiny 1x1 PNG you encode yourself. When you are done, zoom the canvas to fit (press Shift+1 in the browser),
  then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- set_image_fill
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- set_image_fill
rewards:
- name: 'Tool under test invoked: set_image_fill'
  kind: action
  tool: set_image_fill
- name: Image fill applied
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Photo fill type is IMAGE
    path: $.data.nodes[?(@.name=='Photo')].fills[0].type
    operator: STRING_EQUALS
    expected: IMAGE
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
