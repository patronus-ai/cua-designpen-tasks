id: 10102-set-instance-property-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 120x48 frame named Widget, convert it with create_component and place an
  instance with create_instance; if the instance exposes a TEXT or BOOLEAN component property, call set_instance_property
  to change one value (otherwise the call surface is still exercised via its error response). When you are done,
  zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result
  can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- set_instance_property
- create_shape
- create_component
- create_instance
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- set_instance_property
rewards:
- name: 'Tool under test invoked: set_instance_property'
  kind: action
  tool: set_instance_property
- name: Instance exists for property write
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: an INSTANCE node exists
    path: $.data.nodes[?(@.type=='INSTANCE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
