id: 10104-set-minmax-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 200x100 frame named ''Flex box'', then call set_minmax with min_width 100
  and max_width 500. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser
  screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- set_minmax
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- set_minmax
rewards:
- name: 'Tool under test invoked: set_minmax'
  kind: action
  tool: set_minmax
- name: Min/max width clamped
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: width clamp 100..500
    path: $.data.nodes[?(@.name=='Flex box' & @.minWidth==100 & @.maxWidth==500)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
