id: 10105-set-opacity-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 100x100 rectangle named Ghost, then call set_opacity with value 0.35. When
  you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app
  so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- set_opacity
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- set_opacity
rewards:
- name: 'Tool under test invoked: set_opacity'
  kind: action
  tool: set_opacity
- name: Opacity set
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Ghost opacity is 0.35
    path: $.data.nodes[?(@.name=='Ghost' & @.opacity==0.35)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
