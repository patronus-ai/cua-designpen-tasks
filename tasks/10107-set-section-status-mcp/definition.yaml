id: 10107-set-section-status-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a top-level 300x200 frame named Checkout, then call set_section_status with
  status BUILD. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot
  of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- set_section_status
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- set_section_status
rewards:
- name: 'Tool under test invoked: set_section_status'
  kind: action
  tool: set_section_status
- name: Ready-for-dev status set
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Checkout marked BUILD
    path: $.data.nodes[?(@.name=='Checkout' & @.sectionStatus=='BUILD')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
