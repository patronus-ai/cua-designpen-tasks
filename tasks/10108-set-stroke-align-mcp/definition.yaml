id: 10108-set-stroke-align-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a vector named Ring from a closed triangle network with a 4px black stroke, then call
  set_stroke_align with align OUTSIDE. When you are done, call viewport_zoom_to_fit, then verify the result with the available
  MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- set_stroke_align
- create_vector
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- set_stroke_align
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
