id: 10109-set-stroke-width-profile-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a vector named Taper from an open two-vertex network (0,0)->(100,0) with a
  4px black stroke, then call set_stroke_width_profile with points that make it thin at the start and thick at the
  end. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot
  of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- set_stroke_width_profile
- create_vector
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- set_stroke_width_profile
rewards:
- name: 'Tool under test invoked: set_stroke_width_profile'
  kind: action
  tool: set_stroke_width_profile
- name: Width profile stored on Taper
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: strokeWidthProfile present
    path: $.data.nodes[?(@.name=='Taper')].strokeWidthProfile
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
