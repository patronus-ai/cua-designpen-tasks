id: 10110-set-text-path-options-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a text layer named ''Curve note'' reading ''ride the wave'', attach it to
  a vector path (open two-vertex network (0,0)->(300,80)) with attach_text_to_path, then call set_text_path_options
  with align CENTER and offset 24. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then
  take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- set_text_path_options
- create_shape
- set_text
- create_vector
- attach_text_to_path
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- set_text_path_options
rewards:
- name: 'Tool under test invoked: set_text_path_options'
  kind: action
  tool: set_text_path_options
- name: On-path options adjusted
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: align CENTER
    path: $.data.nodes[?(@.name=='Curve note')].textPath.align
    operator: STRING_EQUALS
    expected: CENTER
  - name: offset 24
    path: $.data.nodes[?(@.name=='Curve note')].textPath.offset
    operator: NUMERIC_MATCH
    expected: '24'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
