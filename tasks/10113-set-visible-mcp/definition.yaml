id: 10113-set-visible-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 100x100 rectangle named ''Hidden gem'', then call set_visible with value
  false. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot
  of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- set_visible
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- set_visible
rewards:
- name: 'Tool under test invoked: set_visible'
  kind: action
  tool: set_visible
- name: Visibility off
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: '''Hidden gem'' hidden'
    path: $.data.nodes[?(@.name=='Hidden gem' & @.visible==false)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
