id: 10114-switch-page-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a page named Alpha with create_page, call switch_page to move onto it, then
  create a 100x100 rectangle named ''On alpha''. When you are done, zoom the canvas to fit (press Shift+1 in the
  browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- switch_page
- create_page
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- switch_page
rewards:
- name: 'Tool under test invoked: switch_page'
  kind: action
  tool: switch_page
- name: Rectangle created after switching
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: '''On alpha'' rectangle exists'
    path: $.data.nodes[?(@.name=='On alpha')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: active page is Alpha
    path: $.data.page
    operator: STRING_EQUALS
    expected: Alpha
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
