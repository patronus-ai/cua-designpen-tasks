id: 10115-tidy-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create three 100x100 rectangles Tile A, Tile B and Tile C at (0,0), (60,0) and (300,0) so they
  jitter and overlap, then call tidy with axis horizontal and gap 20. When you are done, call viewport_zoom_to_fit, then verify
  the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- tidy
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- tidy
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
