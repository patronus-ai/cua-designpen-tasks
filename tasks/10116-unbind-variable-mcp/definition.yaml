id: 10116-unbind-variable-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a collection named Sizes with a FLOAT variable named w valued 300, create
  a rectangle named Strip, bind Strip''s width to the variable, then call unbind_variable on Strip''s width field.
  When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the
  app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- unbind_variable
- create_collection
- create_variable
- bind_variable
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- unbind_variable
rewards:
- name: 'Tool under test invoked: unbind_variable'
  kind: action
  tool: unbind_variable
- name: Strip keeps width after unbind
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Strip width stayed 300
    path: $.data.nodes[?(@.name=='Strip' & @.width==300)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
