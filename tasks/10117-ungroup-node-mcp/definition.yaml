id: 10117-ungroup-node-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create two rectangles named Item 1 and Item 2, group them with group_nodes, then call ungroup_node
  on the group. When you are done, call viewport_zoom_to_fit, then verify the result with the available MCP tools and report
  what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- ungroup_node
- create_shape
- group_nodes
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- ungroup_node
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
