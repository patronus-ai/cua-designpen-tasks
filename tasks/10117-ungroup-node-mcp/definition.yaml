id: 10117-ungroup-node-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create two rectangles named Item 1 and Item 2, group them with group_nodes, then
  call ungroup_node on the group. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then
  take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- ungroup_node
- create_shape
- group_nodes
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- ungroup_node
rewards:
- name: 'Tool under test invoked: ungroup_node'
  kind: action
  tool: ungroup_node
- name: Group dissolved, children kept
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: no GROUP remains
    path: $.data.nodes[?(@.type=='GROUP')]
    operator: NOT_EXISTS
    expected: ''
  - name: Item 1 survives
    path: $.data.nodes[?(@.name=='Item 1')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: Item 2 survives
    path: $.data.nodes[?(@.name=='Item 2')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
