id: 10118-update-image-fill-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 100x100 rectangle named Poster, give it an image fill from base64 PNG data
  with set_image_fill, then call update_image_fill changing the fill''s scale mode to FIT. When you are done, zoom
  the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result can
  be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- update_image_fill
- create_shape
- set_image_fill
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- update_image_fill
rewards:
- name: 'Tool under test invoked: update_image_fill'
  kind: action
  tool: update_image_fill
- name: Image fill switched to FIT
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Poster image fill FIT
    path: $.data.nodes[?(@.name=='Poster')].fills[0].imageScaleMode
    operator: STRING_EQUALS
    expected: FIT
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
