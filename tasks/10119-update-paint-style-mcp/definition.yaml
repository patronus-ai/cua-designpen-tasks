id: 10119-update-paint-style-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: create a 180x100 rectangle named Panel, create a paint style Accent from #0000FF
  and apply it to Panel, then call update_paint_style changing Accent to #FF0000. When you are done, zoom the canvas
  to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually
  verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- update_paint_style
- create_paint_style
- apply_paint_style
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- update_paint_style
rewards:
- name: 'Tool under test invoked: update_paint_style'
  kind: action
  tool: update_paint_style
- name: Style update propagated to Panel
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Panel fill follows updated Accent to pure red
    path: $.data.nodes[?(@.name=='Panel')].style.fill
    operator: COLOR_NEAR
    expected: '#FF0000'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
