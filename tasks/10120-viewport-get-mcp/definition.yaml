id: 10120-viewport-get-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: set the viewport to x=100, y=200 at zoom 1 with viewport_set, call viewport_get, then create
  a 50x50 rectangle named Anchor at exactly the x,y it returns. When you are done, call viewport_zoom_to_fit, then verify
  the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- viewport_get
- viewport_set
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- viewport_get
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
