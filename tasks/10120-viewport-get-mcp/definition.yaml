id: 10120-viewport-get-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: set the viewport to x=100, y=200 at zoom 1 with viewport_set, call viewport_get,
  then create a 50x50 rectangle named Anchor at exactly the x,y it returns. When you are done, zoom the canvas to
  fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- viewport_get
- viewport_set
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- viewport_get
rewards:
- name: 'Tool under test invoked: viewport_get'
  kind: action
  tool: viewport_get
- name: Rectangle placed from viewport reading
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Anchor at (100,200)
    path: $.data.nodes[?(@.name=='Anchor' & @.x==100 & @.y==200)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
