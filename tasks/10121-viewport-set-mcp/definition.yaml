id: 10121-viewport-set-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: call viewport_set with x=140, y=260, zoom 2, read the viewport back with viewport_get,
  then drop a 40x40 rectangle named Marker at the reported coordinates. When you are done, zoom the canvas to fit
  (press Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- viewport_set
- viewport_get
- create_shape
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- viewport_set
rewards:
- name: 'Tool under test invoked: viewport_set'
  kind: action
  tool: viewport_set
- name: Viewport roundtrip traced on canvas
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Marker at (140,260)
    path: $.data.nodes[?(@.name=='Marker' & @.x==140 & @.y==260)]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
