id: 10122-get-codegen-prompt-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: call get_codegen_prompt, then create a text layer named Guidelines and set its content
  to the full returned text. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take
  a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- get_codegen_prompt
- create_shape
- set_text
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- get_codegen_prompt
rewards:
- name: 'Tool under test invoked: get_codegen_prompt'
  kind: action
  tool: get_codegen_prompt
- name: Guidelines text layer holds fetched content
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Guidelines text layer exists
    path: $.data.nodes[?(@.name=='Guidelines' & @.type=='TEXT')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
  - name: content is non-empty
    path: $.data.nodes[?(@.name=='Guidelines')].textContent
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
