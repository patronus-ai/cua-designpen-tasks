id: 10122-get-codegen-prompt-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: call get_codegen_prompt, then create a text layer named Guidelines and set its content to the
  full returned text. When you are done, call viewport_zoom_to_fit, then verify the result with the available MCP tools and
  report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- get_codegen_prompt
- create_shape
- set_text
- find_nodes
- viewport_zoom_to_fit
required_tools:
- get_codegen_prompt
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
