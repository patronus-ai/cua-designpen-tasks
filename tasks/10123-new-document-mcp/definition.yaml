id: 10123-new-document-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools (requires OPENPENCIL_MCP_ROOT): call new_document to open a brand-new empty document
  in a fresh tab. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser
  screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- new_document
- get_node
- find_nodes
- browser_press_key
- browser_screenshot
required_tools:
- new_document
rewards:
- name: 'Tool under test invoked: new_document'
  kind: action
  tool: new_document
- name: A document is open
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: document state exists
    path: $.data
    operator: EXISTS
    expected: 'true'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
