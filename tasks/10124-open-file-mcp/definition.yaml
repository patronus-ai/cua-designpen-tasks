id: 10124-open-file-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools (requires OPENPENCIL_MCP_ROOT): create an ellipse named Beacon, save the document
  as beacon.fig with save_file, then call open_file on that beacon.fig so it loads in a new tab. When you are done,
  zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result
  can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- open_file
- save_file
- create_shape
- get_node
- browser_press_key
- browser_screenshot
required_tools:
- open_file
rewards:
- name: 'Tool under test invoked: open_file'
  kind: action
  tool: open_file
- name: Beacon document content present
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Beacon ellipse exists
    path: $.data.nodes[?(@.name=='Beacon' & @.type=='ELLIPSE')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
