id: 10124-open-file-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools (requires OPENPENCIL_MCP_ROOT): create an ellipse named Beacon, save the document as beacon.fig
  with save_file, then call open_file on that beacon.fig so it loads in a new tab. When you are done, call viewport_zoom_to_fit,
  then verify the result with the available MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- open_file
- save_file
- create_shape
- get_node
- viewport_zoom_to_fit
required_tools:
- open_file
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
