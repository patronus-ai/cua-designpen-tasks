id: 10125-save-file-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools (requires OPENPENCIL_MCP_ROOT): create a 100x100 rectangle named ''Saved Marker'',
  then call save_file with path artifact.fig. When you are done, zoom the canvas to fit (press Shift+1 in the browser),
  then take a browser screenshot of the app so the result can be visually verified.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems,
  end with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and
  end with exactly "verdict: not-approve".'
available_tools:
- save_file
- create_shape
- get_node
- browser_press_key
- browser_screenshot
required_tools:
- save_file
rewards:
- name: 'Tool under test invoked: save_file'
  kind: action
  tool: save_file
- name: Document content that was saved exists
  kind: state
  source:
    canvas: openpencil
  assertions:
  - name: Saved Marker exists
    path: $.data.nodes[?(@.name=='Saved Marker')]
    operator: ARRAY_LENGTH
    expected: '>= 1'
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
seed: null
