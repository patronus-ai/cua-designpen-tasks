id: 10125-save-file-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools (requires OPENPENCIL_MCP_ROOT): create a 100x100 rectangle named ''Saved Marker'', then call
  save_file with path artifact.fig. When you are done, call viewport_zoom_to_fit, then verify the result with the available
  MCP tools and report what you found.


  At the very end of your final message, state whether the task went smoothly. If everything worked without problems, end
  with exactly "verdict: approve". If you hit any problems, bugs, or blockers, briefly say what went wrong and end with exactly
  "verdict: not-approve".'
available_tools:
- save_file
- create_shape
- get_node
- viewport_zoom_to_fit
required_tools:
- save_file
rewards:
- name: Task went smooth (agent verdict)
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'verdict: approve'
