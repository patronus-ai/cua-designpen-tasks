id: 20002-star-polygon-tool-switch-ui
start_url: http://cua_designpen.web
prompt: 'Using the shape flyout on the toolbar (click the chevron next to the grouped shape button), pick Star and
  drag out a five-pointed star on the canvas. Then reopen the shape flyout, pick Polygon, and drag out a polygon
  next to it.


  While completing this workflow, actively try to break the app: (1) while dragging the star out, press Escape mid-drag
  and confirm nothing half-drawn remains, then redraw it; (2) with the Polygon tool active, do a zero-size click-release
  drag and check whether a degenerate polygon layer appears; (3) mid-drag on one of the shapes, press R and then
  L without releasing the mouse to try to switch tools during the drag, and check both the drag result and which
  tool is active after; (4) try to reopen the shape flyout while a drag is still in progress and see if the UI enters
  a stuck state. After each break attempt, recover (undo, or redo the step cleanly) so the final document matches
  the workflow described above.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens), state lost after navigation
  or reload, inconsistent state between the canvas and the panels, and unhelpful or missing error messages all count
  as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message,
  end with exactly "adversarial-report: complete".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
- browser_scroll_to
