id: 20004-vector-delete-vertices-empty-ui
start_url: http://cua_designpen.web
prompt: 'With the Pen tool (P), click out a zigzag path of five anchor points across the canvas and commit it with
  Enter. Double-click the path to enter vector edit mode, click one vertex to select it, delete it with the Delete
  key, then exit edit mode with Escape.


  While completing this workflow, actively try to break the app: (1) keep deleting vertices one by one until none
  remain — watch what happens to the layer when the geometry becomes empty (ghost layer? crash? auto-delete?), then
  Cmd+Z until the path is restored; (2) inside edit mode press Cmd+A to select all vertices and Delete them in one
  stroke, then undo; (3) rapidly double-click in and out of edit mode between deletions to look for stale vertex
  overlays or selection state that survives across sessions. After each break attempt, recover (undo, or redo the
  step cleanly) so the final document matches the workflow described above.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens), state lost after navigation
  or reload, inconsistent state between the canvas and the panels, and unhelpful or missing error messages all count
  as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message,
  end with exactly "adversarial-report: complete".'
