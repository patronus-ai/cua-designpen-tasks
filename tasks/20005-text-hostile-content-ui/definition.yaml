id: 20005-text-hostile-content-ui
start_url: http://cua_designpen.web
prompt: 'Using the Text tool (toolbar Text button or press T), click an empty spot on the canvas, type "Welcome",
  and click away on empty canvas to commit it.


  While completing this workflow, actively try to break the app: (1) create a scratch text layer and type a very
  long run of text (repeat a sentence until the content is well over 1000 characters) — watch for rendering breakdown,
  layout freeze, or the text box misbehaving, then delete the scratch layer; (2) create another scratch layer containing
  emoji, RTL text, and markup all together, e.g. "🔥🎉 مرحبا שלום <script>alert(1)</script>" — check it renders as
  inert text on the canvas and in the layers panel (no script execution, no broken glyph layout), then delete it;
  (3) while the text cursor is active inside a layer, press the zoom shortcuts Shift+0 and Cmd+= and check whether
  they zoom the canvas, type characters into the text, or both. After each break attempt, recover (undo, or redo
  the step cleanly) so the final document matches the workflow described above.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens), state lost after navigation
  or reload, inconsistent state between the canvas and the panels, and unhelpful or missing error messages all count
  as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message,
  end with exactly "adversarial-report: complete".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
- browser_scroll_to
- browser_press_key
- browser_type
- browser_wait
- browser_get_page_text
- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
required_tools:
- browser
rewards:
- name: Adversarial report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'adversarial-report: complete'
