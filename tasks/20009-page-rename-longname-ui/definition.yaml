id: 20009-page-rename-longname-ui
start_url: http://cua_designpen.web
prompt: 'Add a new page by clicking the "+" button in the Pages header of the left panel. Double-click the new page
  row and rename it to "Wireframes", make sure it is the active page (click its row), and draw a rectangle on it.


  While completing this workflow, actively try to break the app: (1) before settling on the final name, rename the
  page to an extremely long string (paste or type until roughly 10000 characters) — watch the pages list layout,
  app responsiveness, and whether the name is truncated, then rename again; (2) try committing an empty name (clear
  the field and press Enter) — what does the page end up called?; (3) rename the page to emoji plus RTL text like
  "📐 تصميم עמוד" and verify the row and any other surfaces render it correctly; finish by renaming to exactly "Wireframes".
  After each break attempt, recover (undo, or redo the step cleanly) so the final document matches the workflow
  described above.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens), state lost after navigation
  or reload, inconsistent state between the canvas and the panels, and unhelpful or missing error messages all count
  as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message,
  end with exactly "adversarial-report: complete".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
- browser_scroll_to
- browser_press_key
- browser_type
- browser_wait
- browser_get_page_text
- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
required_tools:
- browser
rewards:
- name: Adversarial report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'adversarial-report: complete'
