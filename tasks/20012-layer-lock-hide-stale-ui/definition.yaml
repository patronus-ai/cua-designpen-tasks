id: 20012-layer-lock-hide-stale-ui
start_url: http://cua_designpen.web
prompt: 'Draw a large rectangle and set it to exactly 800 by 600 via the Design panel W/H fields as a background.
  Lock it by hovering its row in the layers panel and clicking the lock icon. Then draw a star on top of it (shape
  flyout > Star).


  While completing this workflow, actively try to break the app: (1) with the rectangle locked, click and drag it
  directly on the canvas — verify it cannot be selected or moved, and that marquee-select and Cmd+A treat it consistently
  with the panel lock state; (2) hide the star via its eye icon in the layers panel, then click, drag, and double-click
  the canvas spot where it was — any interaction hitting the hidden layer is a defect; unhide it afterwards; (3)
  drag-reorder the star and rectangle rows in the layers panel rapidly back and forth 5 times — check the canvas
  z-order always matches the panel order and no row duplicates or vanishes. After each break attempt, recover (undo,
  or redo the step cleanly) so the final document matches the workflow described above.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens), state lost after navigation
  or reload, inconsistent state between the canvas and the panels, and unhelpful or missing error messages all count
  as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message,
  end with exactly "adversarial-report: complete".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
- browser_scroll_to
- browser_press_key
- browser_type
- browser_wait
- browser_get_page_text
- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
required_tools:
- browser
rewards:
- name: Adversarial report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'adversarial-report: complete'
