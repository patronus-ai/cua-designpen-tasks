id: 20018-undo-delete-all-hammer-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle, an ellipse, and a line (R, O, L) anywhere on the canvas. Select everything with Cmd+A
  and press Delete to clear the page, then use Cmd+Z to restore all three shapes.


  While completing this workflow, actively try to break the app: (1) after restoring, keep hammering Cmd+Z far beyond
  the history bottom (10+ extra presses) — each extra press must be a harmless no-op; (2) alternate Cmd+Z and Cmd+Shift+Z
  rapidly about 20 times across the delete-all — the three shapes must always appear/disappear together, with the
  layers panel matching the canvas every time; (3) undo the delete, draw a new star, then press Cmd+Shift+Z — check
  how the redo branch is handled (the delete-all redo should be discarded, not merged); delete the star when done
  so exactly the original three shapes remain. After each break attempt, recover (undo, or redo the step cleanly)
  so the final document matches the workflow described above.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens), state lost after navigation
  or reload, inconsistent state between the canvas and the panels, and unhelpful or missing error messages all count
  as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message,
  end with exactly "adversarial-report: complete".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
- browser_scroll_to
- browser_press_key
- browser_type
- browser_wait
- browser_get_page_text
- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
required_tools:
- browser
rewards:
- name: Adversarial report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'adversarial-report: complete'
