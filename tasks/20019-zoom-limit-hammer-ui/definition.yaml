id: 20019-zoom-limit-hammer-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and set it to exactly 300 by 200 via the Design panel W/H fields. Then snap the view to
  100% with Main menu > View > Zoom to 100% (shortcut Shift+0).


  While completing this workflow, actively try to break the app: (1) hammer Cmd+= about 30 times in fast succession
  to slam into the maximum zoom — check the zoom indicator stops at a sane limit and the rectangle still renders
  crisply (no blank or corrupted canvas at max zoom); (2) then hammer Cmd+- about 30 times to the minimum zoom and
  check the same; (3) alternate Shift+1 (zoom to fit), Shift+2 (zoom to selection, with the rectangle selected),
  and Shift+0 as fast as you can for 10 rounds — look for a viewport stuck mid-animation, a wrong final zoom, or
  the indicator disagreeing with the canvas. Finish at 100% with the rectangle intact. After each break attempt,
  recover (undo, or redo the step cleanly) so the final document matches the workflow described above.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens), state lost after navigation
  or reload, inconsistent state between the canvas and the panels, and unhelpful or missing error messages all count
  as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message,
  end with exactly "adversarial-report: complete".'
