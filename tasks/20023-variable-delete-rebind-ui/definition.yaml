id: 20023-variable-delete-rebind-ui
start_url: http://cua_designpen.web
prompt: 'Open the Local variables dialog from the left panel Variables tab, create a collection, and use the Add menu to create a COLOR variable named "accent" with value pure yellow (#FFFF00). Draw a rectangle, rename its layer to "Token box", and bind its fill to the "accent" token via the fill picker''s variable tab. Then rename the variable to "accent-2" and confirm the binding survives. Then delete the variable using its row delete action and observe what happens to the rectangle''s fill. Final state: "Token box" must end filled pure yellow (#FFFF00) — re-create and re-bind the variable, or set the fill by hand, after your break attempts.


  While completing this workflow, actively try to break the app: (1) rename the variable to a 300+ character name mixing emoji and RTL text (e.g. many repetitions of "tokén-שלום-🎨") and check the dialog table, the fill chip, and the canvas all stay usable; (2) delete the variable while it is bound and check the fill panel chip vs the rendered canvas color for inconsistency, and whether any message explains what happened; (3) press Cmd+Z right after deleting the bound variable and check both the variable row and the binding come back; (4) delete the entire collection while a binding from it is live and observe the fallback. After every break attempt, recover the document (undo, redo, or redo the step by hand) so the workflow above still ends in exactly its described final state.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens),

  state lost after navigation or reload, inconsistent state between the canvas and the panels,

  and unhelpful or missing error messages all count as defects. If you found no defects, state

  exactly "NO DEFECTS FOUND". At the very end of your final message, end with exactly

  "adversarial-report: complete".'
