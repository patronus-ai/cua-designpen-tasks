id: 20032-file-new-tab-cancel-ui
start_url: http://cua_designpen.web
prompt: 'Draw a star (shape flyout > Star) on the current page. Create a brand-new empty file in a separate tab via Main menu > File > New (use the menu item, not the physical Cmd+N shortcut, which the browser reserves). In the new tab, draw a circle with the Ellipse tool (O). Switch back to the first tab via the tab bar and confirm the star is intact, then switch to the new tab again. Final state: the new file''s tab is active and contains the circle.


  While completing this workflow, actively try to break the app: (1) hammer the tab bar, switching between the two tabs at least 10 times as fast as possible, and check neither document loses content, selection state, or canvas rendering; (2) open Main menu > File > Open… and cancel the file picker without choosing anything — verify the editor is fully usable afterwards and no empty ghost tab appeared; (3) invoke Main menu > File > New twice in quick succession and check how many tabs appear and whether each is coherent; (4) start a drag on the circle and, mid-drag, try to switch tabs — verify no half-moved state or stuck drag. After every break attempt, recover the document (undo, redo, or redo the step by hand) so the workflow above still ends in exactly its described final state.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens),

  state lost after navigation or reload, inconsistent state between the canvas and the panels,

  and unhelpful or missing error messages all count as defects. If you found no defects, state

  exactly "NO DEFECTS FOUND". At the very end of your final message, end with exactly

  "adversarial-report: complete".'
