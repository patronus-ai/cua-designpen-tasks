id: 20034-duplicate-move-page-ui
start_url: http://cua_designpen.web
prompt: 'Draw a rectangle and rename its layer to "Mover". Duplicate it with Cmd+D and rename the duplicate to "Moved copy". Add a second page using the "+" button in the Pages header of the left panel. Right-click "Moved copy" on the canvas and choose Move to page > Page 2. Switch to Page 2 by clicking its row and confirm "Moved copy" is there. Final state: "Moved copy" lives on Page 2 and "Mover" is still on Page 1.


  While completing this workflow, actively try to break the app: (1) right after choosing Move to page, immediately try to invoke it again on the same (now moved) node — check for stale context-menu state or a duplicate move; (2) lock "Mover" with Cmd+Shift+L and try Move to page on it — record whether locked layers are movable, blocked with a message, or silently skipped — then unlock; (3) delete Page 2 via its page context menu while it holds "Moved copy", observe whether the content is lost with or without warning, then undo so the page and node come back; (4) switch pages rapidly back and forth 8 times and verify each page always renders its own content with nothing leaking across. After every break attempt, recover the document (undo, redo, or redo the step by hand) so the workflow above still ends in exactly its described final state.


  Log every defect you find using exactly this format, one block per defect:


  DEFECT #<n>

  Steps: <exact reproduction steps>

  Observed: <what actually happened>

  Expected: <what should have happened>

  Severity: <critical | major | minor | cosmetic>


  Broken rendering, crashes, freezes, silent failures (action accepted but nothing happens),

  state lost after navigation or reload, inconsistent state between the canvas and the panels,

  and unhelpful or missing error messages all count as defects. If you found no defects, state

  exactly "NO DEFECTS FOUND". At the very end of your final message, end with exactly

  "adversarial-report: complete".'
