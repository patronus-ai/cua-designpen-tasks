id: 30013-set-fill-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: use create_shape to make a 200x200 rectangle named Swatch at (0,0), then use set_fill to give
  it a solid red fill (#FF0000). When you are done, call viewport_zoom_to_fit, then verify the result with the available MCP
  tools and report what you found.

  While completing this workflow, actively try to break the app through the tools: call set_fill with a malformed color "#ZZZZZZ";
  call set_fill with color "rgb(300,0,0)" (wrong format and out of range); call set_fill with gradient "diagonal" (not a valid
  gradient direction); call set_fill requesting a gradient but omitting the color_end parameter. Confirm each invalid call
  returns a structured status/code/message error rather than silently applying a broken or default fill. Recover from any
  errors and finish the workflow described above.

  Log every defect you find using exactly this format, one block per defect:

  DEFECT #<n> Steps: <exact MCP tool calls with their arguments to reproduce> Observed: <what actually happened> Expected:
  <what should have happened> Severity: <critical | major | minor | cosmetic>

  Broken rendering, crashes, freezes, silent failures (invalid input accepted but nothing happens or a success response is
  returned), partial application of a batch that was supposed to be atomic, state lost after navigation or reload, inconsistent
  state between the canvas and the tool responses, and free-form or unstructured error messages (any error that is not a structured
  status/code/message payload) all count as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very
  end of your final message, end with exactly "adversarial-report: complete".'
available_tools:
- set_fill
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- set_fill
rewards:
- name: Adversarial report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'adversarial-report: complete'
