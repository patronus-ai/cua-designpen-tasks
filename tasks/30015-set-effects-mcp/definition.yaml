id: 30015-set-effects-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: use create_shape to make a 100x100 rectangle named Shadowed at (0,0), then use set_effects to add a DROP_SHADOW with radius 8. When you are done, zoom the canvas to fit (press Shift+1 in the browser), then take a browser screenshot of the app so the result can be visually verified.

While completing this workflow, actively try to break the app through the tools: call set_effects with type "GLOW" (not a valid effect type); call set_effects with radius -10 (negative) and then with radius 1000000000 (huge); call set_effects with offset_x 1e12 and offset_y 1e12; call set_effects with a malformed color "shadowy". Confirm the invalid and extreme values are rejected with a structured status/code/message error rather than silently applied. Recover from any errors and finish the workflow described above.

Log every defect you find using exactly this format, one block per defect:

DEFECT #<n>
Steps: <exact MCP tool calls with their arguments to reproduce>
Observed: <what actually happened>
Expected: <what should have happened>
Severity: <critical | major | minor | cosmetic>

Broken rendering, crashes, freezes, silent failures (invalid input accepted but nothing happens or a success response is returned), partial application of a batch that was supposed to be atomic, state lost after navigation or reload, inconsistent state between the canvas and the tool responses, and free-form or unstructured error messages (any error that is not a structured status/code/message payload) all count as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very end of your final message, end with exactly "adversarial-report: complete".'
