id: 30016-set-text-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: use create_shape to make a TEXT node named Headline at (0,0), then use set_text to set its
  content to "Welcome" and set_text_properties to center it horizontally (CENTER). When you are done, call viewport_zoom_to_fit,
  then verify the result with the available MCP tools and report what you found.

  While completing this workflow, actively try to break the app through the tools: call set_text with a 5000-character string;
  call set_text with an injection-shaped payload "<script>alert(1)</script>"; call set_text_properties with align_horizontal
  "MIDDLE" and auto_resize "MAYBE" (both invalid enums); call set_font with size -10, then size 0, then family "NonexistentFont123".
  Confirm each invalid call returns a structured status/code/message error and the injected markup is never executed or rendered
  as HTML. Recover from any errors and finish the workflow described above.

  Log every defect you find using exactly this format, one block per defect:

  DEFECT #<n> Steps: <exact MCP tool calls with their arguments to reproduce> Observed: <what actually happened> Expected:
  <what should have happened> Severity: <critical | major | minor | cosmetic>

  Broken rendering, crashes, freezes, silent failures (invalid input accepted but nothing happens or a success response is
  returned), partial application of a batch that was supposed to be atomic, state lost after navigation or reload, inconsistent
  state between the canvas and the tool responses, and free-form or unstructured error messages (any error that is not a structured
  status/code/message payload) all count as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very
  end of your final message, end with exactly "adversarial-report: complete".'
available_tools:
- set_text
- set_text_properties
- set_font
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- set_text
rewards:
- name: Adversarial report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'adversarial-report: complete'
