id: 30019-set-opacity-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools: use create_shape to make a 100x100 rectangle named Blend at (0,0), then use set_opacity to
  set it to 0.5 and set_blend to set its mode to MULTIPLY. When you are done, call viewport_zoom_to_fit, then verify the result
  with the available MCP tools and report what you found.

  While completing this workflow, actively try to break the app through the tools: call set_opacity with value -1 (below range),
  then with value 5 (above range 0-1), then with value the string "half"; call set_blend with mode "GLOW" (not a valid blend
  mode). Confirm each out-of-range or invalid value returns a structured status/code/message error rather than being clamped
  silently or accepted. Recover from any errors and finish the workflow described above.

  Log every defect you find using exactly this format, one block per defect:

  DEFECT #<n> Steps: <exact MCP tool calls with their arguments to reproduce> Observed: <what actually happened> Expected:
  <what should have happened> Severity: <critical | major | minor | cosmetic>

  Broken rendering, crashes, freezes, silent failures (invalid input accepted but nothing happens or a success response is
  returned), partial application of a batch that was supposed to be atomic, state lost after navigation or reload, inconsistent
  state between the canvas and the tool responses, and free-form or unstructured error messages (any error that is not a structured
  status/code/message payload) all count as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very
  end of your final message, end with exactly "adversarial-report: complete".'
available_tools:
- set_opacity
- set_blend
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- set_opacity
rewards:
- name: Adversarial report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'adversarial-report: complete'
