id: 30024-save-file-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools (requires OPENPENCIL_MCP_ROOT to be set): use new_document to open a fresh document, use create_shape
  to add a 100x100 rectangle named DiskBox at (0,0), then use save_file with path "qa-test.fig" (inside the allowed root).
  When you are done, call viewport_zoom_to_fit, then verify the result with the available MCP tools and report what you found.

  While completing this workflow, actively try to break the app through the tools: call save_file with path "../../escape.fig"
  (path traversal above the root) and then with an absolute path "/etc/evil.fig" outside the root; call open_file with path
  "../../../etc/passwd" (traversal) and with a nonexistent path "does-not-exist.fig". Confirm every out-of-root or missing
  path is rejected with a structured status/code/message error and nothing is written or read outside the allowed root. Recover
  from any errors and finish the workflow described above.

  Log every defect you find using exactly this format, one block per defect:

  DEFECT #<n> Steps: <exact MCP tool calls with their arguments to reproduce> Observed: <what actually happened> Expected:
  <what should have happened> Severity: <critical | major | minor | cosmetic>

  Broken rendering, crashes, freezes, silent failures (invalid input accepted but nothing happens or a success response is
  returned), partial application of a batch that was supposed to be atomic, state lost after navigation or reload, inconsistent
  state between the canvas and the tool responses, and free-form or unstructured error messages (any error that is not a structured
  status/code/message payload) all count as defects. If you found no defects, state exactly "NO DEFECTS FOUND". At the very
  end of your final message, end with exactly "adversarial-report: complete".'
available_tools:
- save_file
- new_document
- open_file
- create_shape
- get_node
- find_nodes
- viewport_zoom_to_fit
required_tools:
- save_file
rewards:
- name: Adversarial report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'adversarial-report: complete'
