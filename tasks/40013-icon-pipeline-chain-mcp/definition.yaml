- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
- search_icons
- fetch_icons
- insert_icon
- find_nodes
- node_bounds
- get_node
required_tools:
- search_icons
- fetch_icons
- insert_icon
- find_nodes
- node_bounds
- get_node
rewards:
- name: MCP harness report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'mcp-harness-report: complete'
