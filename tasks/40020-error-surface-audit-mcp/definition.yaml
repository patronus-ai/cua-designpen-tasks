id: 40020-error-surface-audit-mcp
start_url: http://cua_designpen.web
prompt: 'Using only MCP tools (the browser is allowed only for screenshots and visual verification): Audit the error
  surface for consistency (create one RECTANGLE "Baseline" first so you have a valid id to contrast against): (1)
  call get_node, delete_node, rename_node, node_move and node_bounds each with the nonexistent id "zzz-does-not-exist"
  — all five must return a structured not-found error; compare the five error payloads with each other: do they
  share the same shape (status/code/message)? Divergent error shapes across tools are a finding; (2) wrong types:
  create_shape with width "wide", set_opacity with value "half", node_move with x null — graceful, informative errors
  required; (3) missing required params: create_shape without type, rename_node without name; (4) find_nodes with
  name "NoSuchNodeName" — this must return an EMPTY RESULT, not an error, and its shape must be clearly different
  from the errors above (no-results vs error distinguishability); (5) inspect every error you collected: any stack
  trace, file path, or internal implementation detail leaking through is a finding.


  Harness discipline: before EVERY tool call, state the output you expect; after the call, compare actual vs expected
  and flag any mismatch. Pay special attention to data-modeling issues: fields that do not round-trip, list vs detail
  disagreements, IDs that change format between tools, broken references between nodes, stale reads after writes,
  and silently truncated results. When you are done, zoom the canvas to fit (press Shift+1 in the browser) and take
  a browser screenshot so the final state can be visually verified.


  Log every mismatch or defect you find using exactly this format, one block per finding:


  MISMATCH #<n>

  Step: <the exact tool call with its arguments>

  Expected: <what you expected and why>

  Actual: <what the tool returned / what the app did>

  Severity: <critical | major | minor | cosmetic>


  Fields that do not round-trip, list vs detail disagreements, broken references, stale reads after writes, silent
  truncation, free-form or unstructured error payloads, misleading success responses, and any single response over
  ~50K characters all count as findings. If you found no mismatches, state exactly "NO MISMATCHES FOUND". At the
  very end of your final message, end with exactly "mcp-harness-report: complete".'
available_tools:
- browser_navigate
- browser_screenshot
- browser_click
- browser_right_click
- browser_double_click
- browser_mouse_move
- browser_drag
- browser_scroll
- browser_scroll_to
- browser_press_key
- browser_type
- browser_wait
- browser_get_page_text
- browser_evaluate
- browser_upload_file
- browser_create_tab
- browser_close_tab
- browser_switch_tab
- browser_list_tabs
- create_shape
- get_node
- delete_node
- rename_node
- node_move
- node_bounds
- set_opacity
- find_nodes
required_tools:
- create_shape
- get_node
- delete_node
- rename_node
- node_move
- node_bounds
- set_opacity
- find_nodes
rewards:
- name: MCP harness report delivered
  kind: answer
  comparator: STRING_CONTAINS
  expected: 'mcp-harness-report: complete'
